<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forknight — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#F5F0E8;--clay:#C8674A;--clay-dark:#a85238;
      --dark:#1A1612;--mid:#6B5F54;--light:#E8DDD0;
      --green:#4A7C59;--amber:#B8860B;--blue:#2E5F8A;
      --surface:rgba(255,255,255,0.75);
      --border:rgba(200,180,160,0.4);
      --radius:14px;
    }
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--cream);
      color:var(--dark);
      min-height:100vh;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 85% 10%,rgba(200,103,74,0.10) 0%,transparent 60%),
        radial-gradient(ellipse 40% 60% at 5% 90%,rgba(200,103,74,0.07) 0%,transparent 50%);
      pointer-events:none;z-index:0;
    }

    /* ── NAV ── */
    nav{
      position:sticky;top:0;z-index:100;
      background:rgba(245,240,232,0.88);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 28px;height:58px;
    }
    .nav-brand{
      font-family:'Playfair Display',serif;
      font-size:1.4rem;color:var(--dark);
      display:flex;align-items:center;gap:8px;
    }
    .nav-brand span{color:var(--clay)}
    .nav-right{display:flex;align-items:center;gap:16px}
    .user-chip{
      display:flex;align-items:center;gap:8px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:999px;
      padding:5px 14px 5px 5px;
      font-size:0.82rem;
    }
    .avatar{
      width:26px;height:26px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:0.7rem;font-weight:500;color:white;
    }
    .role-tag{
      font-size:0.68rem;font-weight:500;
      letter-spacing:0.06em;text-transform:uppercase;
      padding:2px 8px;border-radius:999px;
      color:white;
    }
    .sign-out{
      background:none;border:none;cursor:pointer;
      font-family:'DM Sans',sans-serif;
      font-size:0.82rem;color:var(--mid);
      padding:6px 10px;border-radius:8px;
      transition:background 0.15s,color 0.15s;
    }
    .sign-out:hover{background:var(--light);color:var(--dark)}

    /* ── MAIN ── */
    main{
      position:relative;z-index:1;
      max-width:960px;margin:0 auto;
      padding:32px 24px 60px;
    }
    .page-header{margin-bottom:28px}
    .page-header h1{
      font-family:'Playfair Display',serif;
      font-size:1.7rem;font-weight:700;
      color:var(--dark);line-height:1.2;
    }
    .page-header p{
      margin-top:5px;font-size:0.88rem;
      color:var(--mid);font-weight:300;
    }

    /* ── STATUS BANNER ── */
    .week-banner{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px 22px;
      display:flex;align-items:center;justify-content:space-between;
      gap:16px;margin-bottom:24px;
      box-shadow:0 2px 12px rgba(0,0,0,0.05);
    }
    .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .status-label{font-size:0.82rem;font-weight:500;color:var(--mid);text-transform:uppercase;letter-spacing:0.05em}
    .status-text{font-size:0.88rem;color:var(--dark)}
    .btn-primary{
      background:var(--clay);color:white;
      border:none;border-radius:10px;
      padding:9px 18px;
      font-family:'DM Sans',sans-serif;
      font-size:0.85rem;font-weight:500;
      cursor:pointer;white-space:nowrap;
      transition:background 0.18s,transform 0.12s;
      box-shadow:0 3px 10px rgba(200,103,74,0.3);
    }
    .btn-primary:hover{background:var(--clay-dark);transform:translateY(-1px)}
    .btn-secondary{
      background:white;color:var(--dark);
      border:1.5px solid var(--border);border-radius:10px;
      padding:8px 16px;
      font-family:'DM Sans',sans-serif;
      font-size:0.85rem;font-weight:400;
      cursor:pointer;white-space:nowrap;
      transition:border-color 0.18s,background 0.18s;
    }
    .btn-secondary:hover{border-color:var(--clay);background:rgba(200,103,74,0.04)}

    /* ── GRID ── */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px}
    @media(max-width:720px){
      .grid-2,.grid-3{grid-template-columns:1fr}
    }

    /* ── CARDS ── */
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:22px;
      box-shadow:0 2px 12px rgba(0,0,0,0.05);
    }
    .card-header{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:16px;
    }
    .card-title{
      font-size:0.78rem;font-weight:500;
      text-transform:uppercase;letter-spacing:0.07em;
      color:var(--mid);
    }

    /* ── MEAL POOL ── */
    .meal-list{display:flex;flex-direction:column;gap:10px}
    .meal-item{
      display:flex;align-items:center;justify-content:space-between;
      padding:11px 14px;
      background:rgba(255,255,255,0.6);
      border:1px solid rgba(200,180,160,0.3);
      border-radius:10px;
      transition:border-color 0.15s,background 0.15s;
    }
    .meal-item:hover{border-color:var(--clay);background:rgba(255,255,255,0.85)}
    .meal-name{font-size:0.9rem;font-weight:400}
    .meal-meta{font-size:0.75rem;color:var(--mid)}
    .stars{color:#C8674A;font-size:0.8rem;letter-spacing:1px}
    .meal-actions{display:flex;gap:6px}

    /* ── TAGS ── */
    .tag{
      display:inline-flex;align-items:center;
      font-size:0.7rem;font-weight:500;
      padding:3px 9px;border-radius:999px;
    }
    .tag-green{background:rgba(74,124,89,0.12);color:var(--green)}
    .tag-amber{background:rgba(184,134,11,0.12);color:var(--amber)}
    .tag-clay{background:rgba(200,103,74,0.12);color:var(--clay)}
    .tag-blue{background:rgba(46,95,138,0.12);color:var(--blue)}
    .tag-gray{background:rgba(107,95,84,0.1);color:var(--mid)}

    /* ── REQUESTS ── */
    .request-item{
      padding:12px 14px;
      border-left:3px solid var(--clay);
      background:rgba(200,103,74,0.05);
      border-radius:0 10px 10px 0;
      margin-bottom:10px;
    }
    .request-from{font-size:0.74rem;font-weight:500;color:var(--clay);margin-bottom:3px}
    .request-text{font-size:0.85rem;color:var(--dark)}
    .request-reason{font-size:0.78rem;color:var(--mid);margin-top:3px;font-style:italic}
    .request-btns{display:flex;gap:8px;margin-top:10px}

    /* ── STAT TILES ── */
    .stat-tile{text-align:center}
    .stat-num{font-family:'Playfair Display',serif;font-size:2rem;color:var(--dark)}
    .stat-label{font-size:0.76rem;color:var(--mid);margin-top:2px}

    /* ── INVENTORY ── */
    .inv-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:9px 0;border-bottom:1px solid rgba(200,180,160,0.2);
    }
    .inv-row:last-child{border-bottom:none}
    .inv-name{font-size:0.88rem}
    .inv-toggle{display:flex;gap:6px}
    .have-btn,.need-btn{
      padding:4px 12px;font-size:0.72rem;font-weight:500;
      border-radius:999px;border:1.5px solid;cursor:pointer;
      font-family:'DM Sans',sans-serif;transition:all 0.15s;
    }
    .have-btn{border-color:var(--green);color:var(--green);background:transparent}
    .have-btn.active{background:var(--green);color:white}
    .need-btn{border-color:#C44;color:#C44;background:transparent}
    .need-btn.active{background:#C44;color:white}

    /* ── EMPTY STATE ── */
    .empty{
      text-align:center;padding:32px 16px;
      color:var(--mid);font-size:0.85rem;
    }
    .empty-icon{font-size:2rem;margin-bottom:8px;display:block}

    /* ── SECTION DIVIDER ── */
    .section-label{
      font-size:0.72rem;font-weight:500;
      text-transform:uppercase;letter-spacing:0.1em;
      color:var(--mid);margin:28px 0 12px;
    }

    /* ── LOADING ── */
    #loading{
      position:fixed;inset:0;z-index:999;
      display:flex;align-items:center;justify-content:center;
      background:var(--cream);
    }
    .spin{
      width:36px;height:36px;
      border:3px solid var(--light);
      border-top-color:var(--clay);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    #app{display:none}
    #app.ready{display:block}

    /* ── MODAL ── */
    .modal-overlay{
      position:fixed;inset:0;z-index:200;
      background:rgba(26,22,18,0.5);
      display:flex;align-items:center;justify-content:center;
      padding:20px;
    }
    .modal{
      background:white;border-radius:var(--radius);
      padding:28px;width:100%;max-width:440px;
      box-shadow:0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h3{font-size:1.05rem;font-weight:500;margin-bottom:8px}
    .modal p{font-size:0.85rem;color:var(--mid);margin-bottom:16px}
    .modal textarea{
      width:100%;padding:10px 12px;
      border:1.5px solid var(--light);border-radius:10px;
      font-family:'DM Sans',sans-serif;font-size:0.88rem;
      resize:vertical;min-height:80px;outline:none;
      transition:border-color 0.2s;
    }
    .modal textarea:focus{border-color:var(--clay)}
    .modal-btns{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}
    .btn-ghost{
      background:none;border:none;cursor:pointer;
      font-family:'DM Sans',sans-serif;font-size:0.85rem;
      color:var(--mid);padding:8px 14px;border-radius:8px;
      transition:background 0.15s;
    }
    .btn-ghost:hover{background:var(--light)}

    /* ── EATING OUT SELECTOR ── */
    .day-selector{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
    .day-btn{
      padding:7px 14px;border-radius:999px;
      border:1.5px solid var(--border);
      background:white;font-family:'DM Sans',sans-serif;
      font-size:0.82rem;cursor:pointer;transition:all 0.15s;
    }
    .day-btn.selected{background:var(--clay);border-color:var(--clay);color:white}
    .day-count{
      font-family:'Playfair Display',serif;
      font-size:1.6rem;color:var(--clay);
      display:inline;margin-right:6px;
    }

    .fade-in{animation:fadeIn 0.4s ease both}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<div id="loading"><div class="spin"></div></div>

<div id="app">
  <nav>
    <div class="nav-brand">🍴 Fork<span>n</span>ight</div>
    <div class="nav-right">
      <div class="user-chip">
        <div class="avatar" id="nav-avatar">?</div>
        <span id="nav-name">Loading...</span>
        <span class="role-tag" id="nav-role-tag"></span>
      </div>
      <button class="sign-out" onclick="signOut()">Sign out</button>
    </div>
  </nav>
  <main id="dashboard-content"></main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://znwoiqygmsgabyoslrbt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_SGLBIKifgg4nGL0pPtQssQ_Ng3dMgDK';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const roleColor = { admin:'#C8674A', planner:'#4A7C59', reviewer:'#2E5F8A' };
const roleLabel = { admin:'Admin', planner:'Planner', reviewer:'Reviewer' };

let currentUser   = null;
let userProfile   = null;
let currentPlan   = null;
let currentMeals  = [];

// ── INIT ─────────────────────────────────────────────────
async function init() {
  const { data:{ session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  currentUser = session.user;

  const { data, error } = await sb.from('users').select('*').eq('id', currentUser.id).single();
  userProfile = (error || !data) ? {
    id: currentUser.id, email: currentUser.email,
    name: currentUser.email.split('@')[0], role: 'reviewer'
  } : data;

  renderNav();
  await loadWeekData();
  await renderDashboard();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').classList.add('ready');
}

function renderNav() {
  const col = roleColor[userProfile.role] || '#888';
  const initials = (userProfile.name || 'U').substring(0,1).toUpperCase();
  document.getElementById('nav-avatar').textContent = initials;
  document.getElementById('nav-avatar').style.background = col;
  document.getElementById('nav-name').textContent = userProfile.name;
  const roleEl = document.getElementById('nav-role-tag');
  roleEl.textContent = roleLabel[userProfile.role] || userProfile.role;
  roleEl.style.background = col;
}

async function signOut() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

// ── WEEK HELPERS ─────────────────────────────────────────
function planDateLabel(plan) {
  if (!plan) return '';
  const d = new Date(plan.week_start + 'T12:00:00');
  return d.toLocaleDateString('en-AU', { month:'long', day:'numeric', year:'numeric' });
}

function getTodayDate() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// ── LOAD CURRENT PLAN ────────────────────────────────────
async function loadWeekData() {
  const { data: planData } = await sb
    .from('weekly_plans')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(1)
    .maybeSingle();

  currentPlan  = planData || null;
  currentMeals = [];

  if (currentPlan) {
    const { data: mealData } = await sb
      .from('weekly_plan_meals')
      .select('*, recipes(id, name_en, name_es, prep_time_minutes, cook_time_minutes, advance_prep_required)')
      .eq('plan_id', currentPlan.id);
    currentMeals = mealData || [];
  }
}

// ── LOAD ALL RECIPES ─────────────────────────────────────
async function loadRecipes() {
  const { data } = await sb.from('recipes').select('*').order('name_en');
  return data || [];
}

// ── RENDER DASHBOARD ─────────────────────────────────────
async function renderDashboard() {
  const recipes = await loadRecipes();
  const content = document.getElementById('dashboard-content');

  if      (userProfile.role === 'admin')   content.innerHTML = renderCameron(recipes, userProfile.name);
  else if (userProfile.role === 'planner') content.innerHTML = renderSienna(recipes, userProfile.name);
  else                                     content.innerHTML = renderKaren(recipes, userProfile.name);
}

// ═══════════════════════════════════════════════════════════
// CAMERON — ADMIN
// ═══════════════════════════════════════════════════════════
function renderCameron(recipes, name) {
  const hasPlan        = currentPlan !== null;
  const mealCount      = currentMeals.length;
  const eatingOutDays  = currentPlan?.eating_out_days || [];
  const eatingOutCount = eatingOutDays.length;
  const statusColor    = hasPlan ? '#4A7C59' : '#C8674A';
  const statusText     = hasPlan
    ? `Current plan: <strong>${mealCount} home meal${mealCount!==1?'s':''}</strong>, ${eatingOutCount} day${eatingOutCount!==1?'s':''} eating out`
    : "Set eating-out days to generate this week's meal suggestions";

  return `
  <div class="fade-in">
    <div class="page-header">
      <h1>Good day, ${name} 👋</h1>
      <p>${hasPlan ? 'Plan started ' + planDateLabel(currentPlan) : 'No active plan yet'} · You have full control</p>
    </div>

    <div class="week-banner">
      <div>
        <div class="status-label">Plan status</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
          <div class="status-dot" style="background:${statusColor}"></div>
          <div class="status-text">${statusText}</div>
        </div>
      </div>
      <button class="btn-primary" onclick="openEatingOutModal()">
        ${hasPlan ? 'Start new plan' : 'Set eating-out days'}
      </button>
    </div>

    <div class="grid-3">
      <div class="card stat-tile">
        <div class="stat-num">${recipes.length}</div>
        <div class="stat-label">Recipes in rotation</div>
      </div>
      <div class="card stat-tile">
        <div class="stat-num">0</div>
        <div class="stat-label">Pending requests</div>
      </div>
      <div class="card stat-tile">
        <div class="stat-num">${hasPlan ? mealCount : '—'}</div>
        <div class="stat-label">Meals this plan</div>
      </div>
    </div>

    <div class="section-label">Pending requests</div>
    <div class="card" style="margin-bottom:20px">
      <div class="empty">
        <span class="empty-icon">📋</span>
        No pending requests from Sienna or Karen
      </div>
    </div>

    <div class="section-label">This plan's meal pool</div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <div class="card-title">Suggested meals</div>
        ${hasPlan
          ? `<span class="tag tag-green">${mealCount} meals · ${eatingOutCount} day${eatingOutCount!==1?'s':''} out</span>`
          : `<span class="tag tag-amber">No active plan</span>`}
      </div>
      ${hasPlan && currentMeals.length > 0
        ? `<div class="meal-list">${currentMeals.map(m => mealRowAdmin(m.recipes)).join('')}</div>`
        : `<div class="empty"><span class="empty-icon">🍽️</span>No meals suggested yet — set eating-out days above</div>`}
    </div>

    <div class="section-label">Inventory check</div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <div class="card-title">Fridge & freezer</div>
        <span class="tag tag-gray">Submit plan first</span>
      </div>
      <div class="empty" style="padding:20px 0">
        <span class="empty-icon">🛒</span>
        Once the plan is approved, inventory check unlocks here
      </div>
    </div>

    <div class="section-label">Shopping list</div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">La Comer list</div>
        <button class="btn-primary" style="opacity:0.5;cursor:not-allowed" disabled>Generate list</button>
      </div>
      <div class="empty">
        <span class="empty-icon">🛍️</span>
        Complete inventory check first to generate the shopping list
      </div>
    </div>
  </div>`;
}

function mealRowAdmin(r) {
  if (!r) return '';
  return `
  <div class="meal-item">
    <div>
      <div class="meal-name">${r.name_en}</div>
      <div class="meal-meta">${r.prep_time_minutes||'—'} min prep · ${r.cook_time_minutes||'—'} min cook</div>
    </div>
    <div class="meal-actions">
      <button class="btn-secondary" style="font-size:0.78rem;padding:5px 10px"
        onclick="alert('Hibernate — coming next build')">Hibernate</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// SIENNA — PLANNER
// ═══════════════════════════════════════════════════════════
function renderSienna(recipes, name) {
  const hasPlan   = currentPlan !== null;
  const mealCount = currentMeals.length;

  return `
  <div class="fade-in">
    <div class="page-header">
      <h1>Hi ${name} 👋</h1>
      <p>${hasPlan ? 'Plan started ' + planDateLabel(currentPlan) : 'No active plan yet'} · Plan this week's meals</p>
    </div>

    <div class="week-banner">
      <div>
        <div class="status-label">Your task</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
          <div class="status-dot" style="background:#4A7C59"></div>
          <div class="status-text">${hasPlan
            ? `Review your ${mealCount} suggested meal${mealCount!==1?'s':''}, then submit to Cameron`
            : 'Waiting for Cameron to set up this week\'s plan'}</div>
        </div>
      </div>
      <button class="btn-primary" onclick="alert('Submit plan — coming next build')">Submit plan</button>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-header">
          <div class="card-title">🍽️ This week's meals</div>
          <span class="tag tag-amber">${hasPlan ? `${mealCount} meals` : 'Not set yet'}</span>
        </div>
        ${hasPlan && currentMeals.length > 0
          ? `<div class="meal-list">${currentMeals.map(m => mealRowSienna(m.recipes)).join('')}</div>`
          : `<div class="empty"><span class="empty-icon">🍽️</span>Cameron hasn't set this week's meals yet</div>`}
        <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
          <button class="btn-secondary" style="width:100%;font-size:0.82rem"
            onclick="alert('Reshuffle — 1 allowed per week. Coming next build')">🔀 Reshuffle (1 remaining)</button>
        </div>
      </div>

      <div>
        <div class="card" style="margin-bottom:16px">
          <div class="card-title" style="margin-bottom:14px">📦 Fridge & freezer check</div>
          <div class="inv-row">
            <div class="inv-name">Chicken thighs</div>
            <div class="inv-toggle">
              <button class="have-btn active" onclick="toggleInv(this)">Have</button>

// ═══════════════════════════════════════════════════════════
// FREQUENCY-TIER MEAL SUGGESTION ENGINE
// ═══════════════════════════════════════════════════════════

// How many weeks must pass before each tier can reappear
const TIER_INTERVALS = {
  weekly_favourite: 2,
  regular:          4,
  occasional:       8,
  rare:             12,
  hibernated:       Infinity  // never eligible
};

// Tier priority order used when relaxing intervals
const TIER_ORDER = ['weekly_favourite', 'regular', 'occasional', 'rare'];

async function selectMealsForWeek(allRecipes, homeMealsNeeded) {
  // Skip if nothing needed
  if (homeMealsNeeded <= 0) return [];

  // 1. Load all plan_meal rows to find when each recipe last appeared
  const { data: allPlanMeals } = await sb
    .from('weekly_plan_meals')
    .select('recipe_id, plan_id');

  // 2. Load all plans to get their week_start dates
  const { data: allPlans } = await sb
    .from('weekly_plans')
    .select('id, week_start');

  // Build map: plan_id → Date
  const planDateMap = {};
  if (allPlans) {
    for (const plan of allPlans) {
      planDateMap[plan.id] = new Date(plan.week_start + 'T12:00:00');
    }
  }

  // Build map: recipe_id → most recent Date it appeared in any plan
  const lastSeenMap = {};
  if (allPlanMeals) {
    for (const row of allPlanMeals) {
      const planDate = planDateMap[row.plan_id];
      if (!planDate) continue;
      if (!lastSeenMap[row.recipe_id] || planDate > lastSeenMap[row.recipe_id]) {
        lastSeenMap[row.recipe_id] = planDate;
      }
    }
  }

  const now = new Date();

  // Returns how many weeks ago a date was
  function weeksAgo(date) {
    return (now - date) / (1000 * 60 * 60 * 24 * 7);
  }

  // Is this recipe eligible given a minimum interval (in weeks)?
  function isEligible(recipe, intervalOverride) {
    if (recipe.frequency_tier === 'hibernated') return false;
    const interval = intervalOverride ?? TIER_INTERVALS[recipe.frequency_tier] ?? 8;
    if (interval === Infinity) return false;
    const lastSeen = lastSeenMap[recipe.id];
    if (!lastSeen) return true; // never appeared = always eligible
    return weeksAgo(lastSeen) >= interval;
  }

  // 3. Build eligible pool using normal intervals
  let eligible = allRecipes.filter(r => isEligible(r));

  // 4. If not enough meals, progressively relax each tier's interval by half
  //    starting from the most frequent tier downward
  if (eligible.length < homeMealsNeeded) {
    for (const tier of TIER_ORDER) {
      if (eligible.length >= homeMealsNeeded) break;
      const alreadyIn = new Set(eligible.map(r => r.id));
      const extras = allRecipes.filter(r =>
        r.frequency_tier === tier &&
        !alreadyIn.has(r.id) &&
        isEligible(r, Math.max(1, Math.floor((TIER_INTERVALS[tier] || 8) / 2)))
      );
      eligible = [...eligible, ...extras];
    }
  }

  // 5. Final fallback — add any non-hibernated meal to fill the pool
  if (eligible.length < homeMealsNeeded) {
    const alreadyIn = new Set(eligible.map(r => r.id));
    const fallback = allRecipes.filter(r =>
      r.frequency_tier !== 'hibernated' &&
      !alreadyIn.has(r.id)
    );
    eligible = [...eligible, ...fallback];
  }

  // 6. Shuffle and return the right number
  const shuffled = eligible.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, homeMealsNeeded);
}

// ═══════════════════════════════════════════════════════════
// EATING-OUT MODAL
// ═══════════════════════════════════════════════════════════
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
let selectedEatingOutDays = [];

function openEatingOutModal() {
  selectedEatingOutDays = [];

  const el = document.createElement('div');
  el.id = 'modal-overlay';
  el.className = 'modal-overlay';
  el.innerHTML = `
    <div class="modal" style="max-width:480px">
      <h3>Start a new plan</h3>
      <p>Tap the days you'll be eating out. The app will suggest the right number of home meals.</p>
      <div class="day-selector" id="day-selector">
        ${DAYS.map(d => `
          <button class="day-btn"
            onclick="toggleDay('${d}',this)">${d}</button>
        `).join('')}
      </div>
      <div id="meal-count-preview" style="margin:14px 0;padding:12px 14px;background:var(--cream);border-radius:10px;font-size:0.88rem;color:var(--mid)">
        ${mealCountPreview(0)}
      </div>
      <div class="modal-btns">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" id="confirm-eating-out" onclick="confirmEatingOut()">Suggest meals</button>
      </div>
    </div>`;
  document.body.appendChild(el);
}

function mealCountPreview(outCount) {
  const home = Math.max(0, 7 - outCount);
  return `<span class="day-count">${home}</span> home meal${home!==1?'s':''} needed
    <span style="margin-left:8px;color:var(--mid);font-size:0.78rem">(7 days − ${outCount} eating out)</span>`;
}

function toggleDay(day, btn) {
  if (selectedEatingOutDays.includes(day)) {
    selectedEatingOutDays = selectedEatingOutDays.filter(d => d !== day);
    btn.classList.remove('selected');
  } else {
    selectedEatingOutDays.push(day);
    btn.classList.add('selected');
  }
  document.getElementById('meal-count-preview').innerHTML = mealCountPreview(selectedEatingOutDays.length);
}

async function confirmEatingOut() {
  const btn = document.getElementById('confirm-eating-out');
  btn.textContent = 'Saving...';
  btn.disabled = true;

  const homeMeals  = Math.max(0, 7 - selectedEatingOutDays.length);
  const allRecipes = await loadRecipes();

  // ── NEW: use frequency-tier engine instead of random shuffle ──
  const picked = await selectMealsForWeek(allRecipes, homeMeals);

  try {
    const { data: newPlan, error: planError } = await sb
      .from('weekly_plans').insert({
        week_start: getTodayDate(),
        eating_out_days: selectedEatingOutDays,
        status: 'suggested',
        reshuffle_used: false
      }).select().single();
    if (planError) throw planError;
    currentPlan = newPlan;

    if (picked.length > 0) {
      const { error: mealsError } = await sb.from('weekly_plan_meals').insert(
        picked.map(r => ({ plan_id: currentPlan.id, recipe_id: r.id, cooked: false }))
      );
      if (mealsError) throw mealsError;
    }

    closeModal();
    await loadWeekData();
    await renderDashboard();

  } catch(err) {
    alert('Something went wrong. Please try again.\n' + err.message);
    btn.textContent = 'Suggest meals';
    btn.disabled = false;
  }
}

// ── General request modal ─────────────────────────────────
const modalTitles = {
  swap:      { h:'Request a meal swap',  p:'Tell Cameron which meal and why you want it changed.' },
  hibernate: { h:'Request hibernation',  p:'Tell Cameron which meal should be rested and for how long.' },
  new:       { h:'Suggest a new meal',   p:'What meal would you like to add? Briefly explain why.' },
};

function openModal(type) {
  const t = modalTitles[type];
  const el = document.createElement('div');
  el.id = 'modal-overlay';
  el.className = 'modal-overlay';
  el.innerHTML = `
    <div class="modal">
      <h3>${t.h}</h3>
      <p>${t.p}</p>
      <textarea id="modal-text" placeholder="Add your reason here..." rows="4"></textarea>
      <div class="modal-btns">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="submitRequest('${type}')">Send to Cameron</button>
      </div>
    </div>`;
  document.body.appendChild(el);
}

function closeModal() {
  const el = document.getElementById('modal-overlay');
  if (el) el.remove();
}

async function submitRequest(type) {
  const text = document.getElementById('modal-text').value.trim();
  if (!text) { alert('Please add a reason before sending.'); return; }
  const { error } = await sb.from('requests').insert({
    type, reason: text,
    requested_by: userProfile.id,
    status: 'pending',
    created_at: new Date().toISOString()
  });
  if (error) alert('Error sending request.\n' + error.message);
  else { closeModal(); alert('Request sent to Cameron ✓'); }
}

// ── Inventory toggles ─────────────────────────────────────
function toggleInv(btn) {
  const row = btn.closest('.inv-toggle');
  row.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
