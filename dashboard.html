function updateSchedCalc(totalMinutes) {
  const eatTime = document.getElementById('sched-time').value;
  const day     = document.getElementById('sched-day').value;
  const calcEl  = document.getElementById('sched-calc');
  const warnEl  = document.getElementById('sched-warn');
  if (!eatTime || !calcEl) return;

  const [h, m] = eatTime.split(':').map(Number);
  const eatMins = h * 60 + m;
  const startMins = eatMins - totalMinutes;
  const startH = Math.floor(Math.abs(startMins) / 60);
  const startM = Math.abs(startMins) % 60;
  const startLabel = startMins < 0
    ? `the day before at ${String(23 - startH).padStart(2,'0')}:${String(60 - startM).padStart(2,'0')}`
    : `${String(Math.floor(startMins/60)).padStart(2,'0')}:${String(startMins%60).padStart(2,'0')}`;

  calcEl.innerHTML = `Total prep + cook: <strong>${totalMinutes} min</strong>. Start by <strong>${startLabel}</strong>.`;

  // Warn if the scheduled day is today and start time has already passed
  const now = new Date();
  const today = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()];
  const nowMins = now.getHours() * 60 + now.getMinutes();

  if (day === today && startMins < nowMins && startMins >= 0) {
    warnEl.style.display = 'block';
    warnEl.textContent = `⚠️ Start time ${startLabel} has already passed today — you may not have enough time.`;
  } else if (startMins < 0) {
    warnEl.style.display = 'block';
    warnEl.textContent = `⚠️ Prep needs to start the evening before — plan ahead!`;
  } else {
    warnEl.style.display = 'none';
  }
}

function dayNameToDate(dayName) {
  const dayIndex = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].indexOf(dayName);
  if (dayIndex === -1) return null;
  const now = new Date();
  const diff = ((dayIndex - now.getDay()) + 7) % 7;
  const target = new Date(now);
  target.setDate(now.getDate() + diff);
  return target.toISOString().substring(0, 10);
}

function dateToDayName(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr.substring(0, 10) + 'T12:00:00');
  return d.toLocaleDateString('en-AU', { weekday: 'long' });
}

async function confirmSchedule(planMealId, recipeId, totalMinutes) {
  const dayName  = document.getElementById('sched-day').value;
  const eatTime  = document.getElementById('sched-time').value;
  if (!dayName) { showToast('Please pick a day', 'error'); return; }
  if (!eatTime) { showToast('Please set an eat time', 'error'); return; }

  const assignedDate = dayNameToDate(dayName);
  if (!assignedDate) { showToast('Could not calculate date for that day', 'error'); return; }

  const [h, m] = eatTime.split(':').map(Number);
  const eatMins   = h * 60 + m;
  const startMins = eatMins - totalMinutes;
  const prepStartTime = startMins < 0
    ? `${String(Math.floor((1440+startMins)/60)).padStart(2,'0')}:${String((1440+startMins)%60).padStart(2,'0')} (day before)`
    : `${String(Math.floor(startMins/60)).padStart(2,'0')}:${String(startMins%60).padStart(2,'0')}`;

  const { error } = await sb
    .from('weekly_plan_meals')
    .update({ assigned_day: assignedDate, target_eat_time: eatTime, prep_start_time: prepStartTime })
    .eq('id', planMealId);

  if (error) { showToast('Error saving: ' + error.message, 'error'); return; }

  const pm = currentMeals.find(m => m.id === planMealId || m.recipe_id === recipeId);
  if (pm) { pm.assigned_day = assignedDate; pm.target_eat_time = eatTime; pm.prep_start_time = prepStartTime; }

  closeModal();
  showToast(`Scheduled for ${dayName} · Start prep by ${prepStartTime} ✓`);
  await renderDashboard();
}

// Render the day-before reminder alert (top of dashboard, Cameron + Sienna only)
function renderDayBeforeReminder() {
  if (!currentPlan || currentPlan.status !== 'approved') return '';
  if (userProfile.role === 'reviewer') return '';

  // Get tomorrow's date string YYYY-MM-DD
  const tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tomorrowStr = tomorrow.toISOString().split('T')[0];

  // Find meals assigned to tomorrow that need advance prep and aren't cooked
  const tomorrowMeals = currentMeals.filter(m =>
    m.assigned_day === tomorrowStr &&
    m.recipes?.advance_prep_required &&
    !m.cooked
  );

  if (tomorrowMeals.length === 0) return '';

  const rows = tomorrowMeals.map(m => {
    const r = m.recipes;
    const eatLabel = m.target_eat_time ? ` · eat at ${m.target_eat_time}` : '';
    return `<div class="day-before-meal-row">
      <div class="day-before-meal-name">${r.name_en}${eatLabel}</div>
      <div class="day-before-meal-prep">⏰ ${r.advance_prep_description || 'Advance preparation required'}</div>
    </div>`;
  }).join('');

  return `
    <div class="day-before-alert">
      <div class="day-before-alert-header">
        <div class="day-before-alert-icon">🔔</div>
        <div>
          <div class="day-before-alert-title">Prep needed today</div>
          <div class="day-before-alert-subtitle">You have ${tomorrowMeals.length === 1 ? 'a meal' : 'meals'} scheduled for tomorrow that need advance preparation</div>
        </div>
      </div>
      ${rows}
    </div>`;
}

// Render the weekly prep reminders panel (shown to Cameron + Sienna when plan approved)
function renderPrepReminders() {
  if (!currentPlan || currentPlan.status !== 'approved') return '';
  if (userProfile.role === 'reviewer') return '';

  const advancePrepMeals = currentMeals
    .filter(m => m.recipes?.advance_prep_required && !m.cooked);

  if (advancePrepMeals.length === 0) return '';

  const rows = advancePrepMeals.map(m => {
    const r = m.recipes;
    const dayLabel = m.assigned_day ? ` · scheduled ${dateToDayName(m.assigned_day)}` : '';
    return `<div class="prep-reminder-row">
      <div class="prep-reminder-icon">⏰</div>
      <div>
        <div class="prep-reminder-meal">${r.name_en}${dayLabel}</div>
        <div class="prep-reminder-desc">${r.advance_prep_description || 'Advance preparation required'}</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="section-label">Prep reminders</div>
    <div class="prep-reminders-card">
      <div style="font-size:0.78rem;font-weight:500;color:var(--clay);margin-bottom:12px">
        🗒️ These meals need advance prep this week
      </div>
      ${rows}
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// SIDE SWAP REQUESTS
// ═══════════════════════════════════════════════════════════

function openSideSwapModal(recipeId, currentSideEn) {
  const isKaren = userProfile.role === 'reviewer';
  const isSienna = userProfile.role === 'planner';
  if (!isKaren && !isSienna) return;

  const el = document.createElement('div');
  el.id = 'modal-overlay';
  el.className = 'modal-overlay';

  const sideOptions = allSides.map(s =>
    `<option value="${s.name_en}|${s.name_es||''}" ${s.name_en === currentSideEn ? 'selected' : ''}>${s.name_en}${s.name_es ? ' · ' + s.name_es : ''}</option>`
  ).join('');

  const actionLabel = isKaren
    ? 'Change side now'
    : 'Request side swap';
  const noteText = isKaren
    ? `<p style="font-size:0.8rem;color:var(--green);margin-bottom:12px">✓ As reviewer, your side swap applies immediately — no approval needed.</p>`
    : `<p style="font-size:0.8rem;color:var(--mid);margin-bottom:12px">Your request will go to Cameron for approval.</p>`;

  el.innerHTML = `
    <div class="modal" style="max-width:420px">
      <h3>Change side for this meal</h3>
      <p>Current side: <strong>${currentSideEn || 'None set'}</strong></p>
      ${noteText}
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:0.78rem;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--mid);margin-bottom:6px">New side</label>
        <select id="side-swap-select" class="side-swap-select">
          <option value="">— Pick a side —</option>
          ${sideOptions}
        </select>
      </div>
      ${!isKaren ? `
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:0.78rem;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--mid);margin-bottom:6px">Reason (required)</label>
        <textarea id="side-swap-reason" placeholder="Why do you want to change the side?" rows="3"
          style="width:100%;padding:10px 12px;border:1.5px solid var(--light);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;resize:vertical;min-height:70px;outline:none"></textarea>
      </div>` : ''}
      <div class="modal-btns">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="submitSideSwap('${recipeId}','${currentSideEn.replace(/'/g,"\\'")}',${isKaren})">${actionLabel}</button>
      </div>
    </div>`;
  document.body.appendChild(el);
}

async function submitSideSwap(recipeId, currentSideEn, isKaren) {
  const selectEl = document.getElementById('side-swap-select');
  const reasonEl = document.getElementById('side-swap-reason');
  const val = selectEl?.value;

  if (!val) { showToast('Please pick a new side', 'error'); return; }
  const [newSideEn, newSideEs] = val.split('|');
  if (newSideEn === currentSideEn) { showToast('That is already the current side', 'error'); return; }

  if (isKaren) {
    // Karen: apply immediately
    await applySideSwap(recipeId, newSideEn, newSideEs);
  } else {
    // Sienna: submit request for Cameron's approval
    const reason = reasonEl?.value.trim();
    if (!reason) { showToast('Please add a reason', 'error'); return; }

    const { error } = await sb.from('requests').insert({
      request_type: 'side_swap',
      reason: reason,
      requested_by: userProfile.id,
      status: 'pending',
      plan_id: currentPlan?.id || null,
      meta: { recipe_id: recipeId, new_side_en: newSideEn, new_side_es: newSideEs || null, current_side_en: currentSideEn },
      created_at: new Date().toISOString()
    });
    if (error) { showToast('Error sending request: ' + error.message, 'error'); return; }
    closeModal();
    showToast('Side swap request sent to Cameron ✓');
  }
}

async function applySideSwap(recipeId, newSideEn, newSideEs) {
  // 1. Find or create side in sides table
  let sideId;
  const existing = allSides.find(s => s.name_en.toLowerCase() === newSideEn.toLowerCase());
  if (existing) {
    sideId = existing.id;
  } else {
    const { data: newSide, error: sideErr } = await sb
      .from('sides').insert({ name_en: newSideEn, name_es: newSideEs || null }).select().single();
    if (sideErr) { showToast('Could not save side: ' + sideErr.message, 'error'); return; }
    sideId = newSide.id;
    allSides.push(newSide);
  }

  // 2. Set previous current to false
  await sb.from('recipe_sides').update({ is_current: false })
    .eq('recipe_id', recipeId).eq('is_current', true);

  // 3. Insert new recipe_sides row
  await sb.from('recipe_sides').insert({
    recipe_id: recipeId, side_id: sideId, is_current: true,
    assigned_by: currentUser?.id || null
  });

  // 4. Update recipes table permanently
  const { error } = await sb.from('recipes')
    .update({ default_side_en: newSideEn, default_side_es: newSideEs || null })
    .eq('id', recipeId);
  if (error) { showToast('Error updating side: ' + error.message, 'error'); return; }

  // 5. Update local meal data so UI reflects it without a full reload
  const meal = currentMeals.find(m => m.recipe_id === recipeId);
  if (meal?.recipes) {
    meal.recipes.default_side_en = newSideEn;
    meal.recipes.default_side_es = newSideEs || null;
  }

  closeModal();
  showToast(`Side changed to "${newSideEn}" ✓`);
  await renderDashboard();
}

// ═══════════════════════════════════════════════════════════
// FREQUENCY TIER OVERRIDE — CAMERON
// ═══════════════════════════════════════════════════════════

const TIER_OPTIONS = [
  { value:'weekly',     label:'Weekly Favourite',  note:'Appears every 1–2 weeks' },
  { value:'regular',    label:'Regular',           note:'Appears every 3–4 weeks' },
  { value:'occasional', label:'Occasional',        note:'Appears every 6–8 weeks' },
  { value:'rare',       label:'Rare',              note:'Appears every 10–12 weeks' },
  { value:'hibernated', label:'Hibernated',        note:'Removed from rotation' },
];

function openTierModal(recipeId, currentTier, isLocked) {
  const meal = currentMeals.find(m => m.recipe_id === recipeId);
  const mealName = meal?.recipes?.name_en || 'this meal';
  const avgRating = meal?.recipes?.avg_rating;
  const autoTier = avgRating ? TIER_LABELS[tierFromRating(avgRating)] : null;

  const el = document.createElement('div');
  el.id = 'modal-overlay';
  el.className = 'modal-overlay';

  const optionsHtml = TIER_OPTIONS.map(o =>
    `<option value="${o.value}" ${o.value === currentTier ? 'selected' : ''}>${o.label} — ${o.note}</option>`
  ).join('');

  const lockNote = isLocked
    ? `<div style="font-size:0.8rem;padding:8px 12px;background:rgba(200,103,74,0.07);border-left:3px solid var(--clay);border-radius:0 8px 8px 0;margin-bottom:12px">
        🔒 Override active — ratings won't auto-change this tier.
        ${autoTier ? `Auto tier from ratings would be: <strong>${autoTier}</strong>.` : ''}
        <button class="btn-ghost" style="font-size:0.78rem;padding:4px 10px;margin-left:8px;color:var(--clay)" onclick="unlockTierOverride('${recipeId}')">Remove override</button>
       </div>`
    : `<div style="font-size:0.78rem;color:var(--mid);margin-bottom:12px">Setting a tier locks it — ratings won't auto-change it until you remove the override.</div>`;

  el.innerHTML = `
    <div class="modal" style="max-width:420px">
      <h3>Frequency tier — ${mealName}</h3>
      ${lockNote}
      <label style="display:block;font-size:0.78rem;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--mid);margin-bottom:6px">Set tier</label>
      <select id="tier-select" class="tier-select">${optionsHtml}</select>
      <div class="modal-btns">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveTierOverride('${recipeId}')">Save &amp; lock</button>
      </div>
    </div>`;
  document.body.appendChild(el);
}

async function saveTierOverride(recipeId) {
  const val = document.getElementById('tier-select')?.value;
  if (!val) return;

  const { error } = await sb.from('recipes')
    .update({ frequency_tier: val, frequency_override: true })
    .eq('id', recipeId);

  if (error) { showToast('Error saving tier: ' + error.message, 'error'); return; }

  // Update local data
  const meal = currentMeals.find(m => m.recipe_id === recipeId);
  if (meal?.recipes) {
    meal.recipes.frequency_tier = val;
    meal.recipes.frequency_override = true;
  }

  closeModal();
  showToast(`Tier set to ${TIER_LABELS[val]} 🔒`);
  await renderDashboard();
}

async function unlockTierOverride(recipeId) {
  const meal = currentMeals.find(m => m.recipe_id === recipeId);
  const avgRating = meal?.recipes?.avg_rating;
  const autoTier = avgRating ? tierFromRating(avgRating) : (meal?.recipes?.frequency_tier || 'regular');

  const { error } = await sb.from('recipes')
    .update({ frequency_override: false, frequency_tier: autoTier })
    .eq('id', recipeId);

  if (error) { showToast('Error removing override: ' + error.message, 'error'); return; }

  if (meal?.recipes) {
    meal.recipes.frequency_override = false;
    meal.recipes.frequency_tier = autoTier;
  }

  closeModal();
  showToast(`Override removed — tier restored to ${TIER_LABELS[autoTier]}`);
  await renderDashboard();
}

// ═══════════════════════════════════════════════════════════
// HIBERNATION ENGINE
// ═══════════════════════════════════════════════════════════

function weeksFromNow(n) {
  const d = new Date();
  d.setDate(d.getDate() + n * 7);
  return d.toISOString().substring(0, 10);
}

// Cameron directly hibernates a meal — opens timer modal
function openHibernateModal(recipeId, mealName) {
  const el = document.createElement('div');
  el.id = 'modal-overlay';
  el.className = 'modal-overlay';
  el.innerHTML = `
    <div class="modal" style="max-width:400px">
      <h3>Hibernate "${mealName}"</h3>
      <p>This meal will be removed from rotation and wake up automatically.</p>
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:0.78rem;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--mid);margin-bottom:6px">Wake up after</label>
        <select id="hibernate-weeks" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;background:white">
          <option value="2">2 weeks</option>
          <option value="4">4 weeks</option>
          <option value="6">6 weeks</option>
          <option value="8" selected>8 weeks (2 months)</option>
          <option value="12">12 weeks (3 months)</option>
          <option value="16">16 weeks (4 months)</option>
          <option value="26">26 weeks (6 months)</option>
          <option value="52">1 year</option>
        </select>
      </div>
      <div id="hibernate-wake-preview" style="font-size:0.82rem;color:var(--mid);padding:8px 12px;background:var(--cream);border-radius:8px;margin-bottom:4px">
        Will wake up: <strong>${weeksFromNow(8)}</strong>
      </div>
      <div class="modal-btns">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" style="background:#6B5F54" onclick="confirmHibernate('${recipeId}')">😴 Hibernate</button>
      </div>
    </div>`;
  document.body.appendChild(el);

  document.getElementById('hibernate-weeks').addEventListener('change', function() {
    const preview = document.getElementById('hibernate-wake-preview');
    if (preview) preview.innerHTML = `Will wake up: <strong>${weeksFromNow(parseInt(this.value))}</strong>`;
  });
}

async function confirmHibernate(recipeId) {
  const weeks = parseInt(document.getElementById('hibernate-weeks')?.value || '8');
  await doHibernate(recipeId, weeks);
}

async function doHibernate(recipeId, weeks) {
  const wakeDate = weeksFromNow(weeks);
  const { error } = await sb.from('recipes')
    .update({ hibernated: true, hibernate_until: wakeDate, frequency_tier: 'hibernated' })
    .eq('id', recipeId);

  if (error) { showToast('Error hibernating meal: ' + error.message, 'error'); return; }

  // Remove from current week's plan if present and not cooked
  const planMeal = currentMeals.find(m => m.recipe_id === recipeId && !m.cooked);
  if (planMeal) {
    await sb.from('weekly_plan_meals').delete().eq('id', planMeal.id);
    currentMeals = currentMeals.filter(m => m.id !== planMeal.id);
  }

  closeModal();
  showToast(`Meal hibernated 😴 — wakes up ${wakeDate}`);

  // Remove any pending request UI for this
  const pendingContainer = document.getElementById('requests-container');
  if (pendingContainer) {
    // Re-load requests after a brief pause to let DB settle
    setTimeout(() => loadPendingRequests(), 300);
  }

  await renderDashboard();
}

// Runs on load (admin only) — wakes up any meals past their hibernate_until date
async function checkHibernationWakeUps() {
  const today = getTodayDate();
  const { data, error } = await sb
    .from('recipes')
    .select('id, name_en, hibernate_until, avg_rating')
    .eq('hibernated', true)
    .not('hibernate_until', 'is', null)
    .lte('hibernate_until', today);

  if (error || !data || data.length === 0) return;

  const wokenUp = [];
  for (const recipe of data) {
    const restoredTier = recipe.avg_rating ? tierFromRating(recipe.avg_rating) : 'regular';
    const { error: upErr } = await sb.from('recipes')
      .update({ hibernated: false, hibernate_until: null, frequency_tier: restoredTier })
      .eq('id', recipe.id);
    if (!upErr) wokenUp.push({ name: recipe.name_en, tier: restoredTier });
  }

  if (wokenUp.length > 0) {
    wokenUp.forEach(r => {
      showToast(`🌅 ${r.name} is back! Restored to ${TIER_LABELS[r.tier]}`, 'success');
    });
  }
}
