<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forknight — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#F5F0E8;--clay:#C8674A;--clay-dark:#a85238;
      --dark:#1A1612;--mid:#6B5F54;--light:#E8DDD0;
      --green:#4A7C59;--amber:#B8860B;--blue:#2E5F8A;
      --surface:rgba(255,255,255,0.75);
      --border:rgba(200,180,160,0.4);
      --radius:14px;
    }
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--cream);
      color:var(--dark);
      min-height:100vh;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 85% 10%,rgba(200,103,74,0.10) 0%,transparent 60%),
        radial-gradient(ellipse 40% 60% at 5% 90%,rgba(200,103,74,0.07) 0%,transparent 50%);
      pointer-events:none;z-index:0;
    }

    /* ── NAV ── */
    nav{
      position:sticky;top:0;z-index:100;
      background:rgba(245,240,232,0.88);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 28px;height:58px;
    }
    .nav-brand{
      font-family:'Playfair Display',serif;
      font-size:1.4rem;color:var(--dark);
      display:flex;align-items:center;gap:8px;
    }
    .nav-brand span{color:var(--clay)}
    .nav-right{display:flex;align-items:center;gap:16px}
    .user-chip{
      display:flex;align-items:center;gap:8px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:999px;
      padding:5px 14px 5px 5px;
      font-size:0.82rem;
    }
    .avatar{
      width:26px;height:26px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:0.7rem;font-weight:500;color:white;
    }
    .role-tag{
      font-size:0.68rem;font-weight:500;
      letter-spacing:0.06em;text-transform:uppercase;
      padding:2px 8px;border-radius:999px;
      color:white;
    }
    .sign-out{
      background:none;border:none;cursor:pointer;
      font-family:'DM Sans',sans-serif;
      font-size:0.82rem;color:var(--mid);
      padding:6px 10px;border-radius:8px;
      transition:background 0.15s,color 0.15s;
    }
    .sign-out:hover{background:var(--light);color:var(--dark)}

    /* ── MAIN ── */
    main{
      position:relative;z-index:1;
      max-width:960px;margin:0 auto;
      padding:32px 24px 60px;
    }
    .page-header{margin-bottom:28px}
    .page-header h1{
      font-family:'Playfair Display',serif;
      font-size:1.7rem;font-weight:700;
      color:var(--dark);line-height:1.2;
    }
    .page-header p{
      margin-top:5px;font-size:0.88rem;
      color:var(--mid);font-weight:300;
    }

    /* ── STATUS BANNER ── */
    .week-banner{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px 22px;
      display:flex;align-items:center;justify-content:space-between;
      gap:16px;margin-bottom:24px;
      box-shadow:0 2px 12px rgba(0,0,0,0.05);
    }
    .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .status-label{font-size:0.82rem;font-weight:500;color:var(--mid);text-transform:uppercase;letter-spacing:0.05em}
    .status-text{font-size:0.88rem;color:var(--dark)}
    .btn-primary{
      background:var(--clay);color:white;
      border:none;border-radius:10px;
      padding:9px 18px;
      font-family:'DM Sans',sans-serif;
      font-size:0.85rem;font-weight:500;
      cursor:pointer;white-space:nowrap;
      transition:background 0.18s,transform 0.12s;
      box-shadow:0 3px 10px rgba(200,103,74,0.3);
    }
    .btn-primary:hover{background:var(--clay-dark);transform:translateY(-1px)}
    .btn-primary:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-secondary{
      background:white;color:var(--dark);
      border:1.5px solid var(--border);border-radius:10px;
      padding:8px 16px;
      font-family:'DM Sans',sans-serif;
      font-size:0.85rem;font-weight:400;
      cursor:pointer;white-space:nowrap;
      transition:border-color 0.18s,background 0.18s;
    }
    .btn-secondary:hover{border-color:var(--clay);background:rgba(200,103,74,0.04)}

    /* ── GRID ── */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px}
    @media(max-width:720px){
      .grid-2,.grid-3{grid-template-columns:1fr}
    }

    /* ── CARDS ── */
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:22px;
      box-shadow:0 2px 12px rgba(0,0,0,0.05);
    }
    .card-header{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:16px;
    }
    .card-title{
      font-size:0.78rem;font-weight:500;
      text-transform:uppercase;letter-spacing:0.07em;
      color:var(--mid);
    }

    /* ── MEAL POOL ── */
    .meal-list{display:flex;flex-direction:column;gap:10px}
    .meal-item{
      display:flex;align-items:center;justify-content:space-between;
      padding:11px 14px;
      background:rgba(255,255,255,0.6);
      border:1px solid rgba(200,180,160,0.3);
      border-radius:10px;
      transition:border-color 0.15s,background 0.15s;
    }
    .meal-item:hover{border-color:var(--clay);background:rgba(255,255,255,0.85)}
    .meal-name{font-size:0.9rem;font-weight:400}
    .meal-meta{font-size:0.75rem;color:var(--mid)}
    .meal-actions{display:flex;gap:6px}

    /* ── TAGS ── */
    .tag{
      display:inline-flex;align-items:center;
      font-size:0.7rem;font-weight:500;
      padding:3px 9px;border-radius:999px;
    }
    .tag-green{background:rgba(74,124,89,0.12);color:var(--green)}
    .tag-amber{background:rgba(184,134,11,0.12);color:var(--amber)}
    .tag-clay{background:rgba(200,103,74,0.12);color:var(--clay)}
    .tag-blue{background:rgba(46,95,138,0.12);color:var(--blue)}
    .tag-gray{background:rgba(107,95,84,0.1);color:var(--mid)}

    /* ── REQUESTS ── */
    .request-item{
      padding:12px 14px;
      border-left:3px solid var(--clay);
      background:rgba(200,103,74,0.05);
      border-radius:0 10px 10px 0;
      margin-bottom:10px;
    }
    .request-from{font-size:0.74rem;font-weight:500;color:var(--clay);margin-bottom:3px}
    .request-text{font-size:0.85rem;color:var(--dark)}
    .request-reason{font-size:0.78rem;color:var(--mid);margin-top:3px;font-style:italic}
    .request-btns{display:flex;gap:8px;margin-top:10px}

    /* ── STAT TILES ── */
    .stat-tile{text-align:center}
    .stat-num{font-family:'Playfair Display',serif;font-size:2rem;color:var(--dark)}
    .stat-label{font-size:0.76rem;color:var(--mid);margin-top:2px}

    /* ── INVENTORY ── */
    .inv-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:9px 0;border-bottom:1px solid rgba(200,180,160,0.2);
    }
    .inv-row:last-child{border-bottom:none}
    .inv-name{font-size:0.88rem}
    .inv-toggle{display:flex;gap:6px}
    .have-btn,.need-btn{
      padding:4px 12px;font-size:0.72rem;font-weight:500;
      border-radius:999px;border:1.5px solid;cursor:pointer;
      font-family:'DM Sans',sans-serif;transition:all 0.15s;
    }
    .have-btn{border-color:var(--green);color:var(--green);background:transparent}
    .have-btn.active{background:var(--green);color:white}
    .need-btn{border-color:#C44;color:#C44;background:transparent}
    .need-btn.active{background:#C44;color:white}

    /* ── SHOPPING LIST ── */
    .shop-category-label{
      font-size:0.7rem;font-weight:500;
      text-transform:uppercase;letter-spacing:0.07em;
      color:var(--mid);margin:16px 0 8px;
      padding-bottom:4px;
      border-bottom:1px solid var(--border);
    }
    .shop-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:9px 0;
      border-bottom:1px solid rgba(200,180,160,0.15);
      gap:12px;
    }
    .shop-row:last-child{border-bottom:none}
    .shop-names{flex:1;min-width:0}
    .shop-name-en{font-size:0.88rem;font-weight:400;color:var(--dark)}
    .shop-name-es{font-size:0.74rem;color:var(--mid);margin-top:1px}
    .shop-link{
      display:inline-flex;align-items:center;gap:5px;
      font-size:0.75rem;font-weight:500;color:var(--clay);
      text-decoration:none;padding:4px 10px;
      border:1.5px solid rgba(200,103,74,0.3);
      border-radius:999px;white-space:nowrap;
      transition:all 0.15s;background:rgba(200,103,74,0.04);
      flex-shrink:0;
    }
    .shop-link:hover{background:var(--clay);color:white;border-color:var(--clay)}
    .add-link-btn{
      font-size:0.72rem;font-weight:500;color:var(--mid);
      background:transparent;border:1.5px dashed var(--border);
      border-radius:999px;padding:4px 10px;cursor:pointer;
      font-family:'DM Sans',sans-serif;white-space:nowrap;
      transition:all 0.15s;flex-shrink:0;
    }
    .add-link-btn:hover{border-color:var(--clay);color:var(--clay)}
    .add-link-form{
      display:flex;gap:6px;align-items:center;
      margin-top:6px;flex-wrap:wrap;
    }
    .add-link-input{
      flex:1;min-width:180px;
      padding:5px 10px;
      border:1.5px solid var(--clay);border-radius:8px;
      font-family:'DM Sans',sans-serif;font-size:0.78rem;
      outline:none;color:var(--dark);
    }
    .save-link-btn{
      padding:5px 12px;font-size:0.75rem;font-weight:500;
      background:var(--clay);color:white;border:none;
      border-radius:8px;cursor:pointer;
      font-family:'DM Sans',sans-serif;white-space:nowrap;
      transition:background 0.15s;
    }
    .save-link-btn:hover{background:var(--clay-dark)}
    .cancel-link-btn{
      padding:5px 10px;font-size:0.75rem;
      background:none;border:none;cursor:pointer;
      color:var(--mid);font-family:'DM Sans',sans-serif;
    }
    .cancel-link-btn:hover{color:var(--dark)}

    /* ── CASA KING SECTION ── */
    .casa-king-section{
      margin-top:24px;
      padding-top:20px;
      border-top:2px dashed rgba(200,180,160,0.4);
    }
    .casa-king-header{
      display:flex;align-items:center;gap:10px;
      margin-bottom:14px;
    }
    .casa-king-badge{
      font-size:0.68rem;font-weight:500;
      letter-spacing:0.06em;text-transform:uppercase;
      background:rgba(46,95,138,0.1);color:var(--blue);
      padding:3px 9px;border-radius:999px;
    }
    .ck-item-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 0;
      border-bottom:1px solid rgba(200,180,160,0.15);
      gap:10px;
    }
    .ck-item-row:last-child{border-bottom:none}
    .ck-item-text{font-size:0.88rem;color:var(--dark)}
    .ck-done-btn{
      padding:4px 12px;font-size:0.72rem;font-weight:500;
      border-radius:999px;border:1.5px solid var(--green);
      color:var(--green);background:transparent;cursor:pointer;
      font-family:'DM Sans',sans-serif;transition:all 0.15s;
      white-space:nowrap;flex-shrink:0;
    }
    .ck-done-btn:hover{background:var(--green);color:white}
    .ck-done-btn.done{
      background:var(--green);color:white;
      opacity:0.5;cursor:default;
      text-decoration:line-through;
    }
    .ck-item-row.ticked .ck-item-text{
      text-decoration:line-through;color:var(--mid);opacity:0.6;
    }

    /* ── TIER OVERRIDE ── */
    .tier-badge{
      display:inline-flex;align-items:center;gap:5px;
      font-size:0.68rem;font-weight:500;
      padding:2px 8px;border-radius:999px;
      border:1.5px solid;cursor:pointer;
      font-family:'DM Sans',sans-serif;
      transition:all 0.15s;white-space:nowrap;
    }
    .tier-badge:hover{opacity:0.8}
    .tier-weekly  {color:#4A7C59;border-color:rgba(74,124,89,0.4);background:rgba(74,124,89,0.08)}
    .tier-regular {color:#2E5F8A;border-color:rgba(46,95,138,0.4);background:rgba(46,95,138,0.08)}
    .tier-occasional{color:#B8860B;border-color:rgba(184,134,11,0.4);background:rgba(184,134,11,0.08)}
    .tier-rare    {color:#C8674A;border-color:rgba(200,103,74,0.4);background:rgba(200,103,74,0.08)}
    .tier-hibernated{color:#6B5F54;border-color:rgba(107,95,84,0.3);background:rgba(107,95,84,0.07)}
    .tier-locked::after{content:' 🔒';font-size:0.6rem}
    .tier-select{
      width:100%;padding:9px 12px;
      border:1.5px solid var(--border);border-radius:10px;
      font-family:'DM Sans',sans-serif;font-size:0.88rem;
      outline:none;background:white;margin-bottom:10px;
    }
    .tier-select:focus{border-color:var(--clay)}

    /* ── SIDE SWAP ── */
    .side-swap-btn{
      font-size:0.7rem;font-weight:500;
      color:var(--blue);background:rgba(46,95,138,0.08);
      border:1.5px solid rgba(46,95,138,0.25);
      border-radius:999px;padding:2px 9px;cursor:pointer;
      font-family:'DM Sans',sans-serif;white-space:nowrap;
      transition:all 0.15s;margin-left:6px;
    }
    .side-swap-btn:hover{background:var(--blue);color:white;border-color:var(--blue)}
    .side-swap-select{
      width:100%;padding:9px 12px;
      border:1.5px solid var(--border);border-radius:10px;
      font-family:'DM Sans',sans-serif;font-size:0.88rem;
      outline:none;background:white;margin-bottom:12px;
    }
    .side-swap-select:focus{border-color:var(--clay)}

    /* ── EMPTY STATE ── */
    .empty{
      text-align:center;padding:32px 16px;
      color:var(--mid);font-size:0.85rem;
    }
    .empty-icon{font-size:2rem;margin-bottom:8px;display:block}

    /* ── SECTION DIVIDER ── */
    .section-label{
      font-size:0.72rem;font-weight:500;
      text-transform:uppercase;letter-spacing:0.1em;
      color:var(--mid);margin:28px 0 12px;
    }

    /* ── LOADING ── */
    #loading{
      position:fixed;inset:0;z-index:999;
      display:flex;align-items:center;justify-content:center;
      background:var(--cream);
    }
    .spin{
      width:36px;height:36px;
      border:3px solid var(--light);
      border-top-color:var(--clay);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    #app{display:none}
    #app.ready{display:block}

    /* ── MODAL ── */
    .modal-overlay{
      position:fixed;inset:0;z-index:200;
      background:rgba(26,22,18,0.5);
      display:flex;align-items:center;justify-content:center;
      padding:20px;
    }
    .modal{
      background:white;border-radius:var(--radius);
      padding:28px;width:100%;max-width:440px;
      box-shadow:0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h3{font-size:1.05rem;font-weight:500;margin-bottom:8px}
    .modal p{font-size:0.85rem;color:var(--mid);margin-bottom:16px}
    .modal textarea{
      width:100%;padding:10px 12px;
      border:1.5px solid var(--light);border-radius:10px;
      font-family:'DM Sans',sans-serif;font-size:0.88rem;
      resize:vertical;min-height:80px;outline:none;
      transition:border-color 0.2s;
    }
    .modal textarea:focus{border-color:var(--clay)}
    .modal-btns{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}
    .btn-ghost{
      background:none;border:none;cursor:pointer;
      font-family:'DM Sans',sans-serif;font-size:0.85rem;
      color:var(--mid);padding:8px 14px;border-radius:8px;
      transition:background 0.15s;
    }
    .btn-ghost:hover{background:var(--light)}

    /* ── EATING OUT SELECTOR ── */
    .day-selector{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
    .day-btn{
      padding:7px 14px;border-radius:999px;
      border:1.5px solid var(--border);
      background:white;font-family:'DM Sans',sans-serif;
      font-size:0.82rem;cursor:pointer;transition:all 0.15s;
    }
    .day-btn.selected{background:var(--clay);border-color:var(--clay);color:white}
    .day-count{
      font-family:'Playfair Display',serif;
      font-size:1.6rem;color:var(--clay);
      display:inline;margin-right:6px;
    }

    /* ── RATING ── */
    .rating-prompt{
      margin-top:10px;padding:12px 14px;
      background:rgba(200,103,74,0.06);
      border:1px solid rgba(200,103,74,0.2);
      border-radius:10px;
    }
    .rating-prompt-label{font-size:0.78rem;color:var(--clay);font-weight:500;margin-bottom:8px}
    .star-row{display:flex;gap:6px;align-items:center}
    .star-btn{
      font-size:1.4rem;background:none;border:none;
      cursor:pointer;padding:2px;line-height:1;
      transition:transform 0.1s;color:#ccc;
    }
    .star-btn:hover,.star-btn.active{color:#C8674A;transform:scale(1.15)}
    .rating-submit-btn{
      margin-top:8px;padding:5px 14px;
      font-size:0.78rem;font-weight:500;
      background:var(--clay);color:white;
      border:none;border-radius:8px;cursor:pointer;
      font-family:'DM Sans',sans-serif;
      transition:background 0.15s;
    }
    .rating-submit-btn:hover{background:var(--clay-dark)}
    .rating-submitted{
      font-size:0.78rem;color:var(--green);
      margin-top:6px;font-weight:500;
    }
    .meal-item.cooked{
      opacity:0.6;
      background:rgba(74,124,89,0.06);
      border-color:rgba(74,124,89,0.2);
    }
    .meal-item.cooked .meal-name::after{
      content:' ✓';color:var(--green);font-size:0.8rem;
    }
    .tier-change-toast{
      display:flex;flex-direction:column;gap:2px;
    }

    .fade-in{animation:fadeIn 0.4s ease both}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* ── PREP WARNINGS ── */
    .prep-warning-modal{
      background:white;border-radius:var(--radius);
      padding:28px;width:100%;max-width:460px;
      box-shadow:0 20px 60px rgba(0,0,0,0.2);
    }
    .prep-warning-modal .warn-icon{font-size:2rem;margin-bottom:10px}
    .prep-warning-modal h3{font-size:1.05rem;font-weight:500;margin-bottom:6px;color:#c03030}
    .prep-warning-modal .warn-reason{
      font-size:0.85rem;color:var(--dark);margin-bottom:14px;
      padding:10px 14px;background:rgba(200,50,50,0.06);
      border-left:3px solid #c44;border-radius:0 8px 8px 0;
    }
    .prep-warning-modal .alt-label{
      font-size:0.74rem;font-weight:500;text-transform:uppercase;
      letter-spacing:0.07em;color:var(--mid);margin-bottom:8px;
    }
    .prep-alt-item{
      padding:8px 12px;border-radius:8px;
      background:rgba(74,124,89,0.07);
      border:1px solid rgba(74,124,89,0.2);
      font-size:0.85rem;margin-bottom:6px;color:var(--dark);
    }
    .schedule-btn{
      padding:4px 10px;font-size:0.72rem;font-weight:500;
      border-radius:999px;border:1.5px solid var(--border);
      color:var(--mid);background:transparent;cursor:pointer;
      font-family:'DM Sans',sans-serif;transition:all 0.15s;
      white-space:nowrap;
    }
    .schedule-btn:hover{border-color:var(--blue);color:var(--blue)}
    .btn-remove-meal{
      padding:3px 9px;font-size:0.68rem;font-weight:500;
      border-radius:999px;border:1.5px solid rgba(200,103,74,0.3);
      color:var(--clay);background:transparent;cursor:pointer;
      font-family:'DM Sans',sans-serif;transition:all 0.15s;
      white-space:nowrap;opacity:0.75;
    }
    .btn-remove-meal:hover{background:rgba(200,103,74,0.08);opacity:1;border-color:var(--clay)}
    .meal-side{
      font-size:0.72rem;color:var(--mid);margin-top:3px;
      display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    }
    .meal-side span{font-weight:500;color:var(--dark)}

async function ckFetch(path, options = {}) {
  const res = await fetch(`${CK_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': CK_KEY,
      'Authorization': `Bearer ${CK_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || '',
      ...(options.headers || {})
    }
  });
  if (!res.ok) throw new Error(`Casa King API error: ${res.status}`);

const KAREN_CATEGORY_RULES = [
  { cat:'Meats & Eggs',         words:['chicken','beef','pork','steak','egg','eggs','lamb','fish','tuna','mince','ham','sausage','bacon','arrachera','milanesa','muslo','huevo'] },
  { cat:'Dairy',                words:['milk','cream','butter','cheese','yogurt','queso','crema','leche','mantequilla','parmesan','mozzarella'] },
  { cat:'Produce',              words:['tomato','onion','garlic','carrot','potato','lemon','lime','orange','avocado','mushroom','lettuce','apple','pumpkin','capsicum','ginger','zucchini','cebolla','jitomate','zanahoria','papa','naranja','aguacate','champiñon','jengibre','calabaza','camote','sweet potato'] },
  { cat:'Grains, Pasta & Bakery',words:['pasta','rice','bread','flour','tortilla','noodle','yeast','arroz','harina','pan','lasagna','gnocchi','pastry'] },
  { cat:'Canned & Packaged',    words:['canned','tin','sauce','paste','stock','broth','cornflour','coconut','soy','ketchup','peanut','jam','vinegar','oil','olive','sugar','salt','pepper','spice','paprika','cumin','curry','mustard','chili','salsa','pesto','worcestershire','oyster','dijon','maple','honey'] },
  { cat:'Herbs, Vinegar & Condiments', words:['herb','thyme','parsley','basil','oregano','dill','cilantro','vinagre','tomillo'] },
];

function guessKarenCategory(name) {
  const lower = name.toLowerCase();
  for (const rule of KAREN_CATEGORY_RULES) {
    if (rule.words.some(w => lower.includes(w))) return rule.cat;
  }
  return 'Other';
}

let karenAdditions = [];

async function loadKarenAdditions() {
  if (!currentPlan) { karenAdditions = []; return; }
  const { data, error } = await sb
    .from('karen_additions')
    .select('*')
    .eq('plan_id', currentPlan.id)
    .order('added_at', { ascending: true });
  karenAdditions = (!error && data) ? data : [];
}

async function addKarenItem() {
  const input = document.getElementById('karen-add-input');
  if (!input) return;
  const name = input.value.trim();
  if (!name) { showToast('Type an item first', 'error'); return; }
  if (!currentPlan) { showToast('No active plan', 'error'); return; }

  // Duplicate check
  if (karenAdditions.some(a => a.name_en.toLowerCase() === name.toLowerCase())) {
    showToast('That item is already on the list', 'error'); return;
  }

  const cat = guessKarenCategory(name);
  const { data, error } = await sb.from('karen_additions').insert({
    plan_id: currentPlan.id,
    name_en: name,
    lacomer_category: cat,
    added_by: userProfile.id,
    added_at: new Date().toISOString()
  }).select().single();

  if (error) { showToast('Error adding item: ' + error.message, 'error'); return; }
  karenAdditions.push(data);
  input.value = '';
  renderKarenAdditionsList();
  showToast(`"${name}" added to shopping list ✓`);
}

async function removeKarenItem(id) {
  const { error } = await sb.from('karen_additions').delete().eq('id', id);
  if (error) { showToast('Error removing item', 'error'); return; }
  karenAdditions = karenAdditions.filter(a => a.id !== id);
  renderKarenAdditionsList();
}

function renderKarenAdditionsList() {
  const el = document.getElementById('karen-additions-list');
  if (!el) return;
  if (karenAdditions.length === 0) {
    el.innerHTML = `<div style="font-size:0.82rem;color:var(--mid)">No items added yet</div>`;
    return;
  }
  el.innerHTML = karenAdditions.map(a =>
    `<div class="karen-addition-item">
      <span>${a.name_en} <em style="font-size:0.72rem;color:var(--mid)">· ${a.lacomer_category}</em></span>
      <button class="karen-rm-btn" onclick="removeKarenItem('${a.id}')" title="Remove">✕</button>
    </div>`
  ).join('');
}

// ── WEEK HELPERS ─────────────────────────────────────────
function planDateLabel(plan) {
  if (!plan) return '';
  const d = new Date(plan.week_start + 'T12:00:00');
  return d.toLocaleDateString('en-AU', { month:'long', day:'numeric', year:'numeric' });
}

function getTodayDate() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

// ── LOAD CURRENT PLAN ────────────────────────────────────
async function loadWeekData() {
  const { data: planData } = await sb
    .from('weekly_plans')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(1)
    .maybeSingle();

  currentPlan  = planData || null;
  currentMeals = [];

  if (currentPlan) {
    const { data: mealData } = await sb
      .from('weekly_plan_meals')
      .select('*, recipes(id, name_en, name_es, prep_time_minutes, cook_time_minutes, advance_prep_required, advance_prep_description, same_day_cookable, avg_rating, default_side_en, default_side_es, frequency_tier, frequency_override)')
      .eq('plan_id', currentPlan.id);
    currentMeals = mealData || [];
  }
}

async function loadRecipes() {
  const { data } = await sb.from('recipes').select('*').order('name_en');

function renderCameron(recipes, name) {
  const hasPlan        = currentPlan !== null;
  const mealCount      = currentMeals.length;
  const eatingOutDays  = currentPlan?.eating_out_days || [];

function cookedBtn(recipeId, planMealId, small) {
  const sz = small ? 'font-size:0.75rem;padding:4px 10px' : 'font-size:0.78rem;padding:5px 10px';
  return '<button class="btn-secondary" style="' + sz + '" onclick="markCooked(\'' + recipeId + '\',\'' + planMealId + '\')">✓ Cooked</button>';
}

function mealRowAdmin(m) {
  if (!m) return '';
  const r = m.recipes || m;
  const planMeal = currentMeals.find(pm => pm.recipe_id === r.id) || {};
  const isCooked = planMeal.cooked === true;
  const ratingWindowOpen = isCooked && isWithin24Hours(planMeal.cooked_at);
  const myRating = myRatingsThisWeek[r.id];
  const avgStr = r.avg_rating ? ' · ⭐ ' + Number(r.avg_rating).toFixed(1) : '';
  const ratingHtml = ratingWindowOpen && !myRating ? ratingPromptHTML(r.id) : '';
  const ratedHtml = myRating ? '<div class="rating-submitted">Your rating: ' + '★'.repeat(myRating) + '☆'.repeat(5 - myRating) + '</div>' : '';

  const scheduledLabel = planMeal.assigned_day
    ? `<span class="scheduled-tag">📅 ${dateToDayName(planMeal.assigned_day)}${planMeal.target_eat_time ? ' · eat ' + planMeal.target_eat_time : ''}${planMeal.prep_start_time ? ' · prep ' + planMeal.prep_start_time : ''}</span>`
    : `<button class="schedule-btn" onclick="openScheduleModal('${r.id}')">📅 Schedule</button>`;

  const advPrepTag = r.advance_prep_required
    ? `<span class="tag tag-amber" style="font-size:0.65rem;padding:2px 7px">⏰ Advance prep</span>`
    : '';

  const tierKey = r.frequency_tier || 'regular';
  const tierLabel = TIER_LABELS[tierKey] || tierKey;
  const isLocked = r.frequency_override === true;
  const tierBadge = `<button class="tier-badge tier-${tierKey}${isLocked?' tier-locked':''}" title="${isLocked?'Override active — click to change':'Click to override frequency tier'}" onclick="openTierModal('${r.id}','${tierKey}',${isLocked})">${tierLabel}</button>`;

  const actionHtml = !isCooked ? cookedBtn(r.id, planMeal.id, false) : '<span class="tag tag-green">Cooked</span>';
  const removeBtn = !isCooked
    ? `<button class="btn-remove-meal" title="Remove from this week" onclick="removeMealFromPlan('${planMeal.id}','${r.name_en}')">✕ Remove</button>`
    : '';
  const hibernateBtn = !isCooked
    ? `<button class="btn-remove-meal" title="Hibernate this meal" style="color:#6B5F54;border-color:rgba(107,95,84,0.3)" onclick="openHibernateModal('${r.id}','${r.name_en.replace(/'/g,"\\'")}')">😴 Hibernate</button>`
    : '';
  const sideHtml = `<div class="meal-side" id="side-row-${r.id}">🍽 With: <span id="side-label-${r.id}">${r.default_side_en || 'No side set'}</span>${r.default_side_es ? ' · <em id="side-label-es-' + r.id + '">' + r.default_side_es + '</em>' : '<em id="side-label-es-' + r.id + '"></em>'} <button class="side-edit-btn" onclick="openSideDropdown(event,'${r.id}','${(r.default_side_en||'').replace(/'/g,"\\'")}')">✏️ change</button><div class="side-dropdown-wrap" id="side-dd-${r.id}" style="display:none"><div class="side-dropdown-panel"><input type="text" id="side-input-${r.id}" placeholder="Or type a new side..." oninput="filterSideOptions('${r.id}',this.value)"><div class="side-options" id="side-opts-${r.id}"></div><div class="side-dropdown-footer"><button class="side-cancel-btn" onclick="closeSideDropdown('${r.id}')">Cancel</button><button class="side-save-btn" onclick="saveSide('${r.id}')">Save</button></div></div></div></div>`;
  return '<div class="meal-item ' + (isCooked ? 'cooked' : '') + '" id="meal-item-' + r.id + '">'
    + '<div style="flex:1">'
    + '<div class="meal-name" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' + r.name_en + ' ' + advPrepTag + ' ' + tierBadge + '</div>'
    + '<div class="meal-meta" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px">'
    + (r.prep_time_minutes || '—') + ' min prep · ' + (r.cook_time_minutes || '—') + ' min cook' + avgStr
    + ' ' + scheduledLabel
    + '</div>'
    + sideHtml
    + ratingHtml + ratedHtml
    + '</div>'
    + '<div class="meal-actions" style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">' + actionHtml + removeBtn + hibernateBtn + '</div>'
    + '</div>';
}

// ── INVENTORY ────────────────────────────────────────────
let inventoryItems    = [];
let inventoryState    = {};

async function loadInventory() {
  if (!currentPlan) return;

  inventoryState = currentPlan.inventory || {};

  const { data: planMeals, error: pmError } = await sb
    .from('weekly_plan_meals')
    .select('recipe_id')
    .eq('plan_id', currentPlan.id);

  if (pmError || !planMeals || planMeals.length === 0) {
    document.getElementById('inv-list').innerHTML =
      '<div class="empty">No meals in this plan</div>';
    return;
  }

  const recipeIds = planMeals.map(m => m.recipe_id);

  const { data, error } = await sb
    .from('ingredients')
    .select('id, name_en, name_es, lacomer_category')
    .in('recipe_id', recipeIds);

  if (error || !data) {
    document.getElementById('inv-list').innerHTML =
      '<div class="empty">Could not load ingredients</div>';
    return;
  }

  const seen = new Set();
  inventoryItems = [];
  for (const ing of data) {
    if (!seen.has(ing.name_en)) {
      seen.add(ing.name_en);
      inventoryItems.push(ing);
      if (!inventoryState[ing.id]) inventoryState[ing.id] = 'need';
    }
  }

  inventoryItems.sort((a,b) =>
    (a.lacomer_category||'').localeCompare(b.lacomer_category||'') ||
    a.name_en.localeCompare(b.name_en)
  );

  renderInventoryList();

  // Load shopping preview after inventory is ready
  if (userProfile.role === 'planner') loadSiennaShoppingPreview();
  if (userProfile.role === 'reviewer') loadKarenShoppingPreview();
}

function renderInventoryList() {
  const el = document.getElementById('inv-list');
  if (!el) return;

  const groups = {};
  for (const item of inventoryItems) {
    const cat = item.lacomer_category || 'Other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(item);
  }

  let html = '';
  for (const [cat, items] of Object.entries(groups)) {
    html += `<div style="font-size:0.7rem;font-weight:500;text-transform:uppercase;
      letter-spacing:0.07em;color:var(--mid);margin:12px 0 6px">${cat}</div>`;
    for (const item of items) {
      const status = inventoryState[item.id] || 'need';
      html += `
      <div class="inv-row">
        <div>
          <div class="inv-name">${item.name_en}</div>
          <div style="font-size:0.72rem;color:var(--mid)">${item.name_es}</div>
        </div>
        <div class="inv-toggle">
          <button class="have-btn ${status==='have'?'active':''}"
            onclick="setInv('${item.id}','have',this)">Have</button>
          <button class="need-btn ${status==='need'?'active':''}"
            onclick="setInv('${item.id}','need',this)">Need</button>
        </div>
      </div>`;
    }
  }

  el.innerHTML = html || '<div class="empty">No ingredients found</div>';
}

function setInv(id, status, btn) {
  inventoryState[id] = status;
  const row = btn.closest('.inv-toggle');
  row.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function submitInventory() {
  if (!currentPlan) return;
  const { error } = await sb
    .from('weekly_plans')
    .update({ inventory: inventoryState })
    .eq('id', currentPlan.id);
  if (error) { showToast('Error saving inventory: ' + error.message, 'error'); return; }
  currentPlan.inventory = { ...inventoryState };
  await renderDashboard();
  showToast('Inventory saved ✓');
}

// ═══════════════════════════════════════════════════════════
// FREQUENCY-TIER MEAL SUGGESTION ENGINE
// ═══════════════════════════════════════════════════════════

const TIER_INTERVALS = {
  weekly:    2,
  regular:   4,
  occasional:8,
  rare:      12,
  hibernated:Infinity
};

const TIER_ORDER = ['weekly', 'regular', 'occasional', 'rare'];

const TIER_THRESHOLDS = [
  { min: 4.5, tier: 'weekly' },
  { min: 3.5, tier: 'regular' },
  { min: 2.5, tier: 'occasional' },
  { min: 1.5, tier: 'rare' },
  { min: 0,   tier: 'hibernated' }
];

function tierFromRating(avg) {
  for (const t of TIER_THRESHOLDS) {
    if (avg >= t.min) return t.tier;
  }
  return 'hibernated';
}

const TIER_LABELS = {
  weekly:    'Weekly Favourite',
  regular:   'Regular',
  occasional:'Occasional',
  rare:      'Rare',
  hibernated:'Hibernated'
};

async function selectMealsForWeek(allRecipes, homeMealsNeeded) {
  if (homeMealsNeeded <= 0) return [];

  const { data: allPlanMeals } = await sb
    .from('weekly_plan_meals')
    .select('recipe_id, plan_id');

  const { data: allPlans } = await sb
    .from('weekly_plans')
    .select('id, week_start');

  const planDateMap = {};
  if (allPlans) {
    for (const plan of allPlans) {
      planDateMap[plan.id] = new Date(plan.week_start + 'T12:00:00');
    }
  }

  const lastSeenMap = {};
  if (allPlanMeals) {
    for (const row of allPlanMeals) {
      const planDate = planDateMap[row.plan_id];
      if (!planDate) continue;
      if (!lastSeenMap[row.recipe_id] || planDate > lastSeenMap[row.recipe_id]) {
        lastSeenMap[row.recipe_id] = planDate;
      }
    }
  }

  const now = new Date();

  function weeksAgo(date) {
    return (now - date) / (1000 * 60 * 60 * 24 * 7);
  }

  function isEligible(recipe, intervalOverride) {
    if (recipe.frequency_tier === 'hibernated') return false;
    const interval = intervalOverride ?? TIER_INTERVALS[recipe.frequency_tier] ?? 8;
    if (interval === Infinity) return false;
    const lastSeen = lastSeenMap[recipe.id];
    if (!lastSeen) return true;
    return weeksAgo(lastSeen) >= interval;
  }

  let eligible = allRecipes.filter(r => isEligible(r));

  if (eligible.length < homeMealsNeeded) {
    for (const tier of TIER_ORDER) {
      if (eligible.length >= homeMealsNeeded) break;
      const alreadyIn = new Set(eligible.map(r => r.id));
      const extras = allRecipes.filter(r =>
        r.frequency_tier === tier &&
        !alreadyIn.has(r.id) &&
        isEligible(r, Math.max(1, Math.floor((TIER_INTERVALS[r.frequency_tier] || 8) / 2)))
      );
      eligible = [...eligible, ...extras];
    }
  }

  if (eligible.length < homeMealsNeeded) {
    const alreadyIn = new Set(eligible.map(r => r.id));
    const fallback = allRecipes.filter(r =>
      r.frequency_tier !== 'hibernated' &&
      !alreadyIn.has(r.id)
    );
    eligible = [...eligible, ...fallback];
  }

  const shuffled = eligible.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, homeMealsNeeded);
}

function showToast(msg, type = 'success') {

  t.style.cssText = `
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
    background:${type === 'error' ? '#c44' : '#4A7C59'};color:white;

// RESHUFFLE
// ═══════════════════════════════════════════════════════════
async function doReshuffle(btn) {
  if (!currentPlan || currentPlan.reshuffle_used) return;

  btn.disabled = true;
  btn.textContent = '🔀 Reshuffling...';

  try {
    const allRecipes = await loadRecipes();
    const homeMeals  = Math.max(0, 7 - (currentPlan.eating_out_days?.length || 0));
    const picked     = await selectMealsForWeek(allRecipes, homeMeals);

    const { error: delError } = await sb
      .from('weekly_plan_meals')
      .delete()
      .eq('plan_id', currentPlan.id);
    if (delError) throw delError;

    if (picked.length > 0) {
      const { error: insError } = await sb
        .from('weekly_plan_meals')
        .insert(picked.map(r => ({ plan_id: currentPlan.id, recipe_id: r.id, cooked: false })));
      if (insError) throw insError;
    }

    const { error: updError } = await sb
      .from('weekly_plans')
      .update({ reshuffle_used: true })
      .eq('id', currentPlan.id);
    if (updError) throw updError;

    await loadWeekData();
    await loadMyRatingsThisWeek();
    await renderDashboard();
    showToast('Meals reshuffled ✓ — reshuffle used for this week');

  } catch (err) {
    btn.disabled = false;
    btn.textContent = '🔀 Reshuffle (1 remaining)';
    showToast('Something went wrong — ' + err.message, 'error');
  }
}

let myRatingsThisWeek = {};

async function loadMyRatingsThisWeek() {
  if (!currentPlan) return;
  const recipeIds = currentMeals.map(m => m.recipe_id);
  if (recipeIds.length === 0) return;
  const { data } = await sb

    for (const row of data) {
      myRatingsThisWeek[row.recipe_id] = row.rating;
    }
  }
}

function isWithin24Hours(cookedAt) {
  if (!cookedAt) return false;
  const cooked = new Date(cookedAt);
  const now = new Date();
  return (now - cooked) < 24 * 60 * 60 * 1000;
}

function ratingPromptHTML(recipeId) {
  return `
  <div class="rating-prompt" id="rating-prompt-${recipeId}">
    <div class="rating-prompt-label">⭐ Rate this meal (window closes in 24hrs)</div>
    <div class="star-row" id="stars-${recipeId}">
      ${[1,2,3,4,5].map(n => `
        <button class="star-btn" data-val="${n}"
          onclick="selectStar('${recipeId}', ${n})">☆</button>
      `).join('')}
      <button class="rating-submit-btn" id="rate-submit-${recipeId}"
        style="display:none" onclick="submitRating('${recipeId}')">Submit</button>
    </div>
  </div>`;
}

function selectStar(recipeId, val) {
  const row = document.getElementById(`stars-${recipeId}`);
  if (!row) return;
  row.querySelectorAll('.star-btn').forEach(btn => {
    const n = parseInt(btn.dataset.val);
    btn.textContent = n <= val ? '★' : '☆';
    btn.classList.toggle('active', n <= val);
  });
  row.dataset.selected = val;
  const submitBtn = document.getElementById(`rate-submit-${recipeId}`);
  if (submitBtn) submitBtn.style.display = 'inline-block';
}

async function submitRating(recipeId) {
  const row = document.getElementById(`stars-${recipeId}`);
  if (!row) return;
  const val = parseInt(row.dataset.selected);
  if (!val) { showToast('Pick a star rating first', 'error'); return; }

  const submitBtn = document.getElementById(`rate-submit-${recipeId}`);
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Saving...'; }

  try {
    const { count } = await sb
      .from('ratings')
      .select('id', { count: 'exact', head: true })
      .eq('recipe_id', recipeId)
      .eq('rating_type', 'cook')
      .eq('user_id', userProfile.id);

    const cookNumber = (count || 0) + 1;

    const { error: rateError } = await sb.from('ratings').insert({
      recipe_id: recipeId,
      user_id: userProfile.id,
      rating: val,
      rating_type: 'cook',
      cook_number: cookNumber,
      created_at: new Date().toISOString()
    });
    if (rateError) throw rateError;

    myRatingsThisWeek[recipeId] = val;
    await recalculateRecipeRating(recipeId);

    const prompt = document.getElementById(`rating-prompt-${recipeId}`);
    if (prompt) {
      prompt.outerHTML = `<div class="rating-submitted">Your rating: ${'★'.repeat(val)}${'☆'.repeat(5-val)} — saved ✓</div>`;
    }
    showToast('Rating saved ✓');

  } catch(err) {
    showToast('Error saving rating: ' + err.message, 'error');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Submit'; }
  }
}

async function recalculateRecipeRating(recipeId) {
  const { data: allRatings } = await sb
    .from('ratings')
    .select('rating, rating_type, cook_number')
    .eq('recipe_id', recipeId);

  if (!allRatings || allRatings.length === 0) return;

  const ideaRatings  = allRatings.filter(r => r.rating_type === 'idea');
  const cookRatings  = allRatings.filter(r => r.rating_type === 'cook');

  const maxCookNum = cookRatings.length > 0
    ? Math.max(...cookRatings.map(r => r.cook_number || 1))
    : 0;

  let newAvg;

  if (cookRatings.length === 0) {
    newAvg = ideaRatings.reduce((s,r) => s + r.rating, 0) / ideaRatings.length;
  } else {
    const cookAvg = cookRatings.reduce((s,r) => s + r.rating, 0) / cookRatings.length;
    if (maxCookNum === 1) {
      const ideaAvg = ideaRatings.reduce((s,r) => s + r.rating, 0) / (ideaRatings.length || 1);
      newAvg = (cookAvg * 0.6) + (ideaAvg * 0.4);
    } else {
      newAvg = cookAvg;
    }
  }

  newAvg = Math.round(newAvg * 100) / 100;
  const newTier = tierFromRating(newAvg);

  const { data: recipe } = await sb
    .from('recipes')
    .select('frequency_tier, frequency_override, name_en')
    .eq('id', recipeId)
    .single();

  const oldTier = recipe?.frequency_tier;
  const tierChanged = newTier !== oldTier && !recipe?.frequency_override;

  const updateData = { avg_rating: newAvg };
  if (tierChanged) updateData.frequency_tier = newTier;

  await sb.from('recipes').update(updateData).eq('id', recipeId);

  if (tierChanged && (userProfile.role === 'admin' || userProfile.role === 'planner')) {
    const direction = TIER_THRESHOLDS.findIndex(t => t.tier === newTier) <
                      TIER_THRESHOLDS.findIndex(t => t.tier === oldTier) ? '⬆️' : '⬇️';
    showToast(
      `${direction} ${recipe.name_en} moved to ${TIER_LABELS[newTier]} (avg ${newAvg.toFixed(1)})`,
      newTier === 'weekly' || newTier === 'regular' ? 'success' : 'error'
    );
  }
}

      <p style="margin-bottom:6px">How good does <strong>${mealName}</strong> sound as a meal? Rate the idea — not the cook.</p>

        <div class="star-row" id="idea-stars-${recipeId}">
          ${[1,2,3,4,5].map(n => `<button class="star-btn" data-val="${n}" onclick="selectIdeaStar('${recipeId}',${n})">☆</button>`).join('')}
        </div>
        <div style="font-size:0.75rem;color:var(--mid);margin-top:8px">
          All three family members will rate — combined average sets the starting frequency tier.
        </div>
      </div>
      <div class="modal-btns">
        <button class="btn-ghost" onclick="closeModal()">Rate later</button>
        <button class="btn-primary" id="idea-submit-${recipeId}" style="display:none"
          onclick="submitIdeaRating('${recipeId}')">Submit rating</button>
      </div>
    </div>`;
  document.body.appendChild(el);
}

function selectIdeaStar(recipeId, val) {
  const row = document.getElementById(`idea-stars-${recipeId}`);
  if (!row) return;
  row.querySelectorAll('.star-btn').forEach(btn => {
    const n = parseInt(btn.dataset.val);
    btn.textContent = n <= val ? '★' : '☆';
    btn.classList.toggle('active', n <= val);
  });
  row.dataset.selected = val;
  const submitBtn = document.getElementById(`idea-submit-${recipeId}`);
  if (submitBtn) submitBtn.style.display = 'inline-block';
}

async function submitIdeaRating(recipeId) {
  const row = document.getElementById(`idea-stars-${recipeId}`);
  if (!row) return;
  const val = parseInt(row.dataset.selected);
  if (!val) { showToast('Pick a star rating first', 'error'); return; }

  const submitBtn = document.getElementById(`idea-submit-${recipeId}`);
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Saving...'; }

  const { error: rateError } = await sb.from('ratings').insert({
    recipe_id: recipeId,
    user_id: userProfile.id,
    rating: val,
    rating_type: 'idea',
    cook_number: null,
    created_at: new Date().toISOString()
  });

  if (rateError) {
    showToast('Error saving rating: ' + rateError.message, 'error');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Submit rating'; }
    return;
  }

  await finaliseIdeaRatingIfComplete(recipeId);
  closeModal();
  showToast('Idea rating saved ✓');
  pendingIdeaRatings = pendingIdeaRatings.filter(r => r.id !== recipeId);

  // Re-render so the inline card disappears
  const inlineCard = document.getElementById(`idea-card-${recipeId}`);
  if (inlineCard) inlineCard.remove();
}

async function finaliseIdeaRatingIfComplete(recipeId) {
  const { data: allIdeaRatings } = await sb.from('ratings')
    .select('rating, user_id')
    .eq('recipe_id', recipeId)
    .eq('rating_type', 'idea');

  if (!allIdeaRatings || allIdeaRatings.length < 3) return;

  const avg = Math.round(
    (allIdeaRatings.reduce((s, r) => s + r.rating, 0) / allIdeaRatings.length) * 100
  ) / 100;
  const tier = tierFromRating(avg);

  await sb.from('recipes')
    .update({ avg_rating: avg, frequency_tier: tier })
    .eq('id', recipeId);

  if (userProfile.role === 'admin' || userProfile.role === 'planner') {
    showToast(`All three rated! ${TIER_LABELS[tier]} tier set (avg ${avg.toFixed(1)}) ✓`);
  }
}

function renderPendingIdeaRatingCards() {
  if (!pendingIdeaRatings || pendingIdeaRatings.length === 0) return '';
  return pendingIdeaRatings.map(r => `
    <div id="idea-card-${r.id}" style="padding:14px 16px;background:rgba(200,103,74,0.07);border:1.5px solid rgba(200,103,74,0.25);border-radius:var(--radius);margin-bottom:12px">
      <div style="font-size:0.78rem;font-weight:500;color:var(--clay);margin-bottom:4px">✨ New meal suggestion — rate the idea</div>
      <div style="font-weight:500;margin-bottom:10px">${r.name_en}</div>
      <div class="star-row" id="idea-stars-${r.id}">
        ${[1,2,3,4,5].map(n => `<button class="star-btn" data-val="${n}" onclick="selectIdeaStar('${r.id}',${n})">☆</button>`).join('')}
        <button class="rating-submit-btn" id="idea-submit-${r.id}" style="display:none" onclick="submitIdeaRating('${r.id}')">Submit</button>
      </div>
    </div>
  `).join('');
}

async function loadSidesLibrary() {
  const { data, error } = await sb.from('sides').select('*').order('name_en');
  if (!error && data) allSides = data;
}

function openSideDropdown(event, recipeId, currentSide) {
  event.stopPropagation();
  // Close any other open dropdowns
  document.querySelectorAll('.side-dropdown-wrap').forEach(el => {
    if (el.id !== 'side-dd-' + recipeId) el.style.display = 'none';
  });
  const dd = document.getElementById('side-dd-' + recipeId);
  if (!dd) return;
  const isOpen = dd.style.display !== 'none';
  dd.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) {
    const input = document.getElementById('side-input-' + recipeId);
    if (input) { input.value = ''; }
    renderSideOptions(recipeId, currentSide, '');
    if (input) input.focus();
  }
}

function filterSideOptions(recipeId, query) {
  const currentSide = document.getElementById('side-label-' + recipeId)?.textContent || '';
  renderSideOptions(recipeId, currentSide, query);
}

function renderSideOptions(recipeId, currentSide, query) {
  const container = document.getElementById('side-opts-' + recipeId);
  if (!container) return;
  if (allSides.length === 0) {
    container.innerHTML = '<div class="side-option" style="color:var(--mid)">Loading sides...</div>';
    loadSidesLibrary().then(() => renderSideOptions(recipeId, currentSide, query));
    return;
  }
  const q = query.toLowerCase();
  const filtered = allSides.filter(s => !q || s.name_en.toLowerCase().includes(q));
  if (filtered.length === 0 && query) {
    container.innerHTML = `<div class="side-option" style="color:var(--clay)" onclick="selectSideOption('${recipeId}','${query.replace(/'/g,"\'")}','')">＋ Add "${query}"</div>`;
    return;
  }
  container.innerHTML = filtered.map(s =>
    `<div class="side-option ${s.name_en === currentSide ? 'current' : ''}" onclick="selectSideOption('${recipeId}','${s.name_en.replace(/'/g,"\'")}','${(s.name_es||'').replace(/'/g,"\'")}')">
      ${s.name_en}${s.name_es ? '<em style="font-size:0.7rem;color:var(--mid)"> · ' + s.name_es + '</em>' : ''}
    </div>`
  ).join('');
}

function selectSideOption(recipeId, nameEn, nameEs) {
  const input = document.getElementById('side-input-' + recipeId);
  if (input) input.value = nameEn;
  input.dataset.nameEs = nameEs;
  // Highlight selected
  document.querySelectorAll(`#side-opts-${recipeId} .side-option`).forEach(el => {
    el.classList.toggle('current', el.textContent.trim().startsWith(nameEn));
  });
}

async function saveSide(recipeId) {
  const input = document.getElementById('side-input-' + recipeId);
  if (!input) return;
  const nameEn = input.value.trim();
  if (!nameEn) { showToast('Please enter a side dish name', true); return; }
  const nameEs = input.dataset.nameEs || '';

  // 1. Upsert into sides table
  let sideId;
  const existing = allSides.find(s => s.name_en.toLowerCase() === nameEn.toLowerCase());
  if (existing) {
    sideId = existing.id;
  } else {
    const { data: newSide, error: sideErr } = await sb
      .from('sides').insert({ name_en: nameEn, name_es: nameEs || null }).select().single();
    if (sideErr) { showToast('Could not save side: ' + sideErr.message, true); return; }
    sideId = newSide.id;
    allSides.push(newSide);
  }

  // 2. Set previous current to false
  await sb.from('recipe_sides').update({ is_current: false })
    .eq('recipe_id', recipeId).eq('is_current', true);

  // 3. Insert new recipe_sides row
  await sb.from('recipe_sides').insert({
    recipe_id: recipeId, side_id: sideId, is_current: true,
    assigned_by: currentUser?.id || null
  });

  // 4. Update recipes table
  await sb.from('recipes').update({ default_side_en: nameEn, default_side_es: nameEs || null }).eq('id', recipeId);

  // 5. Update UI
  const label = document.getElementById('side-label-' + recipeId);
  const labelEs = document.getElementById('side-label-es-' + recipeId);
  if (label) label.textContent = nameEn;
  if (labelEs) labelEs.textContent = nameEs ? ' · ' + nameEs : '';

  closeSideDropdown(recipeId);
  showToast(`Side updated to "${nameEn}" ✓`);
}

function closeSideDropdown(recipeId) {
  const dd = document.getElementById('side-dd-' + recipeId);
  if (dd) dd.style.display = 'none';
}

// Close dropdowns when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.side-dropdown-wrap') && !e.target.closest('.side-edit-btn')) {
    document.querySelectorAll('.side-dropdown-wrap').forEach(el => el.style.display = 'none');
  }
});

async function removeMealFromPlan(planMealId, mealName) {
  if (!confirm(`Remove "${mealName}" from this week's plan?`)) return;
  const { error } = await sb.from('weekly_plan_meals').delete().eq('id', planMealId);
  if (error) { showToast('Could not remove meal: ' + error.message, true); return; }
  showToast(`${mealName} removed from this week ✓`);
  await loadCurrentPlan();
  renderDashboard();
}

async function markCooked(recipeId, planMealId) {
  if (!planMealId || planMealId === 'undefined') {
    const pm = currentMeals.find(m => m.recipe_id === recipeId);
    if (pm) planMealId = pm.id;
  }
  if (!planMealId) { showToast('Cannot find meal record', 'error'); return; }

  // Check prep time warning — if warning fires, it handles the flow via callback
  checkPrepBeforeCook(recipeId, planMealId, () => doMarkCooked(recipeId, planMealId));
  return; // doMarkCooked called by callback (or directly if no warning)
}

async function doMarkCooked(recipeId, planMealId) {

  const cookedAt = new Date().toISOString();
  const { error } = await sb
    .from('weekly_plan_meals')
    .update({ cooked: true, cooked_at: cookedAt })
    .eq('id', planMealId);

  if (error) {
    const { error: e2 } = await sb
      .from('weekly_plan_meals')
      .update({ cooked: true })
      .eq('id', planMealId);
    if (e2) { showToast('Error marking as cooked: ' + e2.message, 'error'); return; }
  }

  const pm = currentMeals.find(m => m.id === planMealId || m.recipe_id === recipeId);
  if (pm) { pm.cooked = true; pm.cooked_at = cookedAt; }

  showToast('Marked as cooked ✓ — rate it below!');
  await renderDashboard();
}

const REQUEST_LABELS = {
  plan_submitted:   '📋 Plan submitted for approval',
  swap:             '🔄 Meal swap request',
  hibernate:        '😴 Hibernation request',
  new:              '✨ New meal suggestion',
  frequency_change: '📊 Frequency change request',
  side_swap:        '🍽 Side dish swap request',
};

async function loadPendingRequests() {
  if (userProfile.role !== 'admin') return;

  const container = document.getElementById('requests-container');
  const countEl   = document.getElementById('pending-count');
  if (!container) return;

  const { data, error } = await sb
    .from('requests')
    .select('id, request_type, reason, requested_by, status, created_at, meta')
    .eq('status', 'pending')
    .order('created_at', { ascending: false });

  if (error) {
    container.innerHTML = '<div class="empty">Could not load requests</div>';
    if (countEl) countEl.textContent = '?';
    return;
  }

  const requests = data || [];
  if (countEl) countEl.textContent = requests.length;

  if (requests.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <span class="empty-icon">📋</span>
        No pending requests from Sienna or Karen
      </div>`;
    return;
  }

  container.innerHTML = requests.map(req => {
    const fromName = req.requested_by === '4581c8f1-042d-43a6-ba2d-6ec586dea301' ? 'Cameron'
      : req.requested_by === 'ca779de4-2052-4bb4-89c6-59b67a5ad788' ? 'Sienna'
      : req.requested_by === '60688390-f010-4e19-b7e9-bfbe2c35b04c' ? 'Karen'
      : 'Unknown';
    // FIX 2: use request_type not type
    const label    = REQUEST_LABELS[req.request_type] || req.request_type;
    const date     = new Date(req.created_at).toLocaleDateString('en-AU', { month:'short', day:'numeric' });
    // Extra detail for side swap requests
    let sideSwapDetail = '';
    if (req.request_type === 'side_swap' && req.meta) {
      const recipe = currentMeals.find(m => m.recipe_id === req.meta.recipe_id)?.recipes;
      const mealName = recipe?.name_en || 'a meal';
      sideSwapDetail = `<div style="font-size:0.78rem;color:var(--mid);margin-top:3px">
        ${mealName}: <em>${req.meta.current_side_en || '?'}</em> → <strong>${req.meta.new_side_en}</strong>${req.meta.new_side_es ? ' · ' + req.meta.new_side_es : ''}
      </div>`;
    }
    // Extra detail for new meal suggestions
    let newMealDetail = '';
    if (req.request_type === 'new' && req.meta?.name_en) {
      newMealDetail = `<div style="font-size:0.85rem;font-weight:500;color:var(--dark);margin-top:3px">🍽 "${req.meta.name_en}"</div>`;
    }
    return `
      <div class="request-item" id="req-${req.id}">
        <div class="request-from">${fromName} · ${date}</div>
        <div class="request-text">${label}</div>
        ${sideSwapDetail}
        ${newMealDetail}
        ${req.reason ? `<div class="request-reason">"${req.reason}"</div>` : ''}
        <div class="request-btns">
          <button class="btn-primary" style="font-size:0.78rem;padding:6px 14px"
            onclick="handleRequest('${req.id}','${req.request_type}','approved')">Approve</button>
          <button class="btn-secondary" style="font-size:0.78rem;padding:5px 14px"
            onclick="handleRequest('${req.id}','${req.request_type}','rejected')">Reject</button>
        </div>
      </div>`;
  }).join('');
}

async function handleRequest(requestId, type, decision) {
  const { error } = await sb
    .from('requests')
    .update({ status: decision })
    .eq('id', requestId);

  if (error) { showToast('Error: ' + error.message, 'error'); return; }

  if (type === 'plan_submitted' && decision === 'approved') {
    if (currentPlan) {
      await sb.from('weekly_plans').update({ status: 'approved' }).eq('id', currentPlan.id);
      currentPlan.status = 'approved';
    }
  }

  if (type === 'hibernate' && decision === 'approved') {
    const { data: req } = await sb.from('requests').select('meta, reason').eq('id', requestId).single();
    const recipeId = req?.meta?.recipe_id;
    if (recipeId) {
      await doHibernate(recipeId, 8);
      return;
    }
  }

  if (type === 'side_swap' && decision === 'approved') {
    // Fetch the meta to get recipe_id and new side details
    const { data: req } = await sb.from('requests').select('meta').eq('id', requestId).single();
    if (req?.meta) {
      const { recipe_id, new_side_en, new_side_es } = req.meta;
      await applySideSwap(recipe_id, new_side_en, new_side_es || '');
      return; // applySideSwap handles toast and re-render
    }
  }

  if (type === 'new' && decision === 'approved') {
    const { data: req } = await sb.from('requests').select('meta, reason').eq('id', requestId).single();
    const mealName = req?.meta?.name_en;
    if (mealName) {
      // Create the recipe with sensible defaults
      const { data: newRecipe, error: recipeErr } = await sb.from('recipes').insert({
        name_en: mealName,
        name_es: null,
        frequency_tier: 'regular',
        frequency_override: false,
        hibernated: false,
        hibernate_until: null,
        avg_rating: null,
        advance_prep_required: false,
        same_day_cookable: true,
        created_at: new Date().toISOString()
      }).select().single();

      if (recipeErr) { showToast('Error creating recipe: ' + recipeErr.message, 'error'); return; }

      // Remove the request card from UI
      const el = document.getElementById(`req-${requestId}`);
      if (el) el.remove();

      // Reload to update pending count
      const countEl = document.getElementById('pending-count');
      if (countEl) {
        const container = document.getElementById('requests-container');
        const remaining = container ? container.querySelectorAll('.request-item').length : 0;
        countEl.textContent = remaining;
      }

      showToast(`"${mealName}" added to recipes ✓ — now collect idea ratings`);

      // Show idea rating modal for Cameron immediately
      openIdeaRatingModal(newRecipe.id, mealName);
      return;
    }
  }

  if (type === 'new' && decision === 'rejected') {
    const el = document.getElementById(`req-${requestId}`);
    if (el) el.remove();
    const container = document.getElementById('requests-container');
    const countEl = document.getElementById('pending-count');
    if (countEl && container) {
      const remaining = container.querySelectorAll('.request-item').length;
      countEl.textContent = remaining;
      if (remaining === 0) {
        container.innerHTML = `<div class="empty"><span class="empty-icon">📋</span>No pending requests from Sienna or Karen</div>`;
      }
    }
    showToast('Suggestion rejected');
    return;
  }

  const el = document.getElementById(`req-${requestId}`);
  if (el) el.remove();

  const container = document.getElementById('requests-container');
  const countEl   = document.getElementById('pending-count');
  if (countEl && container) {
    const remaining = container.querySelectorAll('.request-item').length;
    countEl.textContent = remaining;
    if (remaining === 0) {
      container.innerHTML = `
        <div class="empty">
          <span class="empty-icon">📋</span>
          No pending requests from Sienna or Karen
        </div>`;
    }
  }

  showToast(decision === 'approved' ? 'Request approved ✓' : 'Request rejected');
}

function mealRowSienna(m) {
  if (!m) return '';
  const r = m.recipes || m;
  const planMeal = currentMeals.find(pm => pm.recipe_id === r.id) || {};
  const isCooked = planMeal.cooked === true;
  const ratingWindowOpen = isCooked && isWithin24Hours(planMeal.cooked_at);
  const myRating = myRatingsThisWeek[r.id];
  const avgStr = r.avg_rating ? ' · ⭐ ' + Number(r.avg_rating).toFixed(1) : '';
  const ratingHtml = ratingWindowOpen && !myRating ? ratingPromptHTML(r.id) : '';
  const ratedHtml = myRating ? '<div class="rating-submitted">Your rating: ' + '★'.repeat(myRating) + '☆'.repeat(5 - myRating) + '</div>' : '';
  const actionHtml = !isCooked ? cookedBtn(r.id, planMeal.id, true) : '<span class="tag tag-green">Cooked ✓</span>';

  const scheduledLabel = planMeal.assigned_day

function renderShoppingListHTML(mealItems, ckItems, isAdmin, karenItems) {
  let html = '';

  const groups = {};
  for (const ing of mealItems) {
    const cat = ing.lacomer_category || 'Other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push({ ...ing, _type: 'ingredient' });
  }

  // Merge Karen additions into groups (skip if name already in that category)
  if (karenItems && karenItems.length > 0) {
    const existingNames = new Set(mealItems.map(i => i.name_en.toLowerCase()));
    for (const ka of karenItems) {
      if (!existingNames.has(ka.name_en.toLowerCase())) {
        const cat = ka.lacomer_category || 'Other';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push({ ...ka, _type: 'karen' });
      }
    }
  }

  for (const [cat, items] of Object.entries(groups)) {
    html += `<div class="shop-category-label">${cat}</div>`;
    for (const ing of items) {
      if (ing._type === 'karen') {
        html += `
          <div class="shop-row">
            <div class="shop-names">
              <div class="shop-name-en">${ing.name_en}</div>
              <div class="shop-name-es" style="color:var(--blue);font-size:0.7rem">Karen's addition</div>
            </div>
            <span style="font-size:0.72rem;color:var(--mid)">—</span>
          </div>`;
      } else {
        const linkHtml = ing.lacomer_url
          ? `<a href="${ing.lacomer_url}" target="_blank" class="shop-link">🛒 La Comer</a>`
          : isAdmin
            ? `<button class="add-link-btn" onclick="showAddLinkForm('${ing.id}',this)">+ Add link</button>`
            : `<span style="font-size:0.72rem;color:var(--mid)">No link</span>`;
        html += `
          <div class="shop-row" id="shop-row-${ing.id}">
            <div class="shop-names">
              <div class="shop-name-en">${ing.name_en}</div>
              <div class="shop-name-es">${ing.name_es || ''}</div>
            </div>
            ${linkHtml}
          </div>`;
      }
    }
  }

  if (isAdmin && ckItems.length > 0) {
    html += `
      <div class="casa-king-section">
        <div class="casa-king-header">
          <div class="card-title">Household items</div>
          <span class="casa-king-badge">Casa King</span>
        </div>`;
    for (const item of ckItems) {
      html += `
        <div class="ck-item-row" id="ck-row-${item.id}">
          <div class="ck-item-text">${item.text}</div>
          <button class="ck-done-btn ${item.done?'done':''}"
            onclick="tickCKItem('${item.id}',this)">
            ${item.done ? 'Done ✓' : 'Got it'}
          </button>
        </div>`;
    }
    html += `</div>`;
  }

  return html || `<div class="empty" style="color:var(--green)">✓ Nothing needed — you have everything!</div>`;
}

// Called when "Cook today" is tapped — checks if advance prep needed and not same-day cookable
function checkPrepBeforeCook(recipeId, planMealId, onConfirm) {
  const meal = currentMeals.find(m => m.recipe_id === recipeId);
  const recipe = meal?.recipes;
  if (!recipe) { onConfirm(); return; }

  // Only warn Cameron and Sienna
  if (userProfile.role === 'reviewer') { onConfirm(); return; }

  if (recipe.advance_prep_required && recipe.same_day_cookable === false) {
    const desc = recipe.advance_prep_description || 'Advance preparation is required for this meal.';
    // Find alternatives from this week's pool that ARE same-day cookable
    const alternatives = currentMeals
      .filter(m => m.recipe_id !== recipeId && !m.cooked)
      .map(m => m.recipes)
      .filter(r => r && r.same_day_cookable !== false);

    showPrepWarningModal(recipe.name_en, desc, alternatives, onConfirm);
    return;
  }
  onConfirm();
}

          ).join('')}
        </select>

        Total prep + cook: <strong>${totalPrepCook} min</strong>. Set a time above to see when to start.
      </div>
      <div id="sched-warn" style="display:none;margin-top:8px;padding:10px 12px;background:rgba(200,50,50,0.07);border-left:3px solid #c44;border-radius:0 8px 8px 0;font-size:0.82rem;color:#c03030"></div>

      </div>
