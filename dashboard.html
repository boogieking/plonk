<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forknight — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#F5F0E8;--clay:#C8674A;--clay-dark:#a85238;
      --dark:#1A1612;--mid:#6B5F54;--light:#E8DDD0;
      --green:#4A7C59;--amber:#B8860B;--blue:#2E5F8A;
      --surface:rgba(255,255,255,0.75);
      --border:rgba(200,180,160,0.4);
      --radius:14px;
    }
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 85% 10%,rgba(200,103,74,0.10) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 5% 90%,rgba(200,103,74,0.07) 0%,transparent 50%);pointer-events:none;z-index:0;}
    nav{position:sticky;top:0;z-index:100;background:rgba(245,240,232,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;}
    .nav-brand{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--dark);display:flex;align-items:center;}
    .nav-brand-word{display:inline;font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--dark);margin-left:8px}
    .nav-brand-word .n{color:var(--clay)}
    .nav-right{display:flex;align-items:center;gap:16px}
    .user-chip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 14px 5px 5px;font-size:0.82rem;}
    .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:500;color:white;}
    .role-tag{font-size:0.68rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;padding:2px 8px;border-radius:999px;color:white;}
    .sign-out{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--mid);padding:6px 10px;border-radius:8px;transition:background 0.15s,color 0.15s;}
    .sign-out:hover{background:var(--light);color:var(--dark)}
    main{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:32px 24px 60px;}
    .page-header{margin-bottom:28px}
    .page-header h1{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--dark);line-height:1.2;}
    .page-header p{margin-top:5px;font-size:0.88rem;color:var(--mid);font-weight:300;}
    .week-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
    .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .status-label{font-size:0.82rem;font-weight:500;color:var(--mid);text-transform:uppercase;letter-spacing:0.05em}
    .status-text{font-size:0.88rem;color:var(--dark)}
    .btn-primary{background:var(--clay);color:white;border:none;border-radius:10px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:background 0.18s,transform 0.12s;box-shadow:0 3px 10px rgba(200,103,74,0.3);}
    .btn-primary:hover{background:var(--clay-dark);transform:translateY(-1px)}
    .btn-primary:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-secondary{background:white;color:var(--dark);border:1.5px solid var(--border);border-radius:10px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:400;cursor:pointer;white-space:nowrap;transition:border-color 0.18s,background 0.18s;}
    .btn-secondary:hover{border-color:var(--clay);background:rgba(200,103,74,0.04)}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px}
    @media(max-width:720px){.grid-3{grid-template-columns:1fr}}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
    .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .card-title{font-size:0.78rem;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--mid);}
    .meal-list{display:flex;flex-direction:column;gap:10px}
    .meal-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:rgba(255,255,255,0.6);border:1px solid rgba(200,180,160,0.3);border-radius:10px;transition:border-color 0.15s,background 0.15s;}
    .meal-item:hover{border-color:var(--clay);background:rgba(255,255,255,0.85)}
    .meal-name{font-size:0.9rem;font-weight:400}
    .meal-meta{font-size:0.75rem;color:var(--mid)}
    .meal-actions{display:flex;gap:6px}
    .tag{display:inline-flex;align-items:center;font-size:0.7rem;font-weight:500;padding:3px 9px;border-radius:999px;}
    .tag-green{background:rgba(74,124,89,0.12);color:var(--green)}
    .tag-amber{background:rgba(184,134,11,0.12);color:var(--amber)}
    .tag-blue{background:rgba(46,95,138,0.12);color:var(--blue)}
    .tag-gray{background:rgba(107,95,84,0.1);color:var(--mid)}
    .request-item{padding:12px 14px;border-left:3px solid var(--clay);background:rgba(200,103,74,0.05);border-radius:0 10px 10px 0;margin-bottom:10px;}
    .request-from{font-size:0.74rem;font-weight:500;color:var(--clay);margin-bottom:3px}
    .request-text{font-size:0.85rem;color:var(--dark)}
    .request-reason{font-size:0.78rem;color:var(--mid);margin-top:3px;font-style:italic}
    .request-btns{display:flex;gap:8px;margin-top:10px}
    .stat-tile{text-align:center}
    .stat-num{font-family:'Playfair Display',serif;font-size:2rem;color:var(--dark)}
    .stat-label{font-size:0.76rem;color:var(--mid);margin-top:2px}
    .inv-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(200,180,160,0.2);}
    .inv-row:last-child{border-bottom:none}
    .inv-name{font-size:0.88rem}
    .inv-toggle{display:flex;gap:6px}
    .have-btn,.need-btn{padding:4px 12px;font-size:0.72rem;font-weight:500;border-radius:999px;border:1.5px solid;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
    .have-btn{border-color:var(--green);color:var(--green);background:transparent}
    .have-btn.active{background:var(--green);color:white}
    .need-btn{border-color:#C44;color:#C44;background:transparent}
    .need-btn.active{background:#C44;color:white}
    .shop-category-label{font-size:0.7rem;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--mid);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
    .shop-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(200,180,160,0.15);gap:12px;}
    .shop-row:last-child{border-bottom:none}
    .shop-names{flex:1;min-width:0}
    .shop-name-en{font-size:0.88rem;font-weight:400;color:var(--dark)}
    .shop-name-es{font-size:0.74rem;color:var(--mid);margin-top:1px}
    .shop-link{display:inline-flex;align-items:center;gap:5px;font-size:0.75rem;font-weight:500;color:var(--clay);text-decoration:none;padding:4px 10px;border:1.5px solid rgba(200,103,74,0.3);border-radius:999px;white-space:nowrap;transition:all 0.15s;background:rgba(200,103,74,0.04);flex-shrink:0;}
    .shop-link:hover{background:var(--clay);color:white;border-color:var(--clay)}
    .add-link-btn{font-size:0.72rem;font-weight:500;color:var(--mid);background:transparent;border:1.5px dashed var(--border);border-radius:999px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
    .add-link-btn:hover{border-color:var(--clay);color:var(--clay)}
    .add-link-form{display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;}
    .add-link-input{flex:1;min-width:180px;padding:5px 10px;border:1.5px solid var(--clay);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.78rem;outline:none;color:var(--dark);}
    .save-link-btn{padding:5px 12px;font-size:0.75rem;font-weight:500;background:var(--clay);color:white;border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:background 0.15s;}
    .save-link-btn:hover{background:var(--clay-dark)}
    .cancel-link-btn{padding:5px 10px;font-size:0.75rem;background:none;border:none;cursor:pointer;color:var(--mid);font-family:'DM Sans',sans-serif;}
    .casa-king-section{margin-top:24px;padding-top:20px;border-top:2px dashed rgba(200,180,160,0.4);}
    .casa-king-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .casa-king-badge{font-size:0.68rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;background:rgba(46,95,138,0.1);color:var(--blue);padding:3px 9px;border-radius:999px;}
    .ck-item-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(200,180,160,0.15);gap:10px;}
    .ck-item-row:last-child{border-bottom:none}
    .ck-item-text{font-size:0.88rem;color:var(--dark)}
    .ck-done-btn{padding:4px 12px;font-size:0.72rem;font-weight:500;border-radius:999px;border:1.5px solid var(--green);color:var(--green);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
    .ck-done-btn:hover{background:var(--green);color:white}
    .ck-done-btn.done{background:var(--green);color:white;opacity:0.5;cursor:default;text-decoration:line-through;}
    .ck-item-row.ticked .ck-item-text{text-decoration:line-through;color:var(--mid);opacity:0.6;}
    .tier-badge{display:inline-flex;align-items:center;gap:5px;font-size:0.68rem;font-weight:500;padding:2px 8px;border-radius:999px;border:1.5px solid;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;}
    .tier-badge:hover{opacity:0.8}
    .tier-weekly{color:#4A7C59;border-color:rgba(74,124,89,0.4);background:rgba(74,124,89,0.08)}
    .tier-regular{color:#2E5F8A;border-color:rgba(46,95,138,0.4);background:rgba(46,95,138,0.08)}
    .tier-occasional{color:#B8860B;border-color:rgba(184,134,11,0.4);background:rgba(184,134,11,0.08)}
    .tier-rare{color:#C8674A;border-color:rgba(200,103,74,0.4);background:rgba(200,103,74,0.08)}
    .tier-hibernated{color:#6B5F54;border-color:rgba(107,95,84,0.3);background:rgba(107,95,84,0.07)}
    .tier-locked::after{content:' 🔒';font-size:0.6rem}
    .tier-select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;background:white;margin-bottom:10px;}
    .tier-select:focus{border-color:var(--clay)}
    .side-swap-btn{font-size:0.7rem;font-weight:500;color:var(--blue);background:rgba(46,95,138,0.08);border:1.5px solid rgba(46,95,138,0.25);border-radius:999px;padding:2px 9px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all 0.15s;margin-left:6px;}
    .side-swap-btn:hover{background:var(--blue);color:white;border-color:var(--blue)}
    .side-swap-select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;background:white;margin-bottom:12px;}
    .empty{text-align:center;padding:32px 16px;color:var(--mid);font-size:0.85rem;}
    .empty-icon{font-size:2rem;margin-bottom:8px;display:block}
    .section-label{font-size:0.72rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--mid);margin:28px 0 12px;}
    #loading{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:var(--cream);}
    .spin{width:36px;height:36px;border:3px solid var(--light);border-top-color:var(--clay);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    #app{display:none}
    #app.ready{display:block}
    .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(26,22,18,0.5);display:flex;align-items:center;justify-content:center;padding:20px;}
    .modal{background:white;border-radius:var(--radius);padding:28px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
    .modal h3{font-size:1.05rem;font-weight:500;margin-bottom:8px}
    .modal p{font-size:0.85rem;color:var(--mid);margin-bottom:16px}
    .modal textarea{width:100%;padding:10px 12px;border:1.5px solid var(--light);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;resize:vertical;min-height:80px;outline:none;transition:border-color 0.2s;}
    .modal textarea:focus{border-color:var(--clay)}
    .modal-btns{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}
    .btn-ghost{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--mid);padding:8px 14px;border-radius:8px;transition:background 0.15s;}
    .btn-ghost:hover{background:var(--light)}
    .day-selector{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
    .day-btn{padding:7px 14px;border-radius:999px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;transition:all 0.15s;}
    .day-btn.selected{background:var(--clay);border-color:var(--clay);color:white}
    .day-count{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--clay);display:inline;margin-right:6px;}
    .rating-prompt{margin-top:10px;padding:12px 14px;background:rgba(200,103,74,0.06);border:1px solid rgba(200,103,74,0.2);border-radius:10px;}
    .rating-prompt-label{font-size:0.78rem;color:var(--clay);font-weight:500;margin-bottom:8px}
    .star-row{display:flex;gap:6px;align-items:center}
    .star-btn{font-size:1.4rem;background:none;border:none;cursor:pointer;padding:2px;line-height:1;transition:transform 0.1s;color:#ccc;}
    .star-btn:hover,.star-btn.active{color:#C8674A;transform:scale(1.15)}
    .rating-submit-btn{margin-top:8px;padding:5px 14px;font-size:0.78rem;font-weight:500;background:var(--clay);color:white;border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s;}
    .rating-submit-btn:hover{background:var(--clay-dark)}
    .rating-submitted{font-size:0.78rem;color:var(--green);margin-top:6px;font-weight:500;}
    .meal-item.cooked{opacity:0.6;background:rgba(74,124,89,0.06);border-color:rgba(74,124,89,0.2);}
    .meal-item.cooked .meal-name::after{content:' ✓';color:var(--green);font-size:0.8rem;}
    .fade-in{animation:fadeIn 0.4s ease both}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .prep-warning-modal{background:white;border-radius:var(--radius);padding:28px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
    .prep-warning-modal .warn-icon{font-size:2rem;margin-bottom:10px}
    .prep-warning-modal h3{font-size:1.05rem;font-weight:500;margin-bottom:6px;color:#c03030}
    .prep-warning-modal .warn-reason{font-size:0.85rem;color:var(--dark);margin-bottom:14px;padding:10px 14px;background:rgba(200,50,50,0.06);border-left:3px solid #c44;border-radius:0 8px 8px 0;}
    .prep-warning-modal .alt-label{font-size:0.74rem;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--mid);margin-bottom:8px;}
    .prep-alt-item{padding:8px 12px;border-radius:8px;background:rgba(74,124,89,0.07);border:1px solid rgba(74,124,89,0.2);font-size:0.85rem;margin-bottom:6px;color:var(--dark);}
    .schedule-btn{padding:4px 10px;font-size:0.72rem;font-weight:500;border-radius:999px;border:1.5px solid var(--border);color:var(--mid);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;}
    .schedule-btn:hover{border-color:var(--blue);color:var(--blue)}
    .btn-remove-meal{padding:3px 9px;font-size:0.68rem;font-weight:500;border-radius:999px;border:1.5px solid rgba(200,103,74,0.3);color:var(--clay);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;opacity:0.75;}
    .btn-remove-meal:hover{background:rgba(200,103,74,0.08);opacity:1;border-color:var(--clay)}
    .meal-side{font-size:0.72rem;color:var(--mid);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .meal-side span{font-weight:500;color:var(--dark)}
    .meal-side em{font-style:normal;color:var(--mid)}
    .side-edit-btn{background:none;border:none;cursor:pointer;font-size:0.68rem;color:var(--clay);opacity:0.7;padding:1px 5px;border-radius:4px;font-family:'DM Sans',sans-serif;transition:opacity 0.15s;}
    .side-edit-btn:hover{opacity:1;background:rgba(200,103,74,0.08)}
    .side-dropdown-wrap{position:relative;display:inline-block;}
    .side-dropdown-panel{position:absolute;left:0;top:calc(100% + 4px);background:white;border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.10);z-index:200;min-width:220px;padding:8px;}
    .side-dropdown-panel input{width:100%;padding:6px 10px;font-size:0.78rem;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;color:var(--dark);outline:none;margin-bottom:6px;}
    .side-dropdown-panel input:focus{border-color:var(--clay)}
    .side-options{max-height:180px;min-height:60px;overflow-y:auto;}
    .side-option{padding:6px 10px;font-size:0.78rem;border-radius:6px;cursor:pointer;color:var(--dark);transition:background 0.12s;}
    .side-option:hover{background:var(--light)}
    .side-option.current{font-weight:500;color:var(--clay)}
    .side-dropdown-footer{border-top:1px solid var(--border);margin-top:6px;padding-top:6px;display:flex;gap:6px;}
    .side-save-btn{flex:1;padding:5px 0;font-size:0.75rem;font-weight:500;background:var(--clay);color:white;border:none;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .side-save-btn:hover{background:var(--clay-dark)}
    .side-cancel-btn{padding:5px 10px;font-size:0.75rem;background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--mid);}
    .scheduled-tag{font-size:0.72rem;font-weight:500;padding:3px 9px;border-radius:999px;background:rgba(46,95,138,0.1);color:var(--blue);}
    .karen-add-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
    .karen-add-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;color:var(--dark);transition:border-color 0.2s;}
    .karen-add-input:focus{border-color:var(--clay)}
    .karen-addition-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(200,180,160,0.15);font-size:0.88rem;gap:10px;}
    .karen-addition-item:last-child{border-bottom:none}
    .karen-rm-btn{background:none;border:none;cursor:pointer;color:var(--mid);font-size:0.85rem;padding:2px 6px;border-radius:4px;transition:color 0.15s,background 0.15s;flex-shrink:0;}
    .karen-rm-btn:hover{color:#c44;background:rgba(200,50,50,0.07)}
    .day-before-alert{background:linear-gradient(135deg,rgba(184,134,11,0.12) 0%,rgba(184,134,11,0.06) 100%);border:1.5px solid rgba(184,134,11,0.45);border-radius:var(--radius);padding:18px 20px;margin-bottom:24px;}
    .day-before-alert-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .day-before-alert-icon{font-size:1.4rem}
    .day-before-alert-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--amber);}
    .day-before-alert-subtitle{font-size:0.78rem;color:var(--mid);margin-top:1px;}
    .day-before-meal-row{display:flex;flex-direction:column;gap:3px;padding:10px 14px;background:rgba(255,255,255,0.55);border:1px solid rgba(184,134,11,0.2);border-radius:10px;margin-top:8px;}
    .day-before-meal-name{font-weight:500;font-size:0.9rem;color:var(--dark);}

const TIER_INTERVALS={weekly:2,regular:4,occasional:8,rare:12,hibernated:Infinity};
const TIER_ORDER=['weekly','regular','occasional','rare'];
const TIER_THRESHOLDS=[{min:4.5,tier:'weekly'},{min:3.5,tier:'regular'},{min:2.5,tier:'occasional'},{min:1.5,tier:'rare'},{min:0,tier:'hibernated'}];
function tierFromRating(avg){for(const t of TIER_THRESHOLDS){if(avg>=t.min)return t.tier;}return'hibernated';}
const TIER_LABELS={weekly:'Weekly Favourite',regular:'Regular',occasional:'Occasional',rare:'Rare',hibernated:'Hibernated'};
async function selectMealsForWeek(allRecipes,homeMealsNeeded){
  if(homeMealsNeeded<=0)return[];
  const{data:allPlanMeals}=await sb.from('weekly_plan_meals').select('recipe_id,plan_id');
  const{data:allPlans}=await sb.from('weekly_plans').select('id,week_start');
  const planDateMap={};if(allPlans){for(const plan of allPlans)planDateMap[plan.id]=new Date(plan.week_start+'T12:00:00');}
  const lastSeenMap={};if(allPlanMeals){for(const row of allPlanMeals){const planDate=planDateMap[row.plan_id];if(!planDate)continue;if(!lastSeenMap[row.recipe_id]||planDate>lastSeenMap[row.recipe_id])lastSeenMap[row.recipe_id]=planDate;}}
  const now=new Date();
  function weeksAgo(date){return(now-date)/(1000*60*60*24*7);}
  function isEligible(recipe,intervalOverride){if(recipe.frequency_tier==='hibernated')return false;const interval=intervalOverride??TIER_INTERVALS[recipe.frequency_tier]??8;if(interval===Infinity)return false;const lastSeen=lastSeenMap[recipe.id];if(!lastSeen)return true;return weeksAgo(lastSeen)>=interval;}
  let eligible=allRecipes.filter(r=>isEligible(r));
  if(eligible.length<homeMealsNeeded){for(const tier of TIER_ORDER){if(eligible.length>=homeMealsNeeded)break;const alreadyIn=new Set(eligible.map(r=>r.id));const extras=allRecipes.filter(r=>r.frequency_tier===tier&&!alreadyIn.has(r.id)&&isEligible(r,Math.max(1,Math.floor((TIER_INTERVALS[r.frequency_tier]||8)/2))));eligible=[...eligible,...extras];}}
  if(eligible.length<homeMealsNeeded){const alreadyIn=new Set(eligible.map(r=>r.id));eligible=[...eligible,...allRecipes.filter(r=>r.frequency_tier!=='hibernated'&&!alreadyIn.has(r.id))];}
  return eligible.sort(()=>Math.random()-0.5).slice(0,homeMealsNeeded);
}

async function recalculateRecipeRating(recipeId){

}

function updateSchedCalc(totalMinutes){

  const stepsTag=r.steps&&r.steps.trim()?`<span class="tag tag-green" style="font-size:0.65rem;padding:2px 7px">📋 steps saved</span>`:'';
  const adminActions=isAdmin?`<button class="btn-secondary" style="font-size:0.72rem;padding:5px 10px;" onclick="event.stopPropagation();openTierOverrideFromList('${r.id}','${r.frequency_tier}')">Tier</button><button class="btn-secondary" style="font-size:0.72rem;padding:5px 10px;" onclick="event.stopPropagation();openHibernateModal('${r.id}','${r.name_en.replace(/'/g,"\\'")}')"> ${r.hibernated?'Wake':'Sleep'}</button>`:'';
  return`<div class="recipe-row${r.hibernated?' hibernated-row':''}" onclick="openRecipeDetail('${r.id}')"><div class="recipe-main"><div class="recipe-title">${r.name_en}</div>${r.name_es?`<div class="recipe-title-es">${r.name_es}</div>`:''}<div class="recipe-meta-row">${time>0?`<span class="recipe-meta-item">⏱ ${time} min</span>`:''}${r.advance_prep_required?`<span class="tag tag-amber">prep ahead</span>`:''} ${r.hibernated&&r.hibernate_until?`<span class="recipe-meta-item">🌙 until ${new Date(r.hibernate_until).toLocaleDateString('en-AU',{day:'numeric',month:'short'})}</span>`:''} ${stepsTag}</div></div><div class="recipe-badges"><span class="stars-display">${stars}</span><span class="tier-badge tier-${tier}${r.frequency_override?' tier-locked':''}">${TIER_LABELS[tier]||tier}</span></div>${isAdmin?`<div class="recipe-actions">${adminActions}</div>`:''}</div>`;
}
function filterRecipes(){renderFilteredRecipes();}
function setTierFilter(tier){recipeFilterTier=tier;recipeShowHibernated=false;renderRecipeListView();}
function toggleHibernated(){recipeShowHibernated=!recipeShowHibernated;recipeFilterTier='all';renderRecipeListView();}
async function openRecipeDetail(recipeId){
  const r=allRecipesCache?.find(x=>x.id===recipeId||x.id===parseInt(recipeId));if(!r)return;
  const isAdmin=userProfile?.role==='admin';const tier=r.hibernated?'hibernated':(r.frequency_tier||'regular');
  const stars=r.avg_rating?`⭐ ${parseFloat(r.avg_rating).toFixed(1)}`:'Not yet rated';const time=(r.prep_time_minutes||0)+(r.cook_time_minutes||0);
  const ingredients=r.ingredients||[];const grouped={};ingredients.forEach(ing=>{const cat=ing.lacomer_category||'Other';if(!grouped[cat])grouped[cat]=[];grouped[cat].push(ing);});
  const ingredientHtml=Object.entries(grouped).map(([cat,ings])=>`<div class="modal-section-label">${cat}</div><div class="ingredient-list">${ings.map(ing=>{const qty=ing.quantity?`${ing.quantity}${ing.unit?' '+ing.unit:''}`:'' ;const link=ing.lacomer_url?`<a class="ingredient-link" href="${ing.lacomer_url}" target="_blank">🛒 La Comer</a>`:'';return`<div class="ingredient-row"><div class="ingredient-info"><div class="ingredient-name-en">${ing.name_en}</div>${ing.name_es?`<div class="ingredient-name-es">${ing.name_es}</div>`:''}</div>${qty?`<div class="ingredient-qty">${qty}</div>`:''}${link}</div>`;}).join('')}</div>`).join('');
  const prepSection=r.advance_prep_required?`<div class="modal-section-label">Prep notes</div><div class="prep-flag"><span class="prep-flag-icon">⏰</span><div><strong>Advance prep required</strong>${r.advance_prep_description?`<div style="margin-top:3px">${r.advance_prep_description}</div>`:''}${!r.same_day_cookable?`<div style="margin-top:3px;font-size:0.78rem;color:var(--mid)">Cannot be cooked same day without prep</div>`:''}</div></div>`:'';
  const sideSection=r.default_side_en?`<div class="modal-section-label">Default side</div><div style="font-size:0.87rem;color:var(--dark)">${r.default_side_en}${r.default_side_es?` · <em style="color:var(--mid)">${r.default_side_es}</em>`:''}</div>`:'';
  const adminFooterBtns=isAdmin?`<button class="btn-secondary" onclick="closeRecipeDetail();openTierOverrideFromList('${r.id}','${r.frequency_tier}')">Change tier</button><button class="btn-secondary" onclick="closeRecipeDetail();openHibernateModal('${r.id}','${r.name_en.replace(/'/g,"\\'")}')">😴 ${r.hibernated?'Wake up':'Hibernate'}</button>`:'';
  const hasSavedSteps=r.steps&&r.steps.trim();const stepsBtnLabel=hasSavedSteps?'📋 View steps':'📋 Generate steps';
  document.body.insertAdjacentHTML('beforeend',`
  <div class="modal-overlay" id="recipe-detail-overlay" onclick="if(event.target===this)safeCloseRecipeDetail('${r.id}')">
    <div class="recipe-modal" style="position:relative">
      <button class="recipe-modal-close" onclick="safeCloseRecipeDetail('${r.id}')">✕</button>
      <div class="recipe-modal-header">
        <div class="recipe-modal-title">${r.name_en}</div>
        ${r.name_es?`<div class="recipe-modal-title-es">${r.name_es}</div>`:''}
        <div class="recipe-modal-meta">
          <span class="tier-badge tier-${tier}${r.frequency_override?' tier-locked':''}">${TIER_LABELS[tier]||tier}</span>
          <span class="stars-display">${stars}</span>
          ${time>0?`<span class="tag tag-gray">⏱ ${time} min total</span>`:''}
          ${r.same_day_cookable?`<span class="tag tag-green">Same-day ✓</span>`:`<span class="tag tag-amber">Prep ahead</span>`}
          ${hasSavedSteps?`<span class="steps-saved-badge">📋 Steps saved</span>`:''}
        </div>
      </div>
      <div class="recipe-modal-body">
        ${prepSection}${sideSection}
        ${ingredients.length>0?`<div class="modal-section-label">Ingredients</div>${ingredientHtml}`:'<div style="font-size:0.85rem;color:var(--mid)">No ingredients loaded yet</div>'}
        <div id="steps-container-${r.id}" style="display:none"></div>
      </div>
      <div class="recipe-modal-footer">
        ${adminFooterBtns}
        <button id="steps-btn-${r.id}" class="btn-secondary" onclick="handleStepsBtn('${r.id}')">${stepsBtnLabel}</button>
        <button class="btn-primary" onclick="safeCloseRecipeDetail('${r.id}')">Done</button>
      </div>
    </div>
  </div>`);
}
function safeCloseRecipeDetail(recipeId){
  const textarea=document.getElementById(`steps-edit-${recipeId}`);
  if(textarea){
    const cached=allRecipesCache?.find(x=>x.id===recipeId||x.id===parseInt(recipeId));
    const savedText=(cached?.steps||'').trim();
    const currentText=textarea.value.trim();
    if(currentText!==savedText&&currentText!==''){if(!confirm('You have unsaved changes to the steps. Close anyway?'))return;}
  }
  closeRecipeDetail();
}
function closeRecipeDetail(){document.getElementById('recipe-detail-overlay')?.remove();}
function openTierOverrideFromList(recipeId,currentTier){const isLocked=allRecipesCache?.find(r=>r.id===recipeId||r.id===parseInt(recipeId))?.frequency_override||false;openTierModal(recipeId,currentTier,isLocked);}
function consolidateList(){
  const ckSection=document.getElementById('ck-pre-consolidate');if(!ckSection)return;
  const ckParsed=[];ckSection.querySelectorAll('.ck-item-row').forEach(row=>{const id=row.id.replace('ck-row-','');const text=row.querySelector('.ck-item-text')?.textContent?.trim()||'';const qty=parseFloat(document.getElementById(`ck-qty-${id}`)?.value)||0;const unit=document.getElementById(`ck-unit-${id}`)?.value||'';ckParsed.push({text,qty,unit,id});});
  const content=document.getElementById('shopping-list-content');const mealMap={};
  content.querySelectorAll('.shop-row[id^="shop-row-"]').forEach(row=>{const nameEl=row.querySelector('.shop-name-en');if(!nameEl)return;const qtySpan=nameEl.querySelector('.shop-qty');const qtyText=qtySpan?qtySpan.textContent.replace(' · ','').trim():'';const name=nameEl.textContent.replace(qtySpan?.textContent||'','').trim();mealMap[name.toLowerCase()]={name,qtyText,row};});
  for(const ck of ckParsed){if(!ck.text)continue;const key=ck.text.toLowerCase().trim();const qtyStr=ck.qty?`${ck.qty}${ck.unit?' '+ck.unit:''}`:'' ;let matched=false;for(const[mKey,mVal]of Object.entries(mealMap)){if(mKey.includes(key)||key.includes(mKey)){const nameEl=mVal.row.querySelector('.shop-name-en');if(nameEl){let existing=nameEl.querySelector('.shop-qty');if(!existing){const span=document.createElement('span');span.className='shop-qty';nameEl.appendChild(span);existing=span;}const combined=mVal.qtyText&&qtyStr?`${mVal.qtyText} + ${qtyStr} (meal+household)`:qtyStr?`${qtyStr} (household)`:mVal.qtyText;existing.textContent=combined?` · ${combined}`:''; }matched=true;break;}}if(!matched){let gs=document.getElementById('consolidated-general');if(!gs){gs=document.createElement('div');gs.id='consolidated-general';gs.innerHTML=`<div class="shop-category-label">General</div>`;content.appendChild(gs);}const tempId='ck-new-'+ck.id;const div=document.createElement('div');div.className='shop-row';div.id=`shop-row-${tempId}`;div.innerHTML=`<div class="shop-names"><div class="shop-name-en">${ck.text}${qtyStr?`<span class="shop-qty"> · ${qtyStr}</span>`:''}</div><div class="shop-name-es" style="color:var(--blue);font-size:0.7rem">Household item</div></div><button class="add-link-btn" onclick="showCKLinkForm('${tempId}','${ck.text.replace(/'/g,"\\'")}',this)">+ Add link</button>`;gs.appendChild(div);}}
  ckSection.remove();document.getElementById('consolidate-btn')?.closest('div')?.remove();
}
function showCKLinkForm(tempId,itemName,btn){const row=document.getElementById(`shop-row-${tempId}`);if(!row)return;btn.style.display='none';const formDiv=document.createElement('div');formDiv.className='add-link-form';formDiv.id=`link-form-${tempId}`;formDiv.innerHTML=`<input class="add-link-input" id="link-input-${tempId}" placeholder="Paste La Comer URL..." type="url"><button class="save-link-btn" onclick="saveCKLink('${tempId}','${itemName.replace(/'/g,"\\'")}')">Save</button><button class="cancel-link-btn" onclick="cancelLink('${tempId}')">Cancel</button>`;row.appendChild(formDiv);}
async function saveCKLink(tempId,itemName){const url=document.getElementById(`link-input-${tempId}`)?.value?.trim();if(!url){showToast('Please paste a URL first','error');return;}const{error}=await sb.from('ingredients').insert({name_en:itemName,name_es:itemName,lacomer_category:guessKarenCategory(itemName),lacomer_url:url}).select().single();if(error){showToast('Error saving: '+error.message,'error');return;}const row=document.getElementById(`shop-row-${tempId}`);if(row){document.getElementById(`link-form-${tempId}`)?.remove();const addBtn=row.querySelector('.add-link-btn');if(addBtn)addBtn.replaceWith(Object.assign(document.createElement('a'),{href:url,target:'_blank',className:'shop-link',textContent:'🛒 La Comer'}));}showToast(`"${itemName}" saved to ingredients ✓`);}
async function handleStepsBtn(recipeId){
  const r=allRecipesCache?.find(x=>x.id===recipeId||x.id===parseInt(recipeId));if(!r)return;
  const stepsContainer=document.getElementById(`steps-container-${recipeId}`);const stepsBtn=document.getElementById(`steps-btn-${recipeId}`);if(!stepsContainer||!stepsBtn)return;
  if(stepsContainer.dataset.loaded==='true'){const isHidden=stepsContainer.style.display==='none';stepsContainer.style.display=isHidden?'block':'none';stepsBtn.textContent=isHidden?'▲ Hide steps':(r.steps?'📋 View steps':'📋 Generate steps');return;}
  if(r.steps&&r.steps.trim()){renderSavedSteps(recipeId,r.steps);return;}
  if(userProfile.role==='reviewer'){stepsContainer.innerHTML=`<div style="font-size:0.85rem;color:var(--mid);padding:12px 0">No saved steps yet for this recipe.</div>`;stepsContainer.dataset.loaded='true';stepsContainer.style.display='block';stepsBtn.textContent='▲ Hide';return;}
  await generateRecipeSteps(recipeId);
}
function renderSavedSteps(recipeId,stepsText){
  const stepsContainer=document.getElementById(`steps-container-${recipeId}`);const stepsBtn=document.getElementById(`steps-btn-${recipeId}`);if(!stepsContainer)return;
  const canEdit=userProfile.role==='admin'||userProfile.role==='planner';
  const lines=stepsText.split('\n').filter(l=>l.trim());
  const stepsHtml=lines.map(line=>{const match=line.match(/^(\d+[\.\)])\s*(.*)/);return match?`<div class="recipe-step"><div class="recipe-step-num">${match[1]}</div><div class="recipe-step-text">${match[2]}</div></div>`:line.trim()?`<div class="recipe-step-note">${line}</div>`:'' ;}).join('');
  const editControls=canEdit?`<div class="steps-save-bar" style="margin-top:14px"><button class="btn-secondary" style="font-size:0.78rem;padding:5px 12px" onclick="openStepsEditor('${recipeId}')">✏️ Edit steps</button><span class="steps-saved-badge">✓ Saved</span></div>`:'';
  stepsContainer.innerHTML=`<div class="modal-section-label" style="margin-top:18px">Cooking steps</div><div class="recipe-steps-list">${stepsHtml}</div>${editControls}`;
  stepsContainer.dataset.loaded='true';stepsContainer.style.display='block';if(stepsBtn)stepsBtn.textContent='▲ Hide steps';
}
async function generateRecipeSteps(recipeId){
  const r=allRecipesCache?.find(x=>x.id===recipeId||x.id===parseInt(recipeId));if(!r)return;
  const stepsContainer=document.getElementById(`steps-container-${recipeId}`);const stepsBtn=document.getElementById(`steps-btn-${recipeId}`);if(!stepsContainer||!stepsBtn)return;
  stepsBtn.disabled=true;stepsBtn.textContent='⏳ Generating...';
  stepsContainer.innerHTML=`<div class="modal-section-label" style="margin-top:18px">Cooking steps</div><div class="empty" style="padding:16px 0"><div class="spin" style="width:22px;height:22px;border-width:2px;margin:0 auto 8px"></div>Generating steps…</div>`;stepsContainer.style.display='block';
  const ingredients=(r.ingredients||[]).map(ing=>{const qty=ing.quantity?`${ing.quantity}${ing.unit?' '+ing.unit:''}`:'' ;return qty?`${ing.name_en} (${qty})`:ing.name_en;}).join(', ');
  const totalTime=(r.prep_time_minutes||0)+(r.cook_time_minutes||0);
  const prompt=`You are a home cook assistant. Write clear, numbered cooking steps for "${r.name_en}"${r.name_es?' ('+r.name_es+')':''}.
Ingredients: ${ingredients||'standard ingredients for this dish'}
Total time: approximately ${totalTime>0?totalTime+' minutes':'varies'}
${r.advance_prep_required&&r.advance_prep_description?'Note: '+r.advance_prep_description+'.':''}
${r.default_side_en?'Typically served with '+r.default_side_en+'.':''}
Write 6-10 practical numbered steps. Be specific about heat levels, timing, and technique. Keep each step to 1-2 sentences. Australian home-style cooking — straightforward, no fancy techniques. End with a serving suggestion. Do not include any intro or outro text — just the numbered steps.`;
  try{
    const response=await fetch('https://claude-proxy.cameronjohnking.workers.dev',{method:'POST',body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await response.json();const text=data.content?.find(b=>b.type==='text')?.text||'';if(!text)throw new Error('No steps returned. Raw: '+JSON.stringify(data));
    renderGeneratedSteps(recipeId,text);stepsBtn.disabled=false;stepsBtn.textContent='▲ Hide steps';
  }catch(err){stepsContainer.innerHTML=`<div style="font-size:0.85rem;color:#c44;padding:10px 0">Could not generate steps: ${err.message}</div>`;stepsContainer.dataset.loaded='true';stepsContainer.style.display='block';stepsBtn.disabled=false;stepsBtn.textContent='📋 Generate steps';}
}
function renderGeneratedSteps(recipeId,rawText){
  const stepsContainer=document.getElementById(`steps-container-${recipeId}`);if(!stepsContainer)return;
  const canEdit=userProfile.role==='admin'||userProfile.role==='planner';
  const lines=rawText.split('\n').filter(l=>l.trim());
  const stepsHtml=lines.map(line=>{const match=line.match(/^(\d+[\.\)])\s*(.*)/);return match?`<div class="recipe-step"><div class="recipe-step-num">${match[1]}</div><div class="recipe-step-text">${match[2]}</div></div>`:line.trim()?`<div class="recipe-step-note">${line}</div>`:'' ;}).join('');
  const editSection=canEdit?`<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)"><div style="font-size:0.72rem;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--mid);margin-bottom:6px">Edit before saving</div><textarea class="steps-edit-area" id="steps-edit-${recipeId}">${rawText.trim()}</textarea><div class="steps-save-bar"><button class="btn-primary" style="font-size:0.82rem;padding:7px 16px" onclick="saveRecipeSteps('${recipeId}')">💾 Save these steps</button><span style="font-size:0.78rem;color:var(--mid)">Saved steps load instantly — no AI needed</span></div></div>`:'';
  stepsContainer.innerHTML=`<div class="modal-section-label" style="margin-top:18px">Cooking steps</div><div class="recipe-steps-list">${stepsHtml}</div><div style="font-size:0.72rem;color:var(--mid);margin-top:10px;padding:8px 10px;background:rgba(107,95,84,0.06);border-radius:6px">✨ AI-generated steps — adjust to taste</div>${editSection}`;
  stepsContainer.dataset.loaded='true';stepsContainer.style.display='block';
}
function openStepsEditor(recipeId){
  const r=allRecipesCache?.find(x=>x.id===recipeId||x.id===parseInt(recipeId));if(!r||!r.steps)return;
  const stepsContainer=document.getElementById(`steps-container-${recipeId}`);if(!stepsContainer)return;
  if(document.getElementById(`steps-edit-${recipeId}`))return;
  stepsContainer.insertAdjacentHTML('beforeend',`<div id="steps-editor-wrap-${recipeId}" style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)"><div style="font-size:0.72rem;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--mid);margin-bottom:6px">Edit steps</div><textarea class="steps-edit-area" id="steps-edit-${recipeId}">${r.steps.trim()}</textarea><div class="steps-save-bar"><button class="btn-primary" style="font-size:0.82rem;padding:7px 16px" onclick="saveRecipeSteps('${recipeId}')">💾 Save changes</button><button class="btn-ghost" style="font-size:0.82rem" onclick="document.getElementById('steps-editor-wrap-${recipeId}').remove()">Cancel</button></div></div>`);
}
async function saveRecipeSteps(recipeId){
  const textarea=document.getElementById(`steps-edit-${recipeId}`);if(!textarea)return;
  const stepsText=textarea.value.trim();if(!stepsText){showToast('Steps cannot be empty','error');return;}
  const saveBtn=textarea.parentElement?.querySelector('.btn-primary');if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='Saving…';}
  const{error}=await sb.from('recipes').update({steps:stepsText}).eq('id',recipeId);
  if(error){showToast('Error saving steps: '+error.message,'error');if(saveBtn){saveBtn.disabled=false;saveBtn.textContent='💾 Save these steps';}return;}
  const cached=allRecipesCache?.find(x=>x.id===recipeId||x.id===parseInt(recipeId));if(cached)cached.steps=stepsText;
  showToast('Steps saved ✓');
  const stepsContainer=document.getElementById(`steps-container-${recipeId}`);if(stepsContainer){stepsContainer.dataset.loaded='false';renderSavedSteps(recipeId,stepsText);}
  const badge=document.querySelector('#recipe-detail-overlay .steps-saved-badge');if(!badge){const meta=document.querySelector('.recipe-modal-meta');if(meta){const b=document.createElement('span');b.className='steps-saved-badge';b.textContent='📋 Steps saved';meta.appendChild(b);}}
  const stepsBtn=document.getElementById(`steps-btn-${recipeId}`);if(stepsBtn)stepsBtn.textContent='▲ Hide steps';
  if(currentView==='recipes'){const total=allRecipesCache?.length||0;const withSteps=allRecipesCache?.filter(r=>r.steps&&r.steps.trim()).length||0;const pct=total>0?Math.round((withSteps/total)*100):0;const fill=document.querySelector('.steps-progress-fill');const count=document.querySelector('.steps-progress-count');if(fill)fill.style.width=pct+'%';if(count)count.textContent=`${withSteps} of ${total}`;}
}
init();
</script>
</body>
