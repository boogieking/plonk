<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plonk — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#F5F0E8;--clay:#C8674A;--clay-dark:#a85238;
      --dark:#1A1612;--mid:#6B5F54;--light:#E8DDD0;
      --green:#4A7C59;--amber:#B8860B;--blue:#2E5F8A;
      --surface:rgba(255,255,255,0.75);
      --border:rgba(200,180,160,0.4);
      --radius:14px;
    }
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--cream);
      color:var(--dark);
      min-height:100vh;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 85% 10%,rgba(200,103,74,0.10) 0%,transparent 60%),
        radial-gradient(ellipse 40% 60% at 5% 90%,rgba(200,103,74,0.07) 0%,transparent 50%);
      pointer-events:none;z-index:0;
    }

    /* ── NAV ── */
    nav{
      position:sticky;top:0;z-index:100;
      background:rgba(245,240,232,0.88);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 28px;height:58px;
    }
    .nav-brand{
      font-family:'Playfair Display',serif;
      font-size:1.4rem;color:var(--dark);
      display:flex;align-items:center;gap:8px;
    }
    .nav-brand span{color:var(--clay)}
    .nav-right{display:flex;align-items:center;gap:16px}
    .user-chip{
      display:flex;align-items:center;gap:8px;
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:999px;
      padding:5px 14px 5px 5px;
      font-size:0.82rem;
    }
    .avatar{
      width:26px;height:26px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:0.7rem;font-weight:500;color:white;
    }
    .role-tag{
      font-size:0.68rem;font-weight:500;
      letter-spacing:0.06em;text-transform:uppercase;
      padding:2px 8px;border-radius:999px;
      color:white;
    }
    .sign-out{
      background:none;border:none;cursor:pointer;
      font-family:'DM Sans',sans-serif;
      font-size:0.82rem;color:var(--mid);
      padding:6px 10px;border-radius:8px;
      transition:background 0.15s,color 0.15s;
    }
    .sign-out:hover{background:var(--light);color:var(--dark)}

    /* ── MAIN ── */
    main{
      position:relative;z-index:1;
      max-width:960px;margin:0 auto;
      padding:32px 24px 60px;
    }
    .page-header{margin-bottom:28px}
    .page-header h1{
      font-family:'Playfair Display',serif;
      font-size:1.7rem;font-weight:700;
      color:var(--dark);line-height:1.2;
    }
    .page-header p{
      margin-top:5px;font-size:0.88rem;
      color:var(--mid);font-weight:300;
    }

    /* ── STATUS BANNER ── */
    .week-banner{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px 22px;
      display:flex;align-items:center;justify-content:space-between;
      gap:16px;margin-bottom:24px;
      box-shadow:0 2px 12px rgba(0,0,0,0.05);
    }
    .week-status{display:flex;align-items:center;gap:10px}
    .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .status-label{font-size:0.82rem;font-weight:500;color:var(--mid);text-transform:uppercase;letter-spacing:0.05em}
    .status-text{font-size:0.88rem;color:var(--dark)}
    .btn-primary{
      background:var(--clay);color:white;
      border:none;border-radius:10px;
      padding:9px 18px;
      font-family:'DM Sans',sans-serif;
      font-size:0.85rem;font-weight:500;
      cursor:pointer;white-space:nowrap;
      transition:background 0.18s,transform 0.12s;
      box-shadow:0 3px 10px rgba(200,103,74,0.3);
    }
    .btn-primary:hover{background:var(--clay-dark);transform:translateY(-1px)}
    .btn-secondary{
      background:white;color:var(--dark);
      border:1.5px solid var(--border);border-radius:10px;
      padding:8px 16px;
      font-family:'DM Sans',sans-serif;
      font-size:0.85rem;font-weight:400;
      cursor:pointer;white-space:nowrap;
      transition:border-color 0.18s,background 0.18s;
    }
    .btn-secondary:hover{border-color:var(--clay);background:rgba(200,103,74,0.04)}

    /* ── GRID ── */
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px}
    @media(max-width:720px){
      .grid-2,.grid-3{grid-template-columns:1fr}
    }

    /* ── CARDS ── */
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:22px;
      box-shadow:0 2px 12px rgba(0,0,0,0.05);
    }
    .card-header{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:16px;
    }
    .card-title{
      font-size:0.78rem;font-weight:500;
      text-transform:uppercase;letter-spacing:0.07em;
      color:var(--mid);
    }
    .card-title-icon{font-size:1rem;margin-right:6px}

    /* ── MEAL POOL ── */
    .meal-list{display:flex;flex-direction:column;gap:10px}
    .meal-item{
      display:flex;align-items:center;justify-content:space-between;
      padding:11px 14px;
      background:rgba(255,255,255,0.6);
      border:1px solid rgba(200,180,160,0.3);
      border-radius:10px;
      transition:border-color 0.15s,background 0.15s;
    }
    .meal-item:hover{border-color:var(--clay);background:rgba(255,255,255,0.85)}
    .meal-name{font-size:0.9rem;font-weight:400}
    .meal-meta{font-size:0.75rem;color:var(--mid)}
    .stars{color:#C8674A;font-size:0.8rem;letter-spacing:1px}
    .meal-actions{display:flex;gap:6px}

    /* ── TAGS ── */
    .tag{
      display:inline-flex;align-items:center;
      font-size:0.7rem;font-weight:500;
      padding:3px 9px;border-radius:999px;
    }
    .tag-green{background:rgba(74,124,89,0.12);color:var(--green)}
    .tag-amber{background:rgba(184,134,11,0.12);color:var(--amber)}
    .tag-clay{background:rgba(200,103,74,0.12);color:var(--clay)}
    .tag-blue{background:rgba(46,95,138,0.12);color:var(--blue)}
    .tag-gray{background:rgba(107,95,84,0.1);color:var(--mid)}

    /* ── REQUESTS ── */
    .request-item{
      padding:12px 14px;
      border-left:3px solid var(--clay);
      background:rgba(200,103,74,0.05);
      border-radius:0 10px 10px 0;
      margin-bottom:10px;
    }
    .request-from{font-size:0.74rem;font-weight:500;color:var(--clay);margin-bottom:3px}
    .request-text{font-size:0.85rem;color:var(--dark)}
    .request-reason{font-size:0.78rem;color:var(--mid);margin-top:3px;font-style:italic}
    .request-btns{display:flex;gap:8px;margin-top:10px}

    /* ── STAT TILES ── */
    .stat-tile{text-align:center}
    .stat-num{font-family:'Playfair Display',serif;font-size:2rem;color:var(--dark)}
    .stat-label{font-size:0.76rem;color:var(--mid);margin-top:2px}

    /* ── INVENTORY ── */
    .inv-row{
      display:flex;align-items:center;justify-content:space-between;
      padding:9px 0;border-bottom:1px solid rgba(200,180,160,0.2);
    }
    .inv-row:last-child{border-bottom:none}
    .inv-name{font-size:0.88rem}
    .inv-toggle{display:flex;gap:6px}
    .have-btn,.need-btn{
      padding:4px 12px;font-size:0.72rem;font-weight:500;
      border-radius:999px;border:1.5px solid;cursor:pointer;
      font-family:'DM Sans',sans-serif;transition:all 0.15s;
    }
    .have-btn{border-color:var(--green);color:var(--green);background:transparent}
    .have-btn.active{background:var(--green);color:white}
    .need-btn{border-color:#C44;color:#C44;background:transparent}
    .need-btn.active{background:#C44;color:white}

    /* ── EMPTY STATE ── */
    .empty{
      text-align:center;padding:32px 16px;
      color:var(--mid);font-size:0.85rem;
    }
    .empty-icon{font-size:2rem;margin-bottom:8px;display:block}

    /* ── SECTION DIVIDER ── */
    .section-label{
      font-size:0.72rem;font-weight:500;
      text-transform:uppercase;letter-spacing:0.1em;
      color:var(--mid);margin:28px 0 12px;
    }

    /* ── LOADING ── */
    #loading{
      position:fixed;inset:0;z-index:999;
      display:flex;align-items:center;justify-content:center;
      background:var(--cream);
    }
    .spin{
      width:36px;height:36px;
      border:3px solid var(--light);
      border-top-color:var(--clay);
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    #app{display:none}
    #app.ready{display:block}

    /* ── MODAL ── */
    .modal-overlay{
      position:fixed;inset:0;z-index:200;
      background:rgba(26,22,18,0.5);
      display:flex;align-items:center;justify-content:center;
      padding:20px;
    }
    .modal{
      background:white;border-radius:var(--radius);
      padding:28px;width:100%;max-width:440px;
      box-shadow:0 20px 60px rgba(0,0,0,0.2);
    }
    .modal h3{font-size:1.05rem;font-weight:500;margin-bottom:8px}
    .modal p{font-size:0.85rem;color:var(--mid);margin-bottom:16px}
    .modal textarea{
      width:100%;padding:10px 12px;
      border:1.5px solid var(--light);border-radius:10px;
      font-family:'DM Sans',sans-serif;font-size:0.88rem;
      resize:vertical;min-height:80px;outline:none;
      transition:border-color 0.2s;
    }
    .modal textarea:focus{border-color:var(--clay)}
    .modal-btns{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}
    .btn-ghost{
      background:none;border:none;cursor:pointer;
      font-family:'DM Sans',sans-serif;font-size:0.85rem;
      color:var(--mid);padding:8px 14px;border-radius:8px;
      transition:background 0.15s;
    }
    .btn-ghost:hover{background:var(--light)}

    .fade-in{animation:fadeIn 0.4s ease both}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<div id="loading"><div class="spin"></div></div>

<div id="app">
  <!-- NAV -->
  <nav>
    <div class="nav-brand">🍽️ Pl<span>o</span>nk</div>
    <div class="nav-right">
      <div class="user-chip">
        <div class="avatar" id="nav-avatar">?</div>
        <span id="nav-name">Loading...</span>
        <span class="role-tag" id="nav-role-tag"></span>
      </div>
      <button class="sign-out" onclick="signOut()">Sign out</button>
    </div>
  </nav>

  <main id="dashboard-content"></main>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://znwoiqygmsgabyoslrbt.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_SGLBIKifgg4nGL0pPtQssQ_Ng3dMgDK'; // ← same key as index.html
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Role colours ──────────────────────────────────────────
const roleColor = { admin:'#C8674A', planner:'#4A7C59', reviewer:'#2E5F8A' };
const roleLabel = { admin:'Admin', planner:'Planner', reviewer:'Reviewer' };

// ── Auth check ────────────────────────────────────────────
let currentUser = null;
let userProfile = null;

async function init() {
  const { data:{ session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  currentUser = session.user;

  // Load profile from users table
  const { data, error } = await sb.from('users').select('*').eq('id', currentUser.id).single();
  if (error || !data) {
    // Fallback: derive from email
    userProfile = {
      id: currentUser.id,
      email: currentUser.email,
      name: currentUser.email.split('@')[0],
      role: 'reviewer'
    };
  } else {
    userProfile = data;
  }

  renderNav();
  await renderDashboard();

  document.getElementById('loading').style.display = 'none';
  const app = document.getElementById('app');
  app.classList.add('ready');
}

function renderNav() {
  const col = roleColor[userProfile.role] || '#888';
  const initials = (userProfile.name || 'U').substring(0,1).toUpperCase();
  document.getElementById('nav-avatar').textContent = initials;
  document.getElementById('nav-avatar').style.background = col;
  document.getElementById('nav-name').textContent = userProfile.name;
  const roleEl = document.getElementById('nav-role-tag');
  roleEl.textContent = roleLabel[userProfile.role] || userProfile.role;
  roleEl.style.background = col;
}

// ── Sign out ──────────────────────────────────────────────
async function signOut() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

// ── Load recipes ──────────────────────────────────────────
async function loadRecipes() {
  const { data } = await sb.from('recipes').select('*').order('name');
  return data || [];
}

// ── Load requests ─────────────────────────────────────────
async function loadRequests() {
  const { data } = await sb.from('requests').select('*').eq('status','pending').order('created_at',{ascending:false});
  return data || [];
}

// ── RENDER DASHBOARD by role ──────────────────────────────
async function renderDashboard() {
  const recipes = await loadRecipes();
  const role = userProfile.role;
  const name = userProfile.name;
  const content = document.getElementById('dashboard-content');

  if (role === 'admin') {
    content.innerHTML = renderCameron(recipes, name);
  } else if (role === 'planner') {
    content.innerHTML = renderSienna(recipes, name);
  } else {
    content.innerHTML = renderKaren(recipes, name);
  }

  bindInventoryToggles();
  bindRequestButtons();
}

// ═══════════════════════════════════════════════════════════
// CAMERON — ADMIN VIEW
// ═══════════════════════════════════════════════════════════
function renderCameron(recipes, name) {
  const pool = recipes.slice(0, 5); // placeholder — will be real weekly plan
  const requests = []; // placeholder

  return `
  <div class="fade-in">
    <div class="page-header">
      <h1>Good day, ${name} 👋</h1>
      <p>Week of ${weekLabel()} · You have full control</p>
    </div>

    <div class="week-banner">
      <div>
        <div class="status-label">Week status</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
          <div class="status-dot" style="background:#C8674A"></div>
          <div class="status-text">Waiting for Sienna to submit this week's plan</div>
        </div>
      </div>
      <button class="btn-primary" onclick="alert('Set eating-out days — coming next build')">Set eating-out days</button>
    </div>

    <div class="grid-3">
      <div class="card stat-tile">
        <div class="stat-num">${recipes.length}</div>
        <div class="stat-label">Recipes in rotation</div>
      </div>
      <div class="card stat-tile">
        <div class="stat-num">0</div>
        <div class="stat-label">Pending requests</div>
      </div>
      <div class="card stat-tile">
        <div class="stat-num">—</div>
        <div class="stat-label">Meals this week</div>
      </div>
    </div>

    <div class="section-label">Pending requests</div>
    <div class="card" style="margin-bottom:20px">
      <div class="empty">
        <span class="empty-icon">📋</span>
        No pending requests from Sienna or Karen
      </div>
    </div>

    <div class="section-label">This week's meal pool</div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <div class="card-title">Suggested meals</div>
        <span class="tag tag-amber">Plan not submitted yet</span>
      </div>
      <div class="meal-list">
        ${pool.map(r => mealRowAdmin(r)).join('')}
      </div>
    </div>

    <div class="section-label">Inventory check</div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <div class="card-title">Fridge & freezer</div>
        <span class="tag tag-gray">Submit plan first</span>
      </div>
      <div class="empty" style="padding:20px 0">
        <span class="empty-icon">🛒</span>
        Once the week is approved, inventory check unlocks here
      </div>
    </div>

    <div class="section-label">Shopping list</div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">La Comer list</div>
        <button class="btn-primary" style="opacity:0.5;cursor:not-allowed" disabled>Generate list</button>
      </div>
      <div class="empty">
        <span class="empty-icon">🛍️</span>
        Complete inventory check first to generate the shopping list
      </div>
    </div>
  </div>`;
}

function mealRowAdmin(r) {
  return `
  <div class="meal-item">
    <div>
      <div class="meal-name">${r.name || r.id}</div>
      <div class="meal-meta">${r.prep_time || '—'} min · <span class="stars">★★★★</span></div>
    </div>
    <div class="meal-actions">
      <button class="btn-secondary" style="font-size:0.78rem;padding:5px 10px" onclick="alert('Hibernate — coming next build')">Hibernate</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// SIENNA — PLANNER VIEW
// ═══════════════════════════════════════════════════════════
function renderSienna(recipes, name) {
  const pool = recipes.slice(0, 5); // placeholder

  return `
  <div class="fade-in">
    <div class="page-header">
      <h1>Hi ${name} 👋</h1>
      <p>Week of ${weekLabel()} · Plan this week's meals</p>
    </div>

    <div class="week-banner">
      <div>
        <div class="status-label">Your task this week</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
          <div class="status-dot" style="background:#4A7C59"></div>
          <div class="status-text">Review suggested meals, then submit to Cameron for approval</div>
        </div>
      </div>
      <button class="btn-primary" onclick="alert('Submit plan — coming next build')">Submit plan</button>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-header">
          <div class="card-title">🍽️ This week's meals</div>
          <span class="tag tag-amber">Suggested</span>
        </div>
        <div class="meal-list">
          ${pool.map(r => mealRowSienna(r)).join('')}
        </div>
        <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px">
          <button class="btn-secondary" style="width:100%;font-size:0.82rem" onclick="alert('Reshuffle — 1 allowed per week. Coming next build')">🔀 Reshuffle (1 remaining)</button>
        </div>
      </div>

      <div>
        <div class="card" style="margin-bottom:16px">
          <div class="card-title" style="margin-bottom:14px">📦 Fridge & freezer check</div>
          <div class="inv-row">
            <div class="inv-name">Chicken thighs</div>
            <div class="inv-toggle">
              <button class="have-btn active" onclick="toggleInv(this,'have')">Have</button>
              <button class="need-btn" onclick="toggleInv(this,'need')">Need</button>
            </div>
          </div>
          <div class="inv-row">
            <div class="inv-name">Puff pastry</div>
            <div class="inv-toggle">
              <button class="have-btn" onclick="toggleInv(this,'have')">Have</button>
              <button class="need-btn active" onclick="toggleInv(this,'need')">Need</button>
            </div>
          </div>
          <div class="inv-row">
            <div class="inv-name">Arrachera steak</div>
            <div class="inv-toggle">
              <button class="have-btn" onclick="toggleInv(this,'have')">Have</button>
              <button class="need-btn" onclick="toggleInv(this,'need')">Need</button>
            </div>
          </div>
          <div class="inv-row">
            <div class="inv-name">Pasta tortiglioni</div>
            <div class="inv-toggle">
              <button class="have-btn" onclick="toggleInv(this,'have')">Have</button>
              <button class="need-btn" onclick="toggleInv(this,'need')">Need</button>
            </div>
          </div>
          <div style="margin-top:14px">
            <button class="btn-primary" style="width:100%;font-size:0.82rem" onclick="alert('Submit inventory — coming next build')">Submit inventory check</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title" style="margin-bottom:14px">💬 Make a request</div>
          <button class="btn-secondary" style="width:100%;margin-bottom:8px;font-size:0.82rem" onclick="openModal('swap')">Request a meal swap</button>
          <button class="btn-secondary" style="width:100%;margin-bottom:8px;font-size:0.82rem" onclick="openModal('hibernate')">Request hibernation</button>
          <button class="btn-secondary" style="width:100%;font-size:0.82rem" onclick="openModal('new')">Suggest a new meal</button>
        </div>
      </div>
    </div>

    <div class="section-label">Shopping list preview</div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">Items needed</div>
        <span class="tag tag-gray">View only · Cameron generates</span>
      </div>
      ${shoppingPreview()}
    </div>
  </div>`;
}

function mealRowSienna(r) {
  return `
  <div class="meal-item">
    <div>
      <div class="meal-name">${r.name || r.id}</div>
      <div class="meal-meta">${r.prep_time || '—'} min prep</div>
    </div>

// ── Modal ─────────────────────────────────────────────────
const modalTitles = {
  swap: { h:'Request a meal swap', p:'Tell Cameron which meal and why you want it changed.' },
  hibernate: { h:'Request hibernation', p:'Tell Cameron which meal should be rested and for how long.' },
  new: { h:'Suggest a new meal', p:'What meal would you like to add? Briefly explain why.' },
};
let activeModal = null;

function openModal(type) {
  activeModal = type;
  const t = modalTitles[type];
  const el = document.createElement('div');
  el.id = 'modal-overlay';
  el.className = 'modal-overlay';
  el.innerHTML = `
    <div class="modal">
      <h3>${t.h}</h3>
      <p>${t.p}</p>
      <textarea id="modal-text" placeholder="Add your reason here..." rows="4"></textarea>
      <div class="modal-btns">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="submitRequest('${type}')">Send to Cameron</button>
      </div>
    </div>`;
  document.body.appendChild(el);
}

function closeModal() {
  const el = document.getElementById('modal-overlay');
  if (el) el.remove();
}

async function submitRequest(type) {
  const text = document.getElementById('modal-text').value.trim();
  if (!text) { alert('Please add a reason before sending.'); return; }

  const { error } = await sb.from('requests').insert({
    type,
    reason: text,
    requested_by: userProfile.id,
    status: 'pending',
    created_at: new Date().toISOString()
  });

  if (error) {
    alert('Error sending request. Please try again.\n' + error.message);
  } else {
    closeModal();
    alert('Request sent to Cameron ✓');
  }
}

function toggleInv(btn, state) {
  const row = btn.closest('.inv-toggle');
  row.querySelectorAll('button').forEach(b => {
    b.classList.remove('active');
  });
  btn.classList.add('active');
}

// ── Helpers ───────────────────────────────────────────────
function weekLabel() {
  const now = new Date();
  const opts = { month:'long', day:'numeric', year:'numeric' };
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((day + 6) % 7));
  return monday.toLocaleDateString('en-AU', opts);
}
