<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plonk — What's for lunch?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a1a;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      border: 0.5px solid #e0e0e0;
    }
    h1 { font-size: 36px; font-weight: 500; margin-bottom: 8px; }
    p { font-size: 16px; color: #666; margin-bottom: 32px; }
    .status {
      font-size: 12px;
      background: #eaf3de;
      color: #3b6d11;
      padding: 6px 14px;
      border-radius: 20px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Plonk</h1>
    <p>What's for lunch?</p>
    <span class="status">Coming soon</span>
  </div>
</body>
</html>
