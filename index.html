<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plonk — Family Meals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #F5F0E8;
      --clay:    #C8674A;
      --dark:    #1A1612;
      --mid:     #6B5F54;
      --light:   #E8DDD0;
      --error:   #C0392B;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Decorative background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(200,103,74,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(200,103,74,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: var(--clay);
      top: -120px; right: -100px;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .blob-2 {
      width: 350px; height: 350px;
      background: #8B7355;
      bottom: -80px; left: -60px;
      animation: drift 18s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.05); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 24px;
      padding: 52px 48px 48px;
      width: 100%;
      max-width: 420px;
      box-shadow:
        0 4px 6px rgba(0,0,0,0.04),
        0 20px 60px rgba(0,0,0,0.10),
        inset 0 1px 0 rgba(255,255,255,0.9);
      animation: rise 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      font-size: 2.4rem;
      display: block;
      margin-bottom: 8px;
      animation: pop 0.5s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    .logo-name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
      color: var(--dark);
      line-height: 1;
    }
    .logo-name span {
      color: var(--clay);
    }
    .logo-tagline {
      margin-top: 6px;
      font-size: 0.82rem;
      color: var(--mid);
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 7px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--light);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--dark);
      background: rgba(255,255,255,0.7);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus {
      border-color: var(--clay);
      box-shadow: 0 0 0 3px rgba(200,103,74,0.12);
      background: white;
    }
    input::placeholder { color: #b0a89e; }

    .btn {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: var(--clay);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(200,103,74,0.35);
    }
    .btn:hover:not(:disabled) {
      background: #b85a40;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(200,103,74,0.4);
    }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-msg {
      margin-top: 14px;
      padding: 11px 14px;
      background: rgba(192,57,43,0.08);
      border: 1px solid rgba(192,57,43,0.2);
      border-radius: 10px;
      color: var(--error);
      font-size: 0.85rem;
      display: none;
      animation: shake 0.3s ease;
    }
    .error-msg.show { display: block; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .loading-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      vertical-align: middle;
    }
    .loading-dots span {
      width: 5px; height: 5px;
      background: white;
      border-radius: 50%;
      animation: bounce 1s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: 0.75rem;
      color: #a09488;
    }
    .footer-note a { color: var(--clay); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="logo-area">
      <span class="logo-icon">🍽️</span>
      <div class="logo-name">Pl<span>o</span>nk</div>
      <div class="logo-tagline">Family Meals · Celaya</div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>

    <div class="error-msg" id="errorMsg"></div>

    <p class="footer-note">
      Trouble signing in? <a href="mailto:cameron@youremail.com">Contact Cameron</a>
    </p>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // ── Config ──────────────────────────────────────────────
    const SUPABASE_URL = 'https://znwoiqygmsgabyoslrbt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_SGLBIKifgg4nGL0pPtQssQ_Ng3dMgDK'; // ← replace this

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── Check if already logged in ──────────────────────────
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) redirectToDashboard();
    })();

    // ── Login handler ────────────────────────────────────────
    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errEl    = document.getElementById('errorMsg');

      // Basic validation
      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      // Loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
      errEl.classList.remove('show');

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        btn.disabled = false;
        btn.textContent = 'Sign In';
        showError(friendlyError(error.message));
        return;
      }

      // Success — redirect
      redirectToDashboard();
    }

    function redirectToDashboard() {
      window.location.href = 'dashboard.html';
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
    }

    function friendlyError(msg) {
      if (msg.includes('Invalid login credentials')) return 'Incorrect email or password. Please try again.';
      if (msg.includes('Email not confirmed'))       return 'Account not confirmed. Ask Cameron to check Supabase.';
      if (msg.includes('Too many requests'))         return 'Too many attempts. Please wait a moment and try again.';
      return 'Something went wrong. Please try again.';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
