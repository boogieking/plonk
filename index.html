<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Plonk — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#F5F0E8;--clay:#C8674A;--clay-dark:#a85238;
      --dark:#1A1612;--mid:#6B5F54;--light:#E8DDD0;
      --surface:rgba(255,255,255,0.85);
      --border:rgba(200,180,160,0.4);
      --radius:14px;
    }
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--cream);
      color:var(--dark);
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse 60% 50% at 85% 10%,rgba(200,103,74,0.12) 0%,transparent 60%),
        radial-gradient(ellipse 40% 60% at 5% 90%,rgba(200,103,74,0.08) 0%,transparent 50%);
      pointer-events:none;z-index:0;
    }
    .login-wrap{
      position:relative;z-index:1;
      width:100%;max-width:400px;
      padding:24px;
    }
    .brand{
      text-align:center;margin-bottom:32px;
    }
    .brand-name{
      font-family:'Playfair Display',serif;
      font-size:2.2rem;color:var(--dark);
    }
    .brand-name span{color:var(--clay)}
    .brand-sub{
      font-size:0.85rem;color:var(--mid);
      margin-top:4px;font-weight:300;
    }
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:32px;
      box-shadow:0 4px 24px rgba(0,0,0,0.07);
    }
    .card h2{
      font-size:1.1rem;font-weight:500;
      margin-bottom:6px;
    }
    .card p{
      font-size:0.84rem;color:var(--mid);
      margin-bottom:24px;
    }
    .field{margin-bottom:16px}
    .field label{
      display:block;font-size:0.78rem;font-weight:500;
      text-transform:uppercase;letter-spacing:0.06em;
      color:var(--mid);margin-bottom:6px;
    }
    .field input{
      width:100%;padding:10px 14px;
      border:1.5px solid var(--border);border-radius:10px;
      font-family:'DM Sans',sans-serif;font-size:0.9rem;
      background:white;outline:none;
      transition:border-color 0.2s;
    }
    .field input:focus{border-color:var(--clay)}
    .btn-primary{
      width:100%;
      background:var(--clay);color:white;
      border:none;border-radius:10px;
      padding:11px 18px;
      font-family:'DM Sans',sans-serif;
      font-size:0.9rem;font-weight:500;
      cursor:pointer;
      transition:background 0.18s,transform 0.12s;
      box-shadow:0 3px 10px rgba(200,103,74,0.3);
      margin-top:6px;
    }
    .btn-primary:hover{background:var(--clay-dark);transform:translateY(-1px)}
    .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .error-msg{
      margin-top:14px;padding:10px 14px;
      background:rgba(200,50,50,0.08);
      border:1px solid rgba(200,50,50,0.2);
      border-radius:8px;
      font-size:0.83rem;color:#c03030;
      display:none;
    }
    .error-msg.show{display:block}
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-name">🍽️ Pl<span>o</span>nk</div>
    <div class="brand-sub">Family meal planning · Celaya</div>
  </div>

  <div class="card">
    <h2>Welcome back</h2>
    <p>Sign in to see this week's meals.</p>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn-primary" id="signin-btn" onclick="signIn()">Sign in</button>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://znwoiqygmsgabyoslrbt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_SGLBIKifgg4nGL0pPtQssQ_Ng3dMgDK';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// If already logged in, go straight to dashboard
async function init() {
  const { data:{ session } } = await sb.auth.getSession();
  if (session) window.location.href = 'dashboard.html';
}

async function signIn() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('signin-btn');
  const errEl    = document.getElementById('error-msg');

  errEl.classList.remove('show');

  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.classList.add('show');
    return;
  }

  btn.textContent = 'Signing in...';
  btn.disabled = true;

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.textContent = 'Incorrect email or password. Please try again.';
    errEl.classList.add('show');
    btn.textContent = 'Sign in';
    btn.disabled = false;
  } else {
    window.location.href = 'dashboard.html';
  }
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') signIn();
});

init();
</script>
</body>
</html>
