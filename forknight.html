async function onBarcodeDetected(barcode){
  stopScanner();
  const statusEl=document.getElementById('scanner-status');
  const resultEl=document.getElementById('scanner-result');
  if(statusEl)statusEl.textContent='Found barcode: '+barcode+' — looking up product…';
  try{
    const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}?fields=product_name,product_name_es,categories_tags,brands`);
    const data=await res.json();
    if(data.status===0||!data.product){
      if(statusEl)statusEl.textContent='Product not found in database. Fill in details manually.';
      renderScannerForm(barcode,{});
      return;
    }
    const p=data.product;
    const nameEn=p.product_name||'';
    const nameEs=p.product_name_es||p.product_name||'';
    const category=guessCategoryFromOFF(p.categories_tags||[]);
    if(statusEl)statusEl.textContent='Product found! Check the details below.';
    renderScannerForm(barcode,{nameEn,nameEs,category});
  }catch(e){
    if(statusEl)statusEl.textContent='Lookup failed — fill in details manually.';
    renderScannerForm(barcode,{});
  }
}

function guessCategoryFromOFF(tags){
  const t=tags.join(' ').toLowerCase();
  if(t.includes('meat')||t.includes('chicken')||t.includes('beef')||t.includes('pork')||t.includes('sausage')||t.includes('egg'))return'Meats & Eggs';
  if(t.includes('dairy')||t.includes('cheese')||t.includes('milk')||t.includes('cream')||t.includes('yogurt'))return'Dairy';
  if(t.includes('vegetable')||t.includes('fruit')||t.includes('produce')||t.includes('fresh'))return'Produce';
  if(t.includes('pasta')||t.includes('rice')||t.includes('bread')||t.includes('flour')||t.includes('grain'))return'Grains, Pasta & Bakery';
  if(t.includes('canned')||t.includes('sauce')||t.includes('condiment')||t.includes('oil')||t.includes('vinegar'))return'Canned & Packaged Foods';
  if(t.includes('herb')||t.includes('spice')||t.includes('seasoning'))return'Herbs, Vinegar & Condiments';
  if(t.includes('frozen'))return'Frozen';
  if(t.includes('beverage')||t.includes('drink')||t.includes('juice'))return'Beverages';
  return'Other';
}

async function openMergeDuplicatesModal(){
  // Find likely duplicates: same name (fuzzy) or same barcode with multiple rows
  const prods=productsCache||(await sb.from('household_products').select('*').order('name_es').then(r=>r.data||[]));
  const groups=[];
  const used=new Set();

  for(let i=0;i<prods.length;i++){
    if(used.has(prods[i].id))continue;
    const a=prods[i];
    const aName=(a.name_es||a.name_en||'').toLowerCase();
    const matches=[a];
    for(let j=i+1;j<prods.length;j++){
      if(used.has(prods[j].id))continue;
      const b=prods[j];
      const bName=(b.name_es||b.name_en||'').toLowerCase();
      // Match by barcode (exact) OR name similarity
      // Requires 3+ meaningful words AND >=80% overlap to avoid brand name false matches
      const sameBarcode=a.barcode&&b.barcode&&a.barcode===b.barcode;
      const words=aName.split(' ').filter(w=>w.length>3);
      const nameSim=words.length>=3&&words.filter(w=>bName.includes(w)).length>=Math.ceil(words.length*0.8);
      if(sameBarcode||nameSim){matches.push(b);used.add(b.id);}
    }
    if(matches.length>1){groups.push(matches);used.add(a.id);}
  }

  if(!groups.length){
    showToast('No duplicates found ✓');
    return;
  }

  const overlay=document.createElement('div');
  overlay.id='merge-overlay';
  overlay.className='receipt-overlay';
  overlay.innerHTML=`
    <div class="receipt-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">

      </div>
      <p style="font-size:0.82rem;color:var(--mid);margin-bottom:14px">${groups.length} duplicate group${groups.length!==1?'s':''} found. Select which row to keep for each group — the others will be deleted.</p>
      <div id="merge-groups">
        ${groups.map((group,gi)=>`
          <div style="margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid rgba(200,180,160,0.2)">
            <div style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--mid);margin-bottom:8px">Group ${gi+1}</div>

                </div>

          </div>`).join('')}
      </div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn-ghost" onclick="document.getElementById('merge-overlay')?.remove()">Cancel</button>
        <button class="btn-primary" style="flex:1" onclick="executeMerge(${JSON.stringify(groups.map(g=>g.map(p=>p.id)))})">Merge selected ✓</button>
      </div>
    </div>`;

}

async function executeMerge(groupIds){
  const btn=document.querySelector('#merge-overlay .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Merging…';}
  let merged=0,errors=0;
  for(let gi=0;gi<groupIds.length;gi++){
    const ids=groupIds[gi];
    const radio=document.querySelector(`input[name="merge-group-${gi}"]:checked`);
    const keepId=radio?.value;
    if(!keepId)continue;
    const deleteIds=ids.filter(id=>id!==keepId);
    // Move price_history to the kept row before deleting
    for(const delId of deleteIds){
      try{
        await sb.from('price_history').update({product_id:keepId}).eq('product_id',delId);
        await sb.from('household_products').delete().eq('id',delId);
        merged++;
      }catch(e){errors++;console.warn('Merge error:',e.message);}
    }
  }
  document.getElementById('merge-overlay')?.remove();
  productsCache=null;
  await loadAndRenderProducts();
  showToast(`Merged — ${merged} duplicate${merged!==1?'s':''} removed${errors?`, ${errors} errors`:''} ✓`);
}

async function renderReceiptResults(items,promotions=[]){
  const resultEl=document.getElementById('receipt-result');
  if(!resultEl||!items?.length){
    if(resultEl)resultEl.innerHTML='<div class="receipt-processing">No items found — try a clearer photo.</div>';
    return;
  }

  // Load ingredients for auto-linking
  const{data:allIngs}=await sb.from('ingredients').select('id,name_en,name_es').order('name_en');
  const ingList=allIngs||[];

  // Load all products with barcode column included
  const existing=productsCache||[];

  // Extract barcodes from receipt items if AI found them (some receipts include barcodes)
  // Also load all products keyed by barcode for fast lookup
  const productsByBarcode={};
  existing.forEach(p=>{if(p.barcode)productsByBarcode[p.barcode]=p;});

  const matched=items.map(item=>{
    const nameLower=(item.name_es||'').toLowerCase();
    const nameEnLower=(item.name_en||'').toLowerCase();

    // 1. Barcode match (most reliable — if receipt includes barcode)
    const barcodeMatch=item.barcode?productsByBarcode[item.barcode]||null:null;

    // 2. Name similarity match (only if no barcode match)
    const nameMatch=!barcodeMatch?existing.find(p=>{
      const pName=(p.name_es||p.name_en||'').toLowerCase();
      const words=pName.split(' ').filter(w=>w.length>3);
      return words.length>0&&words.filter(w=>nameLower.includes(w)||nameEnLower.includes(w)).length>=Math.ceil(words.length*0.5);
    }):null;

    // Barcode wins; name match as fallback
    const matchProduct=barcodeMatch||nameMatch||null;

    // Try to auto-link to an ingredient by name_en similarity
    const matchIngredient=ingList.find(ing=>{
      const ingName=(ing.name_en||'').toLowerCase();
      const ingNameEs=(ing.name_es||'').toLowerCase();
      const words=ingName.split(' ').filter(w=>w.length>3);
      const wordsEs=ingNameEs.split(' ').filter(w=>w.length>3);
      const enMatch=words.length>0&&words.filter(w=>nameEnLower.includes(w)||nameLower.includes(w)).length>=Math.ceil(words.length*0.6);
      const esMatch=wordsEs.length>0&&wordsEs.filter(w=>nameLower.includes(w)).length>=Math.ceil(wordsEs.length*0.6);
      return enMatch||esMatch;
    });

    // Price-rise check: flag if price paid is higher than last recorded price
    let priceRise=null;
    if(matchProduct&&matchProduct.last_price_mxn>0&&item.price_mxn>matchProduct.last_price_mxn){
      priceRise={was:matchProduct.last_price_mxn,now:item.price_mxn,pct:Math.round((item.price_mxn-matchProduct.last_price_mxn)/matchProduct.last_price_mxn*100)};
    }
    // Unrecognised: no product match AND no ingredient match
    const unrecognised=!matchProduct&&!matchIngredient;

async function saveReceiptItems(){
  const btn=document.querySelector('#receipt-overlay .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}

  let updated=0,added=0,errors=0;

  for(let i=0;i<receiptItems.length;i++){
    const check=document.getElementById(`rcheck-${i}`);
    if(!check?.checked)continue;
    const item=receiptItems[i];

    try{
      if(item.existingProduct){
        // Update price (and fill in name_en/category if missing)
        const updates={last_price_mxn:item.price_mxn};
        if(!item.existingProduct.name_en&&item.name_en)updates.name_en=item.name_en;
        if(!item.existingProduct.category&&item.category_guess)updates.category=item.category_guess;
        if(!item.existingProduct.ingredient_id&&item.matchedIngredient)updates.ingredient_id=item.matchedIngredient.id;
        await sb.from('household_products').update(updates).eq('id',item.existingProduct.id);
        await sb.from('price_history').insert({product_id:item.existingProduct.id,price_mxn:item.price_mxn,plan_id:currentPlan?.id||null,added_by:userProfile?.id||null,recorded_at:new Date().toISOString()});
        updated++;
      }else{
        // Build notes: include weight/qty and unit price if available
        const noteParts=[];
        if(item.weight_or_qty)noteParts.push(item.weight_or_qty);
        if(item.unit_price_mxn&&item.unit_price_mxn!==item.price_mxn)noteParts.push(`$${item.unit_price_mxn.toFixed(2)}/unit`);
        noteParts.push('From receipt');
        const isComplete=!!(item.name_en&&item.category_guess&&item.matchedIngredient);
        if(!isComplete)noteParts.push('incomplete');
        const{data:newProd2}=await sb.from('household_products').insert({
          name_es:item.name_es,
          name_en:item.name_en||null,
          store:'La Comer',
          category:item.category_guess||null,
          last_price_mxn:item.price_mxn,
          is_preferred_lacomer:true,
          ingredient_id:item.matchedIngredient?.id||null,
          notes:noteParts.join(' | '),
          added_by:userProfile.id,
          created_at:new Date().toISOString()
        }).select('id').single();
        if(newProd2?.id)await sb.from('price_history').insert({product_id:newProd2.id,price_mxn:item.price_mxn,plan_id:currentPlan?.id||null,added_by:userProfile?.id||null,recorded_at:new Date().toISOString()});
        added++;
      }
    }catch(e){errors++;console.warn('Receipt save error:',e.message);}
  }

  // Collect saved items that have a matched ingredient and weight for leftover calc
  const savedForLeftovers=[];
  for(let i=0;i<receiptItems.length;i++){
    const check=document.getElementById(`rcheck-${i}`);
    if(!check?.checked)continue;
    const item=receiptItems[i];
    if(item.matchedIngredient&&item.weight_or_qty)savedForLeftovers.push(item);
  }

  // Calculate leftovers
  const leftovers=await calculateLeftovers(savedForLeftovers);

  if(leftovers.length>0){
    // Show leftover review step instead of closing immediately
    if(btn){btn.disabled=false;btn.textContent='Save leftovers ✓';}
    const msg=`${updated} price${updated!==1?'s':''} updated, ${added} new product${added!==1?'s':''} added${errors?`, ${errors} errors`:''}`;
    showToast('Products saved — review leftovers below');
    showLeftoverReviewStep(leftovers, async (confirmed)=>{await saveLeftovers(confirmed);});
    productsCache=null;
    return;
  }

  closeReceiptScanner();
  productsCache=null;
  await loadAndRenderProducts();
  const msg=`Receipt saved — ${updated} price${updated!==1?'s':''} updated, ${added} new product${added!==1?'s':''} added${errors?`, ${errors} errors`:''}`;
  showToast(msg);
}
/* ── LEFTOVER TRACKING ────────────────────────── */
const STORAGE_LABELS={fridge:'🧊 Fridge',freezer:'❄️ Freezer',pantry:'🗄 Pantry',cupboard:'🚪 Cupboard'};
const STORAGE_CLASSES={fridge:'storage-fridge',freezer:'storage-freezer',pantry:'storage-pantry',cupboard:'storage-cupboard'};

// Parse "1.456 kg" / "330 ml" / "2 pcs" → {amount, unit} in base units (g / ml / pcs)
function parseWeightOrQty(str){
  if(!str)return null;
  const m=str.match(/([\d.,]+)\s*([a-zA-Z]+)/);
  if(!m)return null;
  const num=parseFloat(m[1].replace(',','.'));
  const rawUnit=m[2].toLowerCase();
  if(rawUnit==='kg')return{amount:num*1000,unit:'g'};
  if(rawUnit==='g')return{amount:num,unit:'g'};
  if(rawUnit==='l'||rawUnit==='lt'||rawUnit==='ltr')return{amount:num*1000,unit:'ml'};
  if(rawUnit==='ml')return{amount:num,unit:'ml'};
  return{amount:num,unit:rawUnit};
}

// Convert ingredient quantity+unit to base units matching above
function toBaseUnit(qty,unit){
  if(!qty)return null;
  const u=(unit||'').toLowerCase();
  if(u==='kg')return{amount:qty*1000,unit:'g'};
  if(u==='g')return{amount:qty,unit:'g'};
  if(u==='l'||u==='lt'||u==='ltr')return{amount:qty*1000,unit:'ml'};
  if(u==='ml')return{amount:qty,unit:'ml'};
  return{amount:qty,unit:u||'pcs'};
}

function formatAmount(amount,unit){
  if(unit==='g'&&amount>=1000)return`${(amount/1000).toFixed(2).replace(/\.?0+$/,'')} kg`;
  if(unit==='ml'&&amount>=1000)return`${(amount/1000).toFixed(2).replace(/\.?0+$/,'')} L`;
  return`${parseFloat(amount.toFixed(1))} ${unit}`;
}

async function calculateLeftovers(savedItems){
  // savedItems = array of {name_en, matchedIngredient, weight_or_qty, price_mxn}
  const leftovers=[];
  if(!currentPlan||!savedItems.length)return leftovers;

  // Get all ingredient needs for this week's plan
  const{data:planMeals}=await sb.from('weekly_plan_meals').select('recipe_id').eq('plan_id',currentPlan.id).neq('is_dinner',true);
  if(!planMeals?.length)return leftovers;
  const recipeIds=planMeals.map(m=>m.recipe_id);
  const{data:allIngs}=await sb.from('ingredients').select('id,name_en,quantity,unit').in('recipe_id',recipeIds);

  for(const item of savedItems){
    if(!item.matchedIngredient||!item.weight_or_qty)continue;
    const bought=parseWeightOrQty(item.weight_or_qty);
    if(!bought)continue;

    // Sum all recipe needs for this ingredient this week
    const matchingIngs=(allIngs||[]).filter(i=>i.id===item.matchedIngredient.id);
    let totalNeeded=0;
    for(const ing of matchingIngs){
      const base=toBaseUnit(ing.quantity,ing.unit);
      if(base&&base.unit===bought.unit)totalNeeded+=base.amount;
    }
    if(totalNeeded<=0)continue;

    const leftoverAmount=bought.amount-totalNeeded;
    if(leftoverAmount>0.01){
      leftovers.push({
        ingredient_id:item.matchedIngredient.id,
        name_en:item.name_en||item.matchedIngredient.name_en,
        bought:bought.amount,
        needed:totalNeeded,
        leftover:leftoverAmount,
        unit:bought.unit,
      });
    }
  }
  return leftovers;
}

async function saveLeftovers(leftovers){
  if(!leftovers.length){closeReceiptScanner();productsCache=null;await loadAndRenderProducts();return;}
  let saved=0;
  for(const l of leftovers){
    if(!l.storage)continue;
    try{
      await sb.from('leftovers').insert({
        plan_id:currentPlan?.id||null,
        ingredient_id:l.ingredient_id||null,
        name_en:l.name_en,
        amount:parseFloat(l.leftover.toFixed(3)),
        unit:l.unit,
        storage:l.storage,
        used:false,
        created_at:new Date().toISOString()
      });
      saved++;
    }catch(e){console.warn('Leftover save error:',e.message);}
  }
  closeReceiptScanner();
  productsCache=null;
  await loadAndRenderProducts();
  if(saved>0){showToast(`${saved} leftover${saved!==1?'s':''} tracked ✓`);loadLeftovers();}
}

async function loadLeftovers(){
  const el=document.getElementById('leftovers-list');if(!el)return;
  try{
    const{data,error}=await sb.from('leftovers').select('*').eq('used',false).order('created_at',{ascending:false});
    if(error)throw error;
    if(!data?.length){el.innerHTML=`<div class="empty"><span class="empty-icon">📦</span>No leftovers tracked yet — they appear here after receipt scanning</div>`;return;}
    // Group by storage
    const groups={fridge:[],freezer:[],pantry:[],cupboard:[]};
    for(const l of data){(groups[l.storage]||groups.pantry).push(l);}
    let html='';
    for(const[storage,items]of Object.entries(groups)){
      if(!items.length)continue;
      html+=`<div style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--mid);margin:12px 0 6px">${STORAGE_LABELS[storage]}</div>`;
      for(const l of items){
        html+=`<div class="leftover-card-row">
          <div style="flex:1">
            <div class="leftover-card-name">${l.name_en}</div>
          </div>
          <span class="leftover-card-amount">${formatAmount(l.amount,l.unit)}</span>
          <span class="leftover-card-storage ${STORAGE_CLASSES[storage]}">${STORAGE_LABELS[storage]}</span>
          <div style="display:flex;gap:4px">
            <button class="leftover-move-btn" onclick="openMoveLeftoverModal('${l.id}','${l.name_en}','${l.storage}')" title="Move to different location">↗</button>
            <button class="leftover-move-btn" onclick="openEditLeftoverModal('${l.id}','${l.name_en.replace(/'/g,"\\'")}','${l.amount}','${l.unit}','${l.storage}')" title="Edit">✏️</button>
            <button class="leftover-move-btn" style="color:#c44" onclick="deleteLeftover('${l.id}','${l.name_en.replace(/'/g,"\\'")}',this)" title="Delete">✕</button>
            <button class="leftover-used-btn" onclick="markLeftoverUsed('${l.id}',this)">Used ✓</button>
          </div>
        </div>`;
      }
    }
    el.innerHTML=html;
  }catch(e){el.innerHTML=`<div class="empty" style="color:#c44">Error loading leftovers: ${e.message}</div>`;}
}

// Loaded at init — keyed by user_id
let userPermissions = {};

async function loadPermissions(){
  try{
    const { data, error } = await sb.from('user_permissions').select('*').in('user_id', [SIENNA_ID, KAREN_ID]);
    if(error) throw error;
    const rows = data || [];
    userPermissions = {};
    for(const row of rows){
      if(!userPermissions[row.user_id]) userPermissions[row.user_id] = {};
      userPermissions[row.user_id][row.permission_key] = row.granted;
    }
  }catch(e){ console.warn('Permissions load error:', e.message); }
}

// Check if a user has a given permission (falls back to role defaults)
function hasPermission(userId, permKey){
  if(!userId || !permKey) return false;
  // Admin (Cameron) always has full access
  if(userId === CAMERON_ID) return true;
  // Check loaded permissions first
  if(userPermissions[userId] && userPermissions[userId][permKey] !== undefined){
    return userPermissions[userId][permKey];
  }
  // Fall back to role default
  const profile = userId === SIENNA_ID ? 'planner' : userId === KAREN_ID ? 'reviewer' : null;
  if(profile && PERMISSION_DEFAULTS[profile]) return PERMISSION_DEFAULTS[profile][permKey] ?? false;
  return false;
}

// Convenience: check permission for the current logged-in user
function currentUserCan(permKey){
  return hasPermission(userProfile?.id, permKey);
}

async function savePermission(userId, permKey, granted){
  const savingEl = document.getElementById(`perm-saving-${userId}`);
  if(savingEl){ savingEl.textContent = 'Saving…'; savingEl.classList.add('visible'); }
  // Upsert using user_id + permission_key as unique constraint
  const { error } = await sb.from('user_permissions').upsert(
    { user_id: userId, permission_key: permKey, granted: granted, updated_by: userProfile.id, updated_at: new Date().toISOString() },
    { onConflict: 'user_id,permission_key' }
  );
  if(error){ showToast('Error saving permission: ' + error.message, 'error');
    if(savingEl){ savingEl.textContent = 'Error'; setTimeout(()=>{ savingEl.textContent=''; savingEl.classList.remove('visible'); }, 2000); }
    return;
  }
  // Update local cache
  if(!userPermissions[userId]) userPermissions[userId] = {};
  userPermissions[userId][permKey] = granted;
  if(savingEl){ savingEl.textContent = 'Saved ✓'; setTimeout(()=>{ savingEl.textContent=''; savingEl.classList.remove('visible'); }, 1500); }
}

function downloadRecipeTemplate(){
  const headers=[
    'recipe_name_en',
    'recipe_name_es',
    'prep_time_minutes',
    'cook_time_minutes',
    'advance_prep_required',
    'advance_prep_description',
    'same_day_cookable',
    'is_dinner',
    'ingredient_name_en',
    'ingredient_name_es',
    'quantity',
    'unit',
    'lacomer_category',
    'lacomer_url'
  ];
  const notes=[
    '# INSTRUCTIONS',
    '# One row per ingredient. Repeat recipe details on each row for the same recipe.',
    '# advance_prep_required: TRUE or FALSE',
    '# same_day_cookable: TRUE or FALSE',
    '# is_dinner: TRUE for dinner recipes, FALSE or blank for lunch/main meals',
    '# unit examples: g, ml, pcs, tbsp, tsp, cup, kg, L',
    '# lacomer_category options: Produce, Meats & Eggs, Dairy, Grains Pasta & Bakery, Canned & Packaged Foods, Herbs Vinegar & Condiments, Frozen, Beverages, Other',
    '# lacomer_url: optional — the La Comer product page URL for this ingredient',
    '#',
    '# TIP: You can paste this template into ChatGPT or Claude and ask it to fill in your family meals in this exact format.',
    '#'
  ].join('\n');
  const example=[
    'Spaghetti Bolognese','Espagueti a la Boloñesa','15','40','FALSE','','TRUE','FALSE','Beef mince','Carne molida de res','500','g','Meats & Eggs','',
    'Spaghetti Bolognese','Espagueti a la Boloñesa','15','40','FALSE','','TRUE','FALSE','Onion','Cebolla','1','pcs','Produce','',

const CHEVRON_SVG = `<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>`;

// Generate a collapsible section header + body wrapper
function sectionHeader(id, label, defaultOpen=true){
  const stored = localStorage.getItem('sec_'+id);

  return `<div class="sec-wrapper" data-sec-id="${id}" draggable="true" ondragstart="secDragStart(event)" ondragover="secDragOver(event)" ondrop="secDrop(event)" ondragend="secDragEnd(event)">

  </div>
  <div class="sec-body${isOpen?'':' collapsed'}" id="sec-${id}">`;
}

// Close the sec-body div — also closes sec-wrapper
function sectionEnd(){ return '</div></div>'; }

function toggleSection(id){
  const body = document.getElementById('sec-'+id);
  const chev = document.getElementById('chev-'+id);
  if(!body||!chev) return;
  const isCollapsed = body.classList.contains('collapsed');
  body.classList.toggle('collapsed', !isCollapsed);
  chev.classList.toggle('collapsed', !isCollapsed);
  localStorage.setItem('sec_'+id, isCollapsed?'1':'0');
}

/* ── SECTION DRAG-TO-REORDER ─────────────────── */
const SEC_ORDER_KEY = (role) => `forknight_sec_order_${role}`;

function getSectionOrder(role, defaultIds) {
  try {
    const stored = localStorage.getItem(SEC_ORDER_KEY(role));
    if (stored) {
      const parsed = JSON.parse(stored);
      // merge: keep stored order, append any new ids not yet stored
      const known = new Set(parsed);
      const merged = [...parsed.filter(id => defaultIds.includes(id)), ...defaultIds.filter(id => !known.has(id))];
      return merged;
    }
  } catch(e) {}
  return [...defaultIds];
}

function saveSectionOrder(role, ids) {
  try { localStorage.setItem(SEC_ORDER_KEY(role), JSON.stringify(ids)); } catch(e) {}
}

function applySectionOrder(role, defaultIds) {
  const order = getSectionOrder(role, defaultIds);
  const container = document.querySelector('.fade-in');
  if (!container) return;
  const wrappers = {};
  container.querySelectorAll('.sec-wrapper[data-sec-id]').forEach(el => {
    wrappers[el.dataset.secId] = el;
  });
  order.forEach(id => {
    if (wrappers[id]) container.appendChild(wrappers[id]);
  });
}

let _secDragSrc = null;

function secDragStart(e) {
  _secDragSrc = e.currentTarget;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', _secDragSrc.dataset.secId);
  setTimeout(() => _secDragSrc && _secDragSrc.classList.add('dragging'), 0);
}

function secDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const target = e.currentTarget;
  if (target === _secDragSrc) return;
  document.querySelectorAll('.sec-wrapper.drag-over').forEach(el => el.classList.remove('drag-over'));
  target.classList.add('drag-over');
}

function secDrop(e) {
  e.preventDefault();
  const target = e.currentTarget;
  if (!_secDragSrc || target === _secDragSrc) return;
  target.classList.remove('drag-over');
  const parent = target.parentNode;
  const siblings = [...parent.querySelectorAll(':scope > .sec-wrapper[data-sec-id]')];
  const srcIdx = siblings.indexOf(_secDragSrc);
  const tgtIdx = siblings.indexOf(target);
  if (srcIdx < tgtIdx) parent.insertBefore(_secDragSrc, target.nextSibling);
  else parent.insertBefore(_secDragSrc, target);
  // Save new order
  const newOrder = [...parent.querySelectorAll(':scope > .sec-wrapper[data-sec-id]')].map(el => el.dataset.secId);
  const role = userProfile?.role || 'admin';
  saveSectionOrder(role, newOrder);
  showToast('Section order saved ✓');
}

function secDragEnd(e) {
  if (_secDragSrc) _secDragSrc.classList.remove('dragging');
  document.querySelectorAll('.sec-wrapper.drag-over').forEach(el => el.classList.remove('drag-over'));
  _secDragSrc = null;
}
/* ── END SECTION DRAG-TO-REORDER ────────────── */

function collapseAll(ids){
  ids.forEach(id=>{
    const body=document.getElementById('sec-'+id);
    const chev=document.getElementById('chev-'+id);
    if(body&&chev){body.classList.add('collapsed');chev.classList.add('collapsed');localStorage.setItem('sec_'+id,'0');}
  });
}

function expandAll(ids){
  ids.forEach(id=>{
    const body=document.getElementById('sec-'+id);
    const chev=document.getElementById('chev-'+id);
    if(body&&chev){body.classList.remove('collapsed');chev.classList.remove('collapsed');localStorage.setItem('sec_'+id,'1');}
  });
}
/* ── END COLLAPSIBLE SECTIONS ───────────────── */

/* ── PLAN HISTORY ───────────────────────────── */
async function renderHistoryView(){
  if(userProfile.role!=='admin'){showToast('Admin only','error');switchView('dashboard');return;}
  const content=document.getElementById('dashboard-content');
  const showTests=content._showTests||false;
  content.innerHTML=`<div class="fade-in"><div class="page-header"><h1>Plan History</h1><p>A read-only record of every past week.</p></div><div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:16px"><label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;cursor:pointer"><input type="checkbox" id="show-test-plans" ${showTests?'checked':''} onchange="toggleHistoryTestPlans(this.checked)" style="accent-color:var(--clay)"> Show test plans</label></div><div id="history-body"><div style="color:var(--mid);font-size:0.9rem;padding:40px 0;text-align:center">Loading past plans…</div></div></div>`;

  const{data:plans,error:planErr}=await sb.from('weekly_plans')
    .select('id,week_start,status,created_at,is_test')
    .eq('status','archived')
    .order('week_start',{ascending:false});

  const body=document.getElementById('history-body');
  if(planErr){body.innerHTML=`<div style="color:#c44;padding:20px">Error loading plans: ${planErr.message}</div>`;return;}
  if(!plans||plans.length===0){body.innerHTML=`<div style="color:var(--mid);font-size:0.9rem;padding:40px 0;text-align:center">No archived plans yet.</div>`;return;}

  const filtered=showTests?plans:plans.filter(p=>!p.is_test);
  if(filtered.length===0){body.innerHTML=`<div style="color:var(--mid);font-size:0.9rem;padding:40px 0;text-align:center">No regular plans yet — tick "Show test plans" to see test plans.</div>`;return;}

  const planIds=filtered.map(p=>p.id);
  const{data:allMeals,error:mealErr}=await sb.from('weekly_plan_meals')
    .select('plan_id,is_dinner,cooked,recipes!weekly_plan_meals_recipe_id_fkey(name_en,name_es)')
    .in('plan_id',planIds);

  if(mealErr){body.innerHTML=`<div style="color:#c44;padding:20px">Error loading meals: ${mealErr.message}</div>`;return;}

  const mealsByPlan={};
  for(const m of allMeals||[]){
    if(!mealsByPlan[m.plan_id])mealsByPlan[m.plan_id]=[];
    mealsByPlan[m.plan_id].push(m);
  }

  const fmt=d=>{const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-MX',{day:'numeric',month:'long',year:'numeric'});};

  const planCards=filtered.map((plan,idx)=>{
    const meals=mealsByPlan[plan.id]||[];
    const lunches=meals.filter(m=>m.is_dinner!==true);
    const dinners=meals.filter(m=>m.is_dinner===true);
    const cookedCount=meals.filter(m=>m.cooked).length;
    const totalCount=meals.length;
    const isTest=plan.is_test===true;

    const mealRow=(m,icon)=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);"><span style="font-size:0.85rem;flex:1;color:${m.cooked?'var(--mid)':'var(--dark)'};${m.cooked?'text-decoration:line-through':''}">${icon} ${m.recipes?.name_en||'Unknown'}</span><span style="font-size:0.72rem;font-weight:500;padding:2px 8px;border-radius:999px;background:${m.cooked?'rgba(74,124,89,0.12)':'rgba(200,103,74,0.1)'};color:${m.cooked?'var(--green)':'var(--clay)'}">${m.cooked?'✓ Cooked':'— Uncooked'}</span></div>`;

    const lunchRows=lunches.length>0?lunches.map(m=>mealRow(m,'🍽')).join(''):`<div style="color:var(--mid);font-size:0.82rem;padding:8px 0">No lunches recorded</div>`;
    const dinnerRows=dinners.length>0?dinners.map(m=>mealRow(m,'🌙')).join(''):`<div style="color:var(--mid);font-size:0.82rem;padding:8px 0">No dinners recorded</div>`;

    const secId=`hist-${plan.id}`;
    const stored=localStorage.getItem('sec_'+secId);
    const isOpen=stored!==null?stored==='1':idx===0;
    const testBadge=isTest?`<span style="font-size:0.7rem;font-weight:600;padding:2px 8px;border-radius:999px;background:rgba(200,103,74,0.12);color:var(--clay);border:1px solid rgba(200,103,74,0.25);margin-left:8px">🧪 Test</span>`:'';
    const deleteBtn=isTest?`<button class="btn-secondary" style="font-size:0.72rem;padding:4px 12px;color:#c44;border-color:rgba(200,50,50,0.3);white-space:nowrap;flex-shrink:0" onclick="deleteTestPlan('${plan.id}','${fmt(plan.week_start)}')">🗑 Delete</button>`:'';

    return `<div class="card" style="margin-bottom:16px${isTest?';border-color:rgba(200,103,74,0.25)':''}">
      <div style="display:flex;align-items:center;gap:8px;padding:10px 0">
        <div style="flex:1;cursor:pointer" onclick="toggleSection('${secId}')">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div>
              <div style="font-size:1rem;font-weight:600;color:var(--dark);display:flex;align-items:center">Week of ${fmt(plan.week_start)}${testBadge}</div>
              <div style="font-size:0.78rem;color:var(--mid);margin-top:2px">${totalCount} meal${totalCount!==1?'s':''} planned · ${cookedCount} cooked · ${totalCount-cookedCount} uncooked</div>
            </div>
            <span class="sec-chevron${isOpen?'':' collapsed'}" id="chev-${secId}">${CHEVRON_SVG}</span>
          </div>
        </div>
        ${deleteBtn}
      </div>
      <div class="sec-body${isOpen?'':' collapsed'}" id="sec-${secId}" style="padding-top:4px">
        ${lunches.length>0?`<div style="font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--mid);margin-bottom:4px">Lunches</div>${lunchRows}`:''}
        ${dinners.length>0?`<div style="font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--mid);margin-top:14px;margin-bottom:4px">Dinners</div>${dinnerRows}`:''}
      </div>
    </div>`;
  }).join('');

  body.innerHTML=planCards;
}

function toggleHistoryTestPlans(show){
  const content=document.getElementById('dashboard-content');
  content._showTests=show;
  renderHistoryView();
}

async function deleteTestPlan(planId,planLabel){
  if(!confirm(`Permanently delete the test plan "${planLabel}"?\n\nThis cannot be undone.`))return;
  const{error:mealsErr}=await sb.from('weekly_plan_meals').delete().eq('plan_id',planId);
  if(mealsErr){showToast('Error deleting meals: '+mealsErr.message,'error');return;}
  const{error:planErr}=await sb.from('weekly_plans').delete().eq('id',planId);
  if(planErr){showToast('Error deleting plan: '+planErr.message,'error');return;}
  showToast('Test plan deleted ✓');
  renderHistoryView();
}
/* ── END PLAN HISTORY ───────────────────────── */

init();
</script>
