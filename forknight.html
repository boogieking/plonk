<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#C8674A"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Plonk"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>Forknight — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#F5F0E8;--clay:#C8674A;--clay-dark:#a85238;
      --dark:#1A1612;--mid:#6B5F54;--light:#E8DDD0;
      --green:#4A7C59;--amber:#B8860B;--blue:#2E5F8A;
      --surface:rgba(255,255,255,0.75);
      --border:rgba(200,180,160,0.4);
      --radius:14px;
    }
    html{overflow-x:hidden;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 85% 10%,rgba(200,103,74,0.10) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 5% 90%,rgba(200,103,74,0.07) 0%,transparent 50%);pointer-events:none;z-index:0;}
    nav{position:sticky;top:0;z-index:100;background:rgba(245,240,232,0.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:58px;overflow:hidden;}
    @media(max-width:600px){nav{flex-wrap:wrap;height:auto;padding:10px 14px 0;overflow:visible;}}    
    .nav-brand{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--dark);display:flex;align-items:center;}
    .nav-brand-word{display:inline;font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--dark);margin-left:8px}
    .nav-brand-word .n{color:var(--clay)}
    .nav-right{display:flex;align-items:center;gap:16px;flex-shrink:0;}
    @media(max-width:600px){.nav-right{gap:8px;}.user-chip{padding:5px 8px 5px 5px;font-size:0.78rem;}.sign-out{font-size:0.75rem;padding:6px 4px;}}
    .user-chip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 14px 5px 5px;font-size:0.82rem;}
    .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:500;color:white;}
    .role-tag{font-size:0.68rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;padding:2px 8px;border-radius:999px;color:white;}
    .sign-out{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--mid);padding:6px 10px;border-radius:8px;transition:background 0.15s,color 0.15s;}
    .sign-out:hover{background:var(--light);color:var(--dark)}
    main{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:32px 24px 60px;}
    @media(max-width:480px){main{padding:20px 14px 60px;}}
    .page-header{margin-bottom:28px}
    .page-header h1{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--dark);line-height:1.2;}
    .page-header p{margin-top:5px;font-size:0.88rem;color:var(--mid);font-weight:300;}
    .week-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
    @media(max-width:600px){.week-banner{flex-direction:column;align-items:stretch;gap:12px;padding:16px;}.week-banner .status-label{font-size:0.78rem;}.week-banner>div:last-child{display:flex;flex-wrap:wrap;gap:8px;width:100%;}.week-banner>div:last-child .btn-primary,.week-banner>div:last-child .btn-secondary{flex:1;min-width:0;text-align:center;}}
    .status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .status-label{font-size:0.82rem;font-weight:500;color:var(--mid);text-transform:uppercase;letter-spacing:0.05em}
    .status-text{font-size:0.88rem;color:var(--dark);min-width:0;word-break:break-word}
    .btn-primary{background:var(--clay);color:white;border:none;border-radius:10px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:background 0.18s,transform 0.12s;box-shadow:0 3px 10px rgba(200,103,74,0.3);}
    .btn-primary:hover{background:var(--clay-dark);transform:translateY(-1px)}
    .btn-primary:disabled{opacity:0.45;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-secondary{background:white;color:var(--dark);border:1.5px solid var(--border);border-radius:10px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:400;cursor:pointer;white-space:nowrap;transition:border-color 0.18s,background 0.18s;}
    .btn-secondary:hover{border-color:var(--clay);background:rgba(200,103,74,0.04)}
    .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px}
    @media(max-width:720px){.grid-3{grid-template-columns:1fr}}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
    .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .card-title{font-size:0.78rem;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--mid);}
    .meal-list{display:flex;flex-direction:column;gap:10px}
    .meal-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:rgba(255,255,255,0.6);border:1px solid rgba(200,180,160,0.3);border-radius:10px;transition:border-color 0.15s,background 0.15s;}
    .meal-item:hover{border-color:var(--clay);background:rgba(255,255,255,0.85)}
    .meal-name{font-size:0.9rem;font-weight:400}
    .meal-meta{font-size:0.75rem;color:var(--mid)}
    .meal-actions{display:flex;gap:6px}
    .tag{display:inline-flex;align-items:center;font-size:0.7rem;font-weight:500;padding:3px 9px;border-radius:999px;}
    .tag-green{background:rgba(74,124,89,0.12);color:var(--green)}
    .tag-amber{background:rgba(184,134,11,0.12);color:var(--amber)}
    .tag-blue{background:rgba(46,95,138,0.12);color:var(--blue)}
    .tag-gray{background:rgba(107,95,84,0.1);color:var(--mid)}
    .request-item{padding:12px 14px;border-left:3px solid var(--clay);background:rgba(200,103,74,0.05);border-radius:0 10px 10px 0;margin-bottom:10px;}
    .request-from{font-size:0.74rem;font-weight:500;color:var(--clay);margin-bottom:3px}
    .request-text{font-size:0.85rem;color:var(--dark)}
    .request-reason{font-size:0.78rem;color:var(--mid);margin-top:3px;font-style:italic}
    .request-btns{display:flex;gap:8px;margin-top:10px}
    .stat-tile{text-align:center}
    .stat-num{font-family:'Playfair Display',serif;font-size:2rem;color:var(--dark)}
    .stat-label{font-size:0.76rem;color:var(--mid);margin-top:2px}
    .inv-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(200,180,160,0.2);}
    .inv-row:last-child{border-bottom:none}
    .inv-name{font-size:0.88rem}
    .inv-toggle{display:flex;gap:6px}
    .have-btn,.need-btn{padding:4px 12px;font-size:0.72rem;font-weight:500;border-radius:999px;border:1.5px solid;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;}
    .have-btn{border-color:var(--green);color:var(--green);background:transparent}
    .have-btn.active{background:var(--green);color:white}
    .need-btn{border-color:#C44;color:#C44;background:transparent}
    .need-btn.active{background:#C44;color:white}
    .shop-category-label{font-size:0.7rem;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--mid);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
    .shop-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(200,180,160,0.15);gap:12px;}
    .shop-row:last-child{border-bottom:none}
    .shop-names{flex:1;min-width:0}
    .shop-name-en{font-size:0.88rem;font-weight:400;color:var(--dark)}
    .shop-name-es{font-size:0.74rem;color:var(--mid);margin-top:1px}
    .shop-link{display:inline-flex;align-items:center;gap:5px;font-size:0.75rem;font-weight:500;color:var(--clay);text-decoration:none;padding:4px 10px;border:1.5px solid rgba(200,103,74,0.3);border-radius:999px;white-space:nowrap;transition:all 0.15s;background:rgba(200,103,74,0.04);flex-shrink:0;}
    .shop-link:hover{background:var(--clay);color:white;border-color:var(--clay)}
    .add-link-btn{font-size:0.72rem;font-weight:500;color:var(--mid);background:transparent;border:1.5px dashed var(--border);border-radius:999px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
    .add-link-btn:hover{border-color:var(--clay);color:var(--clay)}
    .find-link-btn{font-size:0.72rem;font-weight:500;color:white;background:var(--clay);border:none;border-radius:999px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:background 0.15s;flex-shrink:0;}
    .find-link-btn:hover{background:var(--clay-dark);}
    .link-btn-group{display:flex;gap:5px;align-items:center;flex-shrink:0;}
    .add-link-form{display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;}
    .add-link-input{flex:1;min-width:180px;padding:5px 10px;border:1.5px solid var(--clay);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.78rem;outline:none;color:var(--dark);}
    .save-link-btn{padding:5px 12px;font-size:0.75rem;font-weight:500;background:var(--clay);color:white;border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:background 0.15s;}
    .save-link-btn:hover{background:var(--clay-dark)}
    .cancel-link-btn{padding:5px 10px;font-size:0.75rem;background:none;border:none;cursor:pointer;color:var(--mid);font-family:'DM Sans',sans-serif;}
    .casa-king-section{margin-top:24px;padding-top:20px;border-top:2px dashed rgba(200,180,160,0.4);}
    .casa-king-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .casa-king-badge{font-size:0.68rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;background:rgba(46,95,138,0.1);color:var(--blue);padding:3px 9px;border-radius:999px;}
    .ck-item-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(200,180,160,0.15);gap:10px;}
    .ck-item-row:last-child{border-bottom:none}
    .ck-item-text{font-size:0.88rem;color:var(--dark)}
    .ck-done-btn{padding:4px 12px;font-size:0.72rem;font-weight:500;border-radius:999px;border:1.5px solid var(--green);color:var(--green);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
    .ck-done-btn:hover{background:var(--green);color:white}
    .ck-done-btn.done{background:var(--green);color:white;opacity:0.5;cursor:default;text-decoration:line-through;}
    .ck-item-row.ticked .ck-item-text{text-decoration:line-through;color:var(--mid);opacity:0.6;}
    .tier-badge{display:inline-flex;align-items:center;gap:5px;font-size:0.68rem;font-weight:500;padding:2px 8px;border-radius:999px;border:1.5px solid;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;}
    .tier-badge:hover{opacity:0.8}
    .tier-weekly{color:#4A7C59;border-color:rgba(74,124,89,0.4);background:rgba(74,124,89,0.08)}
    .tier-regular{color:#2E5F8A;border-color:rgba(46,95,138,0.4);background:rgba(46,95,138,0.08)}
    .tier-occasional{color:#B8860B;border-color:rgba(184,134,11,0.4);background:rgba(184,134,11,0.08)}
    .tier-rare{color:#C8674A;border-color:rgba(200,103,74,0.4);background:rgba(200,103,74,0.08)}
    .tier-hibernated{color:#6B5F54;border-color:rgba(107,95,84,0.3);background:rgba(107,95,84,0.07)}
    .tier-locked::after{content:' 🔒';font-size:0.6rem}
    .tier-select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;background:white;margin-bottom:10px;}
    .tier-select:focus{border-color:var(--clay)}
    .side-swap-btn{font-size:0.7rem;font-weight:500;color:var(--blue);background:rgba(46,95,138,0.08);border:1.5px solid rgba(46,95,138,0.25);border-radius:999px;padding:2px 9px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all 0.15s;margin-left:6px;}
    .side-swap-btn:hover{background:var(--blue);color:white;border-color:var(--blue)}
    .side-swap-select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;outline:none;background:white;margin-bottom:12px;}
    .empty{text-align:center;padding:32px 16px;color:var(--mid);font-size:0.85rem;}
    .empty-icon{font-size:2rem;margin-bottom:8px;display:block}
    .section-label{font-size:0.72rem;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:var(--mid);margin:28px 0 12px;}
    #loading{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:var(--cream);}
    .spin{width:36px;height:36px;border:3px solid var(--light);border-top-color:var(--clay);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    #app{display:none}
    #app.ready{display:block}
    .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(26,22,18,0.5);display:flex;align-items:center;justify-content:center;padding:20px;}
    .modal{background:white;border-radius:var(--radius);padding:28px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
    .modal h3{font-size:1.05rem;font-weight:500;margin-bottom:8px}
    .modal p{font-size:0.85rem;color:var(--mid);margin-bottom:16px}
    .modal textarea{width:100%;padding:10px 12px;border:1.5px solid var(--light);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.88rem;resize:vertical;min-height:80px;outline:none;transition:border-color 0.2s;}
    .modal textarea:focus{border-color:var(--clay)}
    .modal-btns{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}
    .btn-ghost{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--mid);padding:8px 14px;border-radius:8px;transition:background 0.15s;}
    .btn-ghost:hover{background:var(--light)}
    .day-selector{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
    .day-btn{padding:7px 14px;border-radius:999px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;transition:all 0.15s;}
    .day-btn.selected{background:var(--clay);border-color:var(--clay);color:white}
    .day-count{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--clay);display:inline;margin-right:6px;}
    .rating-prompt{margin-top:10px;padding:12px 14px;background:rgba(200,103,74,0.06);border:1px solid rgba(200,103,74,0.2);border-radius:10px;}
    .rating-prompt-label{font-size:0.78rem;color:var(--clay);font-weight:500;margin-bottom:8px}
    .star-row{display:flex;gap:6px;align-items:center}
    .star-btn{font-size:1.4rem;background:none;border:none;cursor:pointer;padding:2px;line-height:1;transition:transform 0.1s;color:#ccc;}
    .star-btn:hover,.star-btn.active{color:#C8674A;transform:scale(1.15)}
    .rating-submit-btn{margin-top:8px;padding:5px 14px;font-size:0.78rem;font-weight:500;background:var(--clay);color:white;border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s;}
    .rating-submit-btn:hover{background:var(--clay-dark)}
    .rating-submitted{font-size:0.78rem;color:var(--green);margin-top:6px;font-weight:500;}
    .meal-item.cooked{opacity:0.6;background:rgba(74,124,89,0.06);border-color:rgba(74,124,89,0.2);}
    .meal-item.cooked .meal-name::after{content:' ✓';color:var(--green);font-size:0.8rem;}
    .fade-in{animation:fadeIn 0.4s ease both}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .prep-warning-modal{background:white;border-radius:var(--radius);padding:28px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
    .prep-warning-modal .warn-icon{font-size:2rem;margin-bottom:10px}
    .prep-warning-modal h3{font-size:1.05rem;font-weight:500;margin-bottom:6px;color:#c03030}
    .prep-warning-modal .warn-reason{font-size:0.85rem;color:var(--dark);margin-bottom:14px;padding:10px 14px;background:rgba(200,50,50,0.06);border-left:3px solid #c44;border-radius:0 8px 8px 0;}
    .prep-warning-modal .alt-label{font-size:0.74rem;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--mid);margin-bottom:8px;}
    .prep-alt-item{padding:8px 12px;border-radius:8px;background:rgba(74,124,89,0.07);border:1px solid rgba(74,124,89,0.2);font-size:0.85rem;margin-bottom:6px;color:var(--dark);}
    .schedule-btn{padding:4px 10px;font-size:0.72rem;font-weight:500;border-radius:999px;border:1.5px solid var(--border);color:var(--mid);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;}
    .schedule-btn:hover{border-color:var(--blue);color:var(--blue)}
    .btn-remove-meal{padding:3px 9px;font-size:0.68rem;font-weight:500;border-radius:999px;border:1.5px solid rgba(200,103,74,0.3);color:var(--clay);background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;white-space:nowrap;opacity:0.75;}
    .btn-remove-meal:hover{background:rgba(200,103,74,0.08);opacity:1;border-color:var(--clay)}
    .meal-side{font-size:0.72rem;color:var(--mid);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .meal-side span{font-weight:500;color:var(--dark)}
    .meal-side em{font-style:normal;color:var(--mid)}
    .side-edit-btn{background:none;border:none;cursor:pointer;font-size:0.68rem;color:var(--clay);opacity:0.7;padding:1px 5px;border-radius:4px;font-family:'DM Sans',sans-serif;transition:opacity 0.15s;}
    .side-edit-btn:hover{opacity:1;background:rgba(200,103,74,0.08)}
    .side-dropdown-wrap{position:relative;display:inline-block;}
    .side-dropdown-panel{position:absolute;left:0;top:calc(100% + 4px);background:white;border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.10);z-index:200;min-width:220px;padding:8px;}
    .side-dropdown-panel input{width:100%;padding:6px 10px;font-size:0.78rem;border:1px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;color:var(--dark);outline:none;margin-bottom:6px;}
    .side-dropdown-panel input:focus{border-color:var(--clay)}
    .side-options{max-height:180px;min-height:60px;overflow-y:auto;}
    .side-option{padding:6px 10px;font-size:0.78rem;border-radius:6px;cursor:pointer;color:var(--dark);transition:background 0.12s;}
    .side-option:hover{background:var(--light)}
    .side-option.current{font-weight:500;color:var(--clay)}
    .side-dropdown-footer{border-top:1px solid var(--border);margin-top:6px;padding-top:6px;display:flex;gap:6px;}
    .side-save-btn{flex:1;padding:5px 0;font-size:0.75rem;font-weight:500;background:var(--clay);color:white;border:none;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .side-save-btn:hover{background:var(--clay-dark)}
    .side-cancel-btn{padding:5px 10px;font-size:0.75rem;background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--mid);}
    .scheduled-tag{font-size:0.72rem;font-weight:500;padding:3px 9px;border-radius:999px;background:rgba(46,95,138,0.1);color:var(--blue);}
    .karen-add-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;}

function saveShoppingState(mealItems,ckItems){

    const content=document.getElementById('shopping-list-content');

    const consolidateBtn=document.getElementById('consolidate-btn');

      content.innerHTML=renderShoppingListHTML(shopState.mealItems,shopState.ckItems||[],true,karenAdditions);
      if(btn){btn.textContent='Regenerate list';btn.disabled=false;}
      if(ssBtn)ssBtn.style.display='';
      if(consolidateBtn)consolidateBtn.style.display=(shopState.ckItems&&shopState.ckItems.length>0)?'':'none';
    }
    // Now restore trolley on top if it was active

      trolleyItems=trolleyState.trolleyItems||{};

      for(const[itemId,item]of Object.entries(trolleyItems)){

        if(item.notFound){
          row.classList.add('not-found-row');

          if(btn){btn.textContent='↩ Undo';btn.classList.add('not-found-active');}

          if(chk)chk.checked=true;

      if(adhocItems.length>0)renderAdhocSection();

async function loadInventory(){

  const{data:planMeals,error:pmError}=await sb.from('weekly_plan_meals').select('recipe_id').eq('plan_id',currentPlan.id);
  if(pmError||!planMeals||planMeals.length===0){document.getElementById('inv-list').innerHTML='<div class="empty">No meals in this plan</div>';return;}
  const recipeIds=[...new Set([...planMeals.map(m=>m.recipe_id),...currentDinners.map(m=>m.recipe_id)])];
  const{data,error}=await sb.from('ingredients').select('id,name_en,name_es,lacomer_category').in('recipe_id',recipeIds);
  if(error||!data){document.getElementById('inv-list').innerHTML='<div class="empty">Could not load ingredients</div>';return;}
  const seenByName={};inventoryItems=[];

  inventoryItems.sort((a,b)=>(a.lacomer_category||'').localeCompare(b.lacomer_category||'')||a.name_en.localeCompare(b.name_en));

function renderInventoryList(){

  const groups={};for(const item of inventoryItems){const cat=normaliseCat(item.lacomer_category||'Other');if(!groups[cat])groups[cat]=[];groups[cat].push(item);}
  let html='';
  const sortedCats=Object.keys(groups).sort((a,b)=>{const ai=ALL_CATEGORIES.indexOf(a);const bi=ALL_CATEGORIES.indexOf(b);if(ai===-1&&bi===-1)return a.localeCompare(b);if(ai===-1)return 1;if(bi===-1)return-1;return ai-bi;});
  for(const cat of sortedCats){const items=groups[cat];

}

const TIER_INTERVALS={weekly:2,regular:4,occasional:8,rare:12,hibernated:Infinity};
const TIER_ORDER=['weekly','regular','occasional','rare'];
const TIER_THRESHOLDS=[{min:4.5,tier:'weekly'},{min:3.5,tier:'regular'},{min:2.5,tier:'occasional'},{min:1.5,tier:'rare'},{min:0,tier:'hibernated'}];
function tierFromRating(avg){for(const t of TIER_THRESHOLDS){if(avg>=t.min)return t.tier;}return'hibernated';}
const TIER_LABELS={weekly:'Weekly Favourite',regular:'Regular',occasional:'Occasional',rare:'Rare',hibernated:'Hibernated'};
function getProteinType(name){
  const n=(name||'').toLowerCase();
  if(/chicken|schnitzel|parmigiana|satay|milanesa de pech|lemon chicken|orange chicken/.test(n))return'chicken';
  if(/beef|stroganoff|wellington|lasagne|lasagna|shepherd|arrachera|mince/.test(n))return'beef';
  if(/pork|sausage|snag|carbonara|crackling/.test(n))return'pork';
  if(/fish|tuna|mornay/.test(n))return'fish';
  if(/lamb/.test(n))return'lamb';
  return'other';
}
async function selectMealsForWeek(allRecipes,homeMealsNeeded){
  if(homeMealsNeeded<=0)return[];
  const{data:allPlanMeals}=await sb.from('weekly_plan_meals').select('recipe_id,plan_id').neq('is_dinner',true);
  const{data:allPlans}=await sb.from('weekly_plans').select('id,week_start');
  const planDateMap={};if(allPlans){for(const plan of allPlans)planDateMap[plan.id]=new Date(plan.week_start+'T12:00:00');}
  const lastSeenMap={};if(allPlanMeals){for(const row of allPlanMeals){const planDate=planDateMap[row.plan_id];if(!planDate)continue;if(!lastSeenMap[row.recipe_id]||planDate>lastSeenMap[row.recipe_id])lastSeenMap[row.recipe_id]=planDate;}}
  const now=new Date();
  function weeksAgo(date){return(now-date)/(1000*60*60*24*7);}
  function isEligible(recipe,intervalOverride){if(recipe.frequency_tier==='hibernated')return false;const interval=intervalOverride??TIER_INTERVALS[recipe.frequency_tier]??8;if(interval===Infinity)return false;const lastSeen=lastSeenMap[recipe.id];if(!lastSeen)return true;return weeksAgo(lastSeen)>=interval;}
  let eligible=allRecipes.filter(r=>isEligible(r));
  if(eligible.length<homeMealsNeeded){for(const tier of TIER_ORDER){if(eligible.length>=homeMealsNeeded)break;const alreadyIn=new Set(eligible.map(r=>r.id));const extras=allRecipes.filter(r=>r.frequency_tier===tier&&!alreadyIn.has(r.id)&&isEligible(r,Math.max(1,Math.floor((TIER_INTERVALS[r.frequency_tier]||8)/2))));eligible=[...eligible,...extras];}}
  if(eligible.length<homeMealsNeeded){const alreadyIn=new Set(eligible.map(r=>r.id));eligible=[...eligible,...allRecipes.filter(r=>r.frequency_tier!=='hibernated'&&!alreadyIn.has(r.id))];}
  // Spread by protein type — cap same protein at 2 per week (1 if only 3 meals or fewer)
  const shuffled=eligible.sort(()=>Math.random()-0.5);
  const maxSameProtein=homeMealsNeeded<=3?1:2;
  const picked=[];const proteinCount={};
  for(const r of shuffled){if(picked.length>=homeMealsNeeded)break;const p=getProteinType(r.name_en);if((proteinCount[p]||0)<maxSameProtein){picked.push(r);proteinCount[p]=(proteinCount[p]||0)+1;}}
  // Top up if variety rules left us short
  if(picked.length<homeMealsNeeded){const pickedIds=new Set(picked.map(r=>r.id));for(const r of shuffled){if(picked.length>=homeMealsNeeded)break;if(!pickedIds.has(r.id)){picked.push(r);pickedIds.add(r.id);}}}
  return picked;
}
function showToast(msg,type='success'){const t=document.createElement('div');t.style.cssText=`position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:${type==='error'?'#c44':'#4A7C59'};color:white;padding:11px 22px;border-radius:999px;font-size:0.88rem;font-family:'DM Sans',sans-serif;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,0.18);z-index:9999;animation:fadeIn 0.3s ease;white-space:nowrap;`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3500);}
async function doReshuffle(btn){if(!currentUserCan('reshuffle_plan')){showToast('Permission denied','error');return;}
  if(!currentPlan||currentPlan.reshuffle_used)return;
  btn.disabled=true;btn.textContent='🔀 Reshuffling...';
  try{
    const allRecipes=await loadRecipes();
    const homeMeals=Math.max(0,7-(currentPlan.eating_out_days?.length||0));
    const beforeNames=currentMeals.map(m=>m.recipes?.name_en||'').filter(Boolean);
    const oldMealRows=currentMeals.map(m=>({plan_id:currentPlan.id,recipe_id:m.recipe_id,cooked:m.cooked||false,is_dinner:false}));
    const picked=await selectMealsForWeek(allRecipes,homeMeals);
    const{error:delError}=await sb.from('weekly_plan_meals').delete().eq('plan_id',currentPlan.id);if(delError)throw delError;
    if(picked.length>0){
      const{error:insError}=await sb.from('weekly_plan_meals').insert(picked.map(r=>({plan_id:currentPlan.id,recipe_id:r.id,cooked:false,is_dinner:false})));
      if(insError){
        const{error:rollbackErr}=await sb.from('weekly_plan_meals').insert(oldMealRows);
        if(rollbackErr){showToast('⚠️ Reshuffle failed and rollback also failed — start a new plan to recover','error');btn.disabled=false;btn.textContent='🔀 Reshuffle';return;}
        throw insError;
      }
    }
    const afterNames=picked.map(r=>r.name_en);
    const removed=beforeNames.filter(n=>!afterNames.includes(n));
    const added=afterNames.filter(n=>!beforeNames.includes(n));
    const{error:updError}=await sb.from('weekly_plans').update({reshuffle_used:true,reshuffle_log:{removed,added,at:new Date().toISOString()}}).eq('id',currentPlan.id);if(updError)throw updError;
    // Re-assign dinners to match the new lunches (reshuffle wiped the old ones)
    if(currentPlan.status==='approved'){
      const newLunchMeals=picked.map(r=>({recipe_id:r.id}));
      await assignDinnersForPlan(currentPlan.id,newLunchMeals);
    }
    await loadWeekData();await loadMyRatingsThisWeek();await renderDashboard();
    showToast('Meals reshuffled ✓ — reshuffle used for this week');
  }catch(err){btn.disabled=false;btn.textContent='🔀 Reshuffle';showToast('Reshuffle failed — original meals restored. '+err.message,'error');}
}

async function doCreateNewPlan(homeMeals,carryOverIds,carryOverDinners=[],isTest=false){
  const allRecipes=await loadRecipes();const picked=await selectMealsForWeek(allRecipes,homeMeals);
  try{
    await sb.from('weekly_plans').update({status:'archived'}).not('status','eq','archived');
    const{data:newPlan,error:planError}=await sb.from('weekly_plans').insert({week_start:getTodayDate(),eating_out_days:selectedEatingOutDays,status:'suggested',reshuffle_used:false,is_test:isTest}).select().single();if(planError)throw planError;
    currentPlan=newPlan;
    // Insert newly suggested meals
    if(picked.length>0){const{error:mealsError}=await sb.from('weekly_plan_meals').insert(picked.map(r=>({plan_id:currentPlan.id,recipe_id:r.id,cooked:false,is_dinner:false})));if(mealsError)throw mealsError;}
    // Insert carried-over lunches (skip any already in picked)
    const pickedIds=new Set(picked.map(r=>r.id));
    const toCarry=carryOverIds.filter(id=>!pickedIds.has(id));
    if(toCarry.length>0){const{error:carryErr}=await sb.from('weekly_plan_meals').insert(toCarry.map(id=>({plan_id:currentPlan.id,recipe_id:id,cooked:false,is_dinner:false})));if(carryErr)throw carryErr;}
    // Insert carried-over dinners
    if(carryOverDinners.length>0){const{error:dinnerCarryErr}=await sb.from('weekly_plan_meals').insert(carryOverDinners.map(d=>({plan_id:currentPlan.id,recipe_id:d.recipe_id,lunch_recipe_id:d.lunch_recipe_id||null,cooked:false,is_dinner:true})));if(dinnerCarryErr)throw dinnerCarryErr;}
    closeModal();await loadWeekData();myRatingsThisWeek={};await loadMyRatingsThisWeek();await renderDashboard();
    const total=(toCarry.length)+(carryOverDinners.length);
    if(total>0)showToast(`${total} meal${total!==1?'s':''} carried over ✓`);
  }catch(err){showToast('Something went wrong. Please try again.','error');}
}

async function recalculateRecipeRating(recipeId){
  const{data:allRatings}=await sb.from('ratings').select('rating,rating_type,cook_number').eq('recipe_id',recipeId);if(!allRatings||allRatings.length===0)return;
  const ideaRatings=allRatings.filter(r=>r.rating_type==='idea');const cookRatings=allRatings.filter(r=>r.rating_type==='cook');
  const maxCookNum=cookRatings.length>0?Math.max(...cookRatings.map(r=>r.cook_number||1)):0;
  let newAvg;
  if(cookRatings.length===0){newAvg=ideaRatings.reduce((s,r)=>s+r.rating,0)/ideaRatings.length;}
  else{const cookAvg=cookRatings.reduce((s,r)=>s+r.rating,0)/cookRatings.length;if(maxCookNum===1){const ideaAvg=ideaRatings.reduce((s,r)=>s+r.rating,0)/(ideaRatings.length||1);newAvg=(cookAvg*0.6)+(ideaAvg*0.4);}else{newAvg=cookAvg;}}
  newAvg=Math.round(newAvg*100)/100;const newTier=tierFromRating(newAvg);
  const{data:recipe}=await sb.from('recipes').select('frequency_tier,frequency_override,name_en').eq('id',recipeId).single();
  const oldTier=recipe?.frequency_tier;const tierChanged=newTier!==oldTier&&!recipe?.frequency_override;
  const updateData={avg_rating:newAvg};if(tierChanged)updateData.frequency_tier=newTier;
  await sb.from('recipes').update(updateData).eq('id',recipeId);
  if(tierChanged&&(userProfile.role==='admin'||userProfile.role==='planner')){const direction=TIER_THRESHOLDS.findIndex(t=>t.tier===newTier)<TIER_THRESHOLDS.findIndex(t=>t.tier===oldTier)?'⬆️':'⬇️';showToast(`${direction} ${recipe.name_en} moved to ${TIER_LABELS[newTier]} (avg ${newAvg.toFixed(1)})`,newTier==='weekly'||newTier==='regular'?'success':'error');await sendEmail('tier_changed',{recipeName:recipe.name_en});}
}

async function handleRequest(requestId,type,decision){

  }
 if(type==='swap'&&decision==='approved'){

      if(recipe_id&&replace_recipe_id){
        const planMeal=currentMeals.find(m=>m.recipe_id===recipe_id);

        await sb.from('weekly_plan_meals').insert({plan_id:currentPlan.id,recipe_id:replace_recipe_id,cooked:false,is_dinner:false});
        document.getElementById(`req-${requestId}`)?.remove();

        if(countEl&&container){const remaining=container.querySelectorAll('.request-item').length;countEl.textContent=remaining;if(remaining===0)container.innerHTML=`<div class="empty"><span class="empty-icon">📋</span>No pending requests from Sienna or Karen</div>`;}
        await loadWeekData();await renderDashboard();

// Fetches ALL household_products rows per ingredient; attaches preferred + alternatives.
async function applyProductLinks(ingredients){
  if(!ingredients||ingredients.length===0)return ingredients;
  const ingIds=ingredients.map(i=>i.id).filter(Boolean);
  if(ingIds.length===0)return ingredients;
  try{
    const{data:products}=await sb.from('household_products')
      .select('ingredient_id,store_url,name_es,name_en,is_preferred_lacomer')
      .in('ingredient_id',ingIds)
      .not('store_url','is',null);
    if(!products||products.length===0)return ingredients;
    const map={};
    for(const p of products){if(!p.ingredient_id)continue;if(!map[p.ingredient_id])map[p.ingredient_id]=[];map[p.ingredient_id].push(p);}
    return ingredients.map(ing=>{
      const prods=map[ing.id];
      if(!prods||prods.length===0)return ing;
      const preferred=prods.find(p=>p.is_preferred_lacomer)||prods[0];
      return{...ing,lacomer_url:preferred.store_url||ing.lacomer_url,name_es:preferred.name_es||ing.name_es,_products:prods,_preferredProduct:preferred};
    });
  }catch(e){console.warn('household_products lookup failed:',e.message);return ingredients;}
}

async function buildPreShopEstimate(mealItems){
  // Returns HTML string for the pre-shop estimate banner with category breakdown
  // Fallback price table — mid price, low multiplier 0.75, high multiplier 1.35
  const FALLBACK_PRICES={
    // Produce
    'tomato':22,'jitomate':22,'onion':18,'cebolla':18,'garlic':12,'ajo':12,'potato':25,'papa':25,
    'carrot':15,'zanahoria':15,'pumpkin':35,'calabaza':35,'avocado':28,'aguacate':28,
    'lemon':18,'limon':18,'orange':20,'naranja':20,'apple':30,'manzana':30,'ginger':20,'jengibre':20,
    'mushroom':45,'champiñon':45,'sweet potato':30,'camote':30,'capsicum':35,'pimiento':35,
    'pineapple':40,'piña':40,'lettuce':22,'lechuga':22,'corn':18,'elote':18,'peas':28,'chicharo':28,
    // Meats
    'chicken':85,'pollo':85,'beef':120,'res':120,'pork':95,'cerdo':95,'mince':90,'molida':90,
    'sausage':75,'salchicha':75,'ham':65,'jamon':65,'bacon':75,'tuna':32,'atun':32,'lamb':130,'cordero':130,
    // Dairy
    'cheese':80,'queso':80,'milk':28,'leche':28,'cream':45,'crema':45,'butter':55,'mantequilla':55,
    'egg':38,'huevo':38,'yogurt':40,
    // Grains & Pasta
    'pasta':32,'rice':28,'arroz':28,'flour':22,'harina':22,'bread':38,'pan':38,'tortilla':30,
    'gnocchi':55,'ñoqui':55,'lasagna':45,'breadcrumb':25,
    // Canned & Packaged
    'stock':35,'caldo':35,'tomato paste':22,'pasta de tomate':22,'coconut milk':45,'leche de coco':45,
    'soy sauce':35,'salsa de soya':35,'oyster sauce':42,'cornflour':20,'maizena':20,
    'peanut butter':85,'vinegar':28,'vinagre':28,'sugar':18,'azucar':18,
    // Pantry
    'olive oil':90,'aceite':45,'oil':40,'mustard':38,'mostaza':38,'ketchup':30,
    'worcestershire':42,'paprika':28,'cumin':22,'comino':22,'curry':30,'thyme':22,'tomillo':22,
    'parsley':15,'perejil':15,'dill':20,'wine':95,'vino':95,
    // Other defaults by category
    'produce':25,'meats':95,'dairy':45,'grains':35,'canned':38,'condiments':35,'frozen':55,'bakery':40,'other':40
  };
  function fallbackPrice(ing){
    const name=(ing.name_en||ing.name_es||'').toLowerCase();
    const normCat=normaliseCat(ing.lacomer_category||'').toLowerCase();
    for(const[key,price] of Object.entries(FALLBACK_PRICES)){
      if(name.includes(key))return price;
    }
    // Category fallback using normalised category
    if(normCat.includes('fruit')||normCat.includes('vegetable'))return FALLBACK_PRICES['produce'];
    if(normCat.includes('meat')||normCat.includes('seafood')||normCat.includes('egg'))return FALLBACK_PRICES['meats'];
    if(normCat.includes('dairy'))return FALLBACK_PRICES['dairy'];
    if(normCat.includes('pasta')||normCat.includes('grain')||normCat.includes('bakery')||normCat.includes('baking'))return FALLBACK_PRICES['grains'];
    if(normCat.includes('canned')||normCat.includes('packaged'))return FALLBACK_PRICES['canned'];
    if(normCat.includes('herb')||normCat.includes('spice')||normCat.includes('condiment'))return FALLBACK_PRICES['condiments'];
    if(normCat.includes('frozen'))return FALLBACK_PRICES['frozen'];
    if(normCat.includes('soft drink')||normCat.includes('water')||normCat.includes('wine')||normCat.includes('coffee')||normCat.includes('tea'))return FALLBACK_PRICES['beverages'];
    return FALLBACK_PRICES['other'];
  }
  try{
    const ingIds=mealItems.map(i=>i.id).filter(Boolean);
    if(ingIds.length===0)return'';
    // Fetch recorded prices
    const{data:prods}=await sb.from('household_products')
      .select('ingredient_id,last_price_mxn,category')
      .in('ingredient_id',ingIds)
      .not('last_price_mxn','is',null);
    const priceMap={};const catMap={};
    for(const p of (prods||[])){
      const id=p.ingredient_id;
      if(!priceMap[id]){priceMap[id]=parseFloat(p.last_price_mxn||0);catMap[id]=p.category||null;}
    }
    // Build totals — use real price if available, fallback otherwise
    const catTotalsMid={};
    let totalMid=0,totalLow=0,totalHigh=0;
    let realCount=0,fallbackCount=0;
    for(const ing of mealItems){
      const realPrice=priceMap[ing.id];
      const cat=normaliseCat(catMap[ing.id]||ing.lacomer_category||'Other');
      let mid,low,high;
      if(realPrice>0){
        mid=realPrice;low=realPrice*0.9;high=realPrice*1.15;// recorded price — tight range
        realCount++;
      }else{
        mid=fallbackPrice(ing);low=mid*0.75;high=mid*1.35;// fallback — wider range
        fallbackCount++;
      }
      catTotalsMid[cat]=(catTotalsMid[cat]||0)+mid;
      totalMid+=mid;totalLow+=low;totalHigh+=high;
    }
    const bkId='pre-estimate-bk-'+Date.now();
    let breakdownRows=Object.entries(catTotalsMid).sort((a,b)=>a[0].localeCompare(b[0])).map(([cat,tot])=>`<div class="pre-estimate-row"><span>${cat}</span><span>$${Math.round(tot)}</span></div>`).join('');
    breakdownRows+=`<div class="pre-estimate-row total-row"><span>Estimated total</span><span>$${Math.round(totalMid)} MXN</span></div>`;
    const fallbackNote=fallbackCount>0?`<div class="pre-estimate-unpriced">⚠ ${fallbackCount} item${fallbackCount>1?'s':''} using estimated prices — shop actual prices may differ</div>`:'';
    return`<div class="pre-estimate-banner" id="pre-estimate-banner">
      <div style="text-align:right;font-size:0.72rem;color:#b0a898;margin-bottom:2px">could be as low as ~$${Math.round(totalLow)} MXN</div>
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;flex-wrap:wrap;gap:6px">
        <div><div class="pre-estimate-label">Pre-shop estimate · ${realCount} real + ${fallbackCount} estimated</div>
          <button class="pre-estimate-toggle" onclick="const bk=document.getElementById('${bkId}');bk.style.display=bk.style.display==='none'?'':'none';this.textContent=bk.style.display==='none'?'▼ Show breakdown':'▲ Hide breakdown'">▲ Hide breakdown</button>
        </div>
        <div class="pre-estimate-amt">~$${Math.round(totalMid)} MXN</div>
      </div>
      <div class="pre-estimate-breakdown" id="${bkId}">
        ${breakdownRows}
        ${fallbackNote}
        <div style="font-size:0.72rem;color:var(--mid);margin-top:4px">${realCount>0?'Real prices from last shop · ':''}Estimates based on typical La Comer prices</div>
      </div>
      <div style="text-align:right;font-size:0.72rem;color:#b0a898;margin-top:4px">could be as high as ~$${Math.round(totalHigh)} MXN</div>
    </div>`;
  }catch(e){console.warn('Pre-shop estimate failed:',e);return '';}
}

  if(ssBtn)ssBtn.style.display='';

  document.getElementById('budget-input-wrap')?.remove();
  document.getElementById('in-trolley-section')?.remove();

function showReceiptModal(items,totalMXN,savedCount,showPrepGuide=false){window._showPrepGuideAfterReceipt=showPrepGuide;

  const dateStr=now.toLocaleDateString('en-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const foundItems={},notFoundItems={};
  for(const[id,item]of Object.entries(items)){
    if(item.notFound)notFoundItems[id]=item;else foundItems[id]=item;
  }
  // group found by category
  const cats={};
  for(const[,item]of Object.entries(foundItems)){
    const c=item.cat||'Other';if(!cats[c])cats[c]=[];cats[c].push(item);
  }
  let catHtml='';
  for(const[cat,catItems]of Object.entries(cats).sort(([a],[b])=>a.localeCompare(b))){
    const catTotal=catItems.reduce((s,i)=>s+(i.price||0),0);
    catHtml+=`<div class="receipt-cat">${cat}</div>`;

      catHtml+=`<div class="receipt-row"><span class="receipt-item-name">${item.name}</span><span class="receipt-item-price">${item.price>0?'$'+item.price.toFixed(2):'—'}</span></div>`;

  if(notFoundList.length>0){
    notFoundHtml=`<div class="receipt-cat" style="color:var(--clay);margin-top:14px">⚠ Not found at store</div>`;
    for(const item of notFoundList){
      notFoundHtml+=`<div class="receipt-row"><span class="receipt-item-name" style="color:var(--clay)">${item.name}</span><span class="receipt-item-price" style="color:var(--clay)">—</span></div>`;
    }
  }
  const usdLine=usdRate&&totalMXN>0?`<div class="receipt-grand-usd">≈ USD $${(totalMXN*usdRate).toFixed(2)}</div>`:'';
  const savedNote=savedCount>0?`<div class="receipt-saved-note">✓ ${savedCount} price${savedCount!==1?'s':''} saved to product list</div>`:'';
  const el=document.createElement('div');el.id='modal-overlay';el.className='modal-overlay';
  el.innerHTML=`<div class="receipt-modal">
    <div class="receipt-title">🛒 Shopping Receipt</div>
    <div class="receipt-date">${dateStr}</div>
    ${catHtml}
    ${notFoundHtml}
    <div class="receipt-grand">
      <span class="receipt-grand-label">Total</span>
      <div style="text-align:right"><div class="receipt-grand-mxn">$${totalMXN.toFixed(2)} MXN</div>${usdLine}</div>
    </div>
    ${savedNote}
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-secondary" onclick="closeModal();setTimeout(openReceiptScanner,150)">📄 Scan receipt</button>
      <button class="btn-primary" onclick="closeModal();if(window._showPrepGuideAfterReceipt){window._showPrepGuideAfterReceipt=false;setTimeout(openPrepGuide,300);}">Done</button>
    </div>
  </div>`;
  document.body.appendChild(el);
}

function markNotFound(itemId,itemName,row,btn){

    btn.textContent='✗ Not found';btn.classList.remove('not-found-active');

    if(trolleyItems[itemId]){uncheckTrolleyItem(itemId);}
    const chk=row.querySelector('.trolley-check');if(chk)chk.checked=false;
    let cat='Other';let el=row.previousElementSibling;
    while(el){if(el.classList.contains('shop-category-label')){cat=el.textContent.trim();break;}el=el.previousElementSibling;}
    trolleyItems[itemId]={name:itemName,price:0,cat,notFound:true};

async function checkCheaperAlternative(ingId,itemName,newTotal){
  if(!trolleyBudget||newTotal<trolleyBudget*0.9)return;
  // Only check if we just crossed 90%
  try{
    const{data:alts}=await sb.from('household_products')
      .select('id,name_en,name_es,last_price_mxn,store_url')
      .eq('ingredient_id',ingId)
      .not('last_price_mxn','is',null)
      .order('last_price_mxn',{ascending:true})
      .limit(3);
    if(!alts||alts.length<2)return;
    const current=alts.find(a=>a.is_preferred_lacomer)||alts[alts.length-1];
    const cheaper=alts.find(a=>a.id!==current?.id&&a.last_price_mxn<(current?.last_price_mxn||Infinity));
    if(!cheaper)return;
    const saving=(current?.last_price_mxn||0)-cheaper.last_price_mxn;
    if(saving<2)return; // Not worth showing for <$2 saving
    // Show nudge below the item row
    const row=document.getElementById(`shop-row-${ingId}`)||document.getElementById(`introlley-row-${ingId}`);
    if(!row||row.querySelector('.cheaper-alt-nudge'))return;
    const nudge=document.createElement('div');nudge.className='cheaper-alt-nudge';
    const link=cheaper.store_url?`<a href="${cheaper.store_url}" target="_blank" style="color:#e65100;font-weight:500">${cheaper.name_en||cheaper.name_es}</a>`:`<strong>${cheaper.name_en||cheaper.name_es}</strong>`;
    nudge.innerHTML=`<span class="alt-icon">💡</span><span>Budget at ${Math.round((newTotal/trolleyBudget)*100)}% — ${link} is ~$${cheaper.last_price_mxn.toFixed(0)} (save $${saving.toFixed(0)} MXN)</span>`;
    row.after(nudge);
  }catch(e){console.warn('Cheaper alt check failed:',e);}
}
function updateCatSubtotals(){

let adhocItems=[];
function reRenderShoppingListOrder(){
  // Re-sort category blocks in the shopping list DOM according to active preset
  const content=document.getElementById('shopping-list-content');if(!content)return;
  const presetOrder=activePreset?activePreset.category_order:ALL_CATEGORIES;
  const catLabels=[...content.querySelectorAll('.shop-category-label')];
  if(catLabels.length===0)return;
  // Build map of cat name → block (label + following rows until next label)
  const blocks=[];
  catLabels.forEach((lbl,i)=>{
    const name=lbl.textContent.replace(/[$0-9.,\s]+$/,'').trim();
    const nodes=[lbl];
    let sib=lbl.nextSibling;
    while(sib&&(!sib.classList||!sib.classList.contains('shop-category-label'))&&
          (!sib.id||sib.id!=='trolley-preset-bar')&&(!sib.id||sib.id!=='trolley-col-header')&&
          (!sib.id||sib.id!=='in-trolley-section')){
      nodes.push(sib);sib=sib.nextSibling;
    }
    blocks.push({name,nodes});
  });
  const inTrolleySection=document.getElementById('in-trolley-section');
  const ordered=[...presetOrder.filter(n=>blocks.find(b=>b.name===n)),...blocks.filter(b=>!presetOrder.includes(b.name)).map(b=>b.name)];
  ordered.forEach(catName=>{
    const block=blocks.find(b=>b.name===catName);if(!block)return;
    block.nodes.forEach(n=>{
      if(inTrolleySection){content.insertBefore(n,inTrolleySection);}
      else{content.appendChild(n);}
    });

let _dragSrcEl=null;
function presetDragStart(e){_dragSrcEl=e.currentTarget;e.dataTransfer.effectAllowed='move';}
function presetDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';return false;}
function presetDrop(e,presetId){
  e.stopPropagation();e.preventDefault();
  if(_dragSrcEl===e.currentTarget)return;
  const list=document.getElementById('preset-order-list');
  const rows=[...list.querySelectorAll('.preset-order-row')];
  const srcIdx=rows.indexOf(_dragSrcEl);
  const tgtIdx=rows.indexOf(e.currentTarget);
  if(srcIdx<0||tgtIdx<0)return;
  if(srcIdx<tgtIdx){list.insertBefore(_dragSrcEl,e.currentTarget.nextSibling);}
  else{list.insertBefore(_dragSrcEl,e.currentTarget);}
  return false;
}

async function openPrepGuide(){
  if(!currentPlan)return;
  // Load meals for this week with their prep_tasks
  const{data:planMeals,error}=await sb.from('weekly_plan_meals')
    .select('recipes!weekly_plan_meals_recipe_id_fkey(id,name_en,prep_tasks)')
    .eq('plan_id',currentPlan.id)
    .neq('is_dinner',true);
  if(error||!planMeals)return;
  // Filter to meals that have prep tasks
  const mealsWithTasks=planMeals
    .map(m=>m.recipes)
    .filter(r=>r&&r.prep_tasks&&r.prep_tasks.length>0);
  if(mealsWithTasks.length===0)return;
  // Load saved tick state from localStorage
  const PREP_GUIDE_KEY=`prep_guide_${currentPlan.id}`;
  let tickState={};
  try{const saved=localStorage.getItem(PREP_GUIDE_KEY);if(saved)tickState=JSON.parse(saved);}catch(e){}
  function saveTicks(){try{localStorage.setItem(PREP_GUIDE_KEY,JSON.stringify(tickState));}catch(e){}}
  // Remove existing modal
  document.getElementById('prep-guide-modal')?.remove();
  const modal=document.createElement('div');
  modal.id='prep-guide-modal';
  modal.className='modal-overlay';
  // Build tasks list HTML
  function buildTasksHTML(){
    // Build flat lists — incomplete grouped by meal at top, all done at global bottom
    const incompleteByMeal=[];
    const doneList=[];
    for(const recipe of mealsWithTasks){
      const tasks=recipe.prep_tasks||[];
      const inc=tasks.filter(t=>!tickState[`${recipe.id}__${t}`]);
      if(inc.length>0)incompleteByMeal.push({recipe,tasks:inc});
      tasks.filter(t=>!!tickState[`${recipe.id}__${t}`]).forEach(t=>doneList.push({recipe,task:t}));
    }
    let html='';
    // Incomplete — grouped by meal
    for(const{recipe,tasks}of incompleteByMeal){
      html+=`<div class="prep-meal-group"><div style="font-size:0.78rem;font-weight:500;color:var(--mid);text-transform:uppercase;letter-spacing:0.05em;margin:16px 0 8px">${recipe.name_en}</div>`;
      for(const task of tasks){
        const isOptional=task.toLowerCase().startsWith('optional');
        html+=`<div class="prep-task-row" onclick="togglePrepTask('${recipe.id}','${task.replace(/'/g,"\'")}')">
          <div class="prep-task-check"></div>
          <div class="prep-task-text${isOptional?' prep-task-optional':''}">${task}</div>
        </div>`;
      }
      html+='</div>';
    }
    // Done — flat section at global bottom
    if(doneList.length>0){
      html+=`<div style="font-size:0.78rem;font-weight:500;color:var(--mid);text-transform:uppercase;letter-spacing:0.05em;margin:20px 0 8px;border-top:1px solid var(--border);padding-top:14px">✓ Done</div>`;
      for(const{recipe,task}of doneList){
        const isOptional=task.toLowerCase().startsWith('optional');
        html+=`<div class="prep-task-row prep-task-done" onclick="togglePrepTask('${recipe.id}','${task.replace(/'/g,"\'")}')">
          <div class="prep-task-check"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7L5.5 10L11.5 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="prep-task-text${isOptional?' prep-task-optional':''}">${task} <span style="font-size:0.75rem;color:var(--mid)">· ${recipe.name_en}</span></div>
        </div>`;
      }
    }
    return html;
  }
  const totalTasks=mealsWithTasks.reduce((s,r)=>s+(r.prep_tasks?.length||0),0);
  function getDoneCount(){return Object.values(tickState).filter(Boolean).length;}
  modal.innerHTML=`
    <div class="modal" style="max-width:500px;max-height:88vh;overflow-y:auto;">
      <style>
        .prep-task-row{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background 0.15s;margin-bottom:4px;border:1px solid var(--border);}
        .prep-task-row:hover{background:var(--bg);}
        .prep-task-done{opacity:0.45;}
        .prep-task-check{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all 0.15s;margin-top:1px;}
        .prep-task-done .prep-task-check{background:var(--clay);border-color:var(--clay);}
        .prep-task-text{font-size:0.88rem;line-height:1.45;color:var(--dark);}
        .prep-task-done .prep-task-text{text-decoration:line-through;color:var(--mid);}
        .prep-task-optional{color:var(--mid);font-style:italic;}
        .prep-progress-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin:12px 0 4px;}
        .prep-progress-fill{height:100%;background:var(--clay);border-radius:3px;transition:width 0.3s;}
      </style>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div class="card-title">🧑‍🍳 This week's prep</div>
        <button onclick="document.getElementById('prep-guide-modal').remove()" style="background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--mid)">✕</button>
      </div>
      <div style="font-size:0.8rem;color:var(--mid);margin-bottom:8px">Tick off as you go — saves your progress</div>
      <div class="prep-progress-bar"><div class="prep-progress-fill" id="prep-progress-fill" style="width:${Math.round(getDoneCount()/totalTasks*100)}%"></div></div>
      <div style="font-size:0.75rem;color:var(--mid);text-align:right;margin-bottom:8px" id="prep-progress-label">${getDoneCount()} of ${totalTasks} done</div>
      <div id="prep-tasks-list">${buildTasksHTML()}</div>
      <div style="margin-top:16px;text-align:center">
        <button onclick="document.getElementById('prep-guide-modal').remove()" class="btn-primary" style="padding:10px 32px">Done for now</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  // Make togglePrepTask global for onclick handlers
  window.togglePrepTask=function(recipeId,task){
    const key=`${recipeId}__${task}`;
    tickState[key]=!tickState[key];
    saveTicks();
    // Re-render task list
    document.getElementById('prep-tasks-list').innerHTML=buildTasksHTML();
    // Update progress
    const pct=Math.round(getDoneCount()/totalTasks*100);
    const fill=document.getElementById('prep-progress-fill');
    const lbl=document.getElementById('prep-progress-label');
    if(fill)fill.style.width=pct+'%';
    if(lbl)lbl.textContent=`${getDoneCount()} of ${totalTasks} done`;
  };
}

async function saveAdhocToProducts(items,thenFinish){
  closeModal();
  let saved=0;
  for(const item of items){
    // Fire AI in background to get Spanish name + category
    autoFillAdhocProduct(item);
    // Save minimal record immediately
    try{
      const{error}=await sb.from('household_products').insert({name_en:item.name,name_es:item.name,store:'La Comer',last_price_mxn:item.price>0?item.price:null,added_by:userProfile?.id||null,created_at:new Date().toISOString(),notes:'Added in-store — needs review'});
      if(!error){saved++;const ai=adhocItems.find(i=>i.id===item.id);if(ai)ai.savedToProducts=true;}
    }catch(e){console.warn('Adhoc save failed:',item.name,e);}
  }
  if(saved>0)showToast(`${saved} item${saved!==1?'s':''} saved to products ✓`);
  if(thenFinish&&window._adhocResolve)window._adhocResolve(true);
}
async function autoFillAdhocProduct(item){
  // Fire AI call to guess Spanish name and category — updates product in background
  try{
    const proxyUrl='https://claude-proxy.cameronjohnking.workers.dev';
    const secret=typeof PROXY_SECRET!=='undefined'?PROXY_SECRET:'';
    const resp=await fetch(proxyUrl,{method:'POST',headers:{'Content-Type':'application/json','x-proxy-secret':secret},body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:200,messages:[{role:'user',content:`For this grocery item sold at La Comer in Mexico: "${item.name}"
Respond with ONLY a JSON object (no markdown) with these fields:
- name_es: Spanish name as it would appear at La Comer
- category: one of: Dairy, Meats & Eggs, Produce, Grains/Pasta/Bakery, Canned & Packaged, Herbs/Condiments, Beverages, Cleaning, Personal Care, Other
- is_pantry_item: true or false`}]})});
    const data=await resp.json();
    const text=data.content?.find(b=>b.type==='text')?.text||'';
    const clean=text.replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(clean);
    // Update the product we just saved
    const{data:prod}=await sb.from('household_products').select('id').eq('name_en',item.name).eq('added_by',userProfile?.id).order('created_at',{ascending:false}).limit(1).maybeSingle();
    if(prod){await sb.from('household_products').update({name_es:parsed.name_es||item.name,category:parsed.category||'Other',is_pantry_item:parsed.is_pantry_item||false,notes:null}).eq('id',prod.id);}
  }catch(e){console.warn('AI autofill failed for',item.name,e);}
}

function calcInput(val){
  const s=calcState;
  if(val==='C'){s.display='0';s.prev=null;s.op=null;s.fresh=true;}
  else if(val==='+/-'){s.display=String(parseFloat(s.display)*-1);}
  else if(val==='%'){s.display=String(parseFloat(s.display)/100);}
  else if(['+','-','*','/'].includes(val)){
    s.prev=parseFloat(s.display);s.op=val;s.fresh=true;
  }
  else if(val==='='){
    if(s.op&&s.prev!==null){
      const cur=parseFloat(s.display);
      let result;
      if(s.op==='+')result=s.prev+cur;
      else if(s.op==='-')result=s.prev-cur;
      else if(s.op==='*')result=s.prev*cur;
      else if(s.op==='/')result=cur!==0?s.prev/cur:0;
      s.display=String(parseFloat(result.toFixed(10)));
      s.prev=null;s.op=null;s.fresh=true;
    }
  }
  else if(val==='.'){
    if(s.fresh){s.display='0.';s.fresh=false;}
    else if(!s.display.includes('.'))s.display+='.';
  }
  else{
    if(s.fresh||s.display==='0'){s.display=val;s.fresh=false;}
    else{if(s.display.replace('-','').length<12)s.display+=val;}
  }
  const main=document.getElementById('calc-main');
  const sub=document.getElementById('calc-sub');
  if(main)main.textContent=s.display;
  if(sub)sub.textContent=s.op&&s.prev!==null?`${s.prev} ${s.op==='*'?'×':s.op==='/'?'÷':s.op} `:'';
}

function safeCloseRecipeDetail(recipeId){

// ── Scratch / Ready-Made toggle helpers ─────────────────────────────────────
// Priority: weekly plan override → recipe default → 'scratch'
function getSRState(ingId, recipeDefaults){
  const planOverrides = currentPlan?.scratch_ready_overrides || {};
  if(planOverrides[ingId]) return planOverrides[ingId];
  if(recipeDefaults && recipeDefaults[ingId]) return recipeDefaults[ingId];
  return 'scratch';
}

function resolveIngredient(ing, recipeDefaults){
  const state = getSRState(String(ing.id), recipeDefaults);
  if(state === 'ready' && ing.has_ready_alt){
    return {
      ...ing,
      _srState: 'ready',
      _displayName_en: ing.ready_name_en || ing.name_en,
      _displayName_es: ing.ready_name_es || ing.name_es,
      _displayQty: ing.ready_quantity != null ? ing.ready_quantity : ing.quantity,
      _displayUnit: ing.ready_unit || ing.unit,
      _displayUrl: ing.ready_lacomer_url || ing.lacomer_url,
      _displayCategory: ing.ready_lacomer_category || ing.lacomer_category,
      _prepDelta: ing.ready_prep_delta_minutes || 0,
    };
  }
  return {
    ...ing,
    _srState: 'scratch',
    _displayName_en: ing.name_en,
    _displayName_es: ing.name_es,
    _displayQty: ing.quantity,
    _displayUnit: ing.unit,
    _displayUrl: ing.lacomer_url,
    _displayCategory: ing.lacomer_category,
    _prepDelta: 0,
  };
}

async function toggleSRState(ingId, recipeId){
  if(!currentUserCan('can_toggle_scratch_ready')){showToast('You don\'t have permission to toggle this','error');return;}
  if(!currentPlan){showToast('No active plan','error');return;}
  const recipe = allRecipesCache?.find(r=>r.id===recipeId);
  const recipeDefaults = recipe?.scratch_ready_defaults || {};
  const current = getSRState(String(ingId), recipeDefaults);
  const next = current === 'ready' ? 'scratch' : 'ready';
  const overrides = {...(currentPlan.scratch_ready_overrides||{}), [String(ingId)]: next};
  const{error} = await sb.from('weekly_plans').update({scratch_ready_overrides: overrides}).eq('id', currentPlan.id);
  if(error){showToast('Error saving toggle: '+error.message,'error');return;}
  currentPlan.scratch_ready_overrides = overrides;
  // Re-render the ingredient row in the open modal
  const pill = document.getElementById(`sr-pill-${ingId}`);
  const timeSave = document.getElementById(`sr-time-${ingId}`);
  const nameEl = document.getElementById(`sr-name-${ingId}`);
  const linkEl = document.getElementById(`sr-link-${ingId}`);
  const ing = recipe?.ingredients?.find(i=>i.id===ingId);
  if(ing){
    const resolved = resolveIngredient(ing, recipeDefaults);
    // Update pill
    if(pill){
      pill.className = `sr-pill ${next}`;
      pill.textContent = next === 'ready' ? '⚡ Ready-made' : '👨‍🍳 Made from scratch';
    }
    // Update time save badge
    if(timeSave){
      const delta = next === 'ready' ? (ing.ready_prep_delta_minutes||0) : 0;
      timeSave.textContent = delta < 0 ? `saves ${Math.abs(delta)} min` : '';
    }
    // Update name
    if(nameEl) nameEl.textContent = resolved._displayName_en;
    // Update link
    if(linkEl){
      if(resolved._displayUrl){ linkEl.href=resolved._displayUrl; linkEl.style.display=''; }
      else { linkEl.style.display='none'; }
    }
  }
  // Refresh modal time display
  const timeEl = document.getElementById(`sr-modal-time-${recipeId}`);
  if(timeEl && recipe){
    const newDelta=(recipe.ingredients||[]).reduce((sum,i)=>{const s=getSRState(String(i.id),recipeDefaults);return sum+(s==='ready'&&i.has_ready_alt?(i.ready_prep_delta_minutes||0):0);},0);
    const base=(recipe.prep_time_minutes||0)+(recipe.cook_time_minutes||0);
    const eff=Math.max(0,base+newDelta);
    timeEl.innerHTML=eff>0?`⏱ ${eff} min${newDelta<0?` <span style="color:var(--green);font-weight:500">(saves ${Math.abs(newDelta)} min)</span>`:''}`:'';}
  showToast(next==='ready'?'Switched to ready-made ⚡':'Switched to scratch 👨‍🍳');
}

// ── STEP TIMER ENGINE ──────────────────────────────────────────────────────
const activeTimers={};
function parseTimerTag(stepText){
  // Returns {cleanText, minutes, label} or {cleanText:stepText, minutes:null, label:null}
  const match=stepText.match(/\[TIMER:(\d+)min:([^\]]+)\]/i);
  if(!match)return{cleanText:stepText,minutes:null,label:null};
  return{cleanText:stepText.replace(match[0],'').trim(),minutes:parseInt(match[1]),label:match[2].trim()};
}
function buildStepHtml(num,rawStepText,recipeId,stepIdx){
  const{cleanText,minutes,label}=parseTimerTag(rawStepText);
  const timerId=`${recipeId}-step-${stepIdx}`;
  const timerRow=minutes!=null?`<div class="step-timer-row"><span class="step-timer-label">⏱</span><input class="step-timer-input" id="timer-input-${timerId}" type="number" min="1" max="999" value="${minutes}"><span class="step-timer-label">min</span><button class="step-timer-btn" id="timer-btn-${timerId}" onclick="startStepTimer('${timerId}','${label.replace(/'/g,"\\'")}',${stepIdx},'${recipeId}')">▶ Start timer</button></div>`:'';
  return`<div class="recipe-step"><div class="recipe-step-num">${num}</div><div style="flex:1"><div class="recipe-step-text">${cleanText}</div>${timerRow}</div></div>`;
}
function startStepTimer(timerId,label,stepIdx,recipeId){
  if(activeTimers[timerId]){clearInterval(activeTimers[timerId].interval);delete activeTimers[timerId];}
  const input=document.getElementById(`timer-input-${timerId}`);
  const minutes=parseInt(input?.value)||1;
  const totalSecs=minutes*60;
  const endTime=Date.now()+totalSecs*1000;
  const btn=document.getElementById(`timer-btn-${timerId}`);
  if(btn){btn.disabled=true;btn.textContent='⏳ Running…';}
  activeTimers[timerId]={label,endTime,totalSecs,interval:null,recipeId};
  activeTimers[timerId].interval=setInterval(()=>tickTimer(timerId),500);
  renderActiveTimersBar(recipeId);
}
function tickTimer(timerId){
  const t=activeTimers[timerId];if(!t)return;
  const remaining=Math.max(0,Math.round((t.endTime-Date.now())/1000));
  // Update countdown in bar
  const countEl=document.getElementById(`timer-count-${timerId}`);
  if(countEl){
    const m=Math.floor(remaining/60),s=remaining%60;
    countEl.textContent=`${m}:${s.toString().padStart(2,'0')}`;
    if(remaining<=30)countEl.classList.add('urgent'); else countEl.classList.remove('urgent');
  }
  // Update progress bar
  const fillEl=document.getElementById(`timer-bar-${timerId}`);
  if(fillEl&&t.totalSecs>0){
    const pct=Math.round((remaining/t.totalSecs)*100);
    fillEl.style.width=pct+'%';
    fillEl.style.backgroundColor=pct>50?'#6aaa6a':pct>20?'#e0a040':'#c44';
  }
  if(remaining<=0){
    clearInterval(t.interval);
    const btn=document.getElementById(`timer-btn-${timerId}`);
    if(btn){btn.disabled=false;btn.textContent='▶ Restart';}
    if(countEl){countEl.textContent='Done!';countEl.classList.remove('urgent');}
    startAlarm(timerId,t.label,t.recipeId);
    setTimeout(()=>{delete activeTimers[timerId];renderActiveTimersBar(t.recipeId);},500);
  }
}
function stopTimer(timerId){
  const t=activeTimers[timerId];if(!t)return;
  clearInterval(t.interval);
  const btn=document.getElementById(`timer-btn-${timerId}`);
  if(btn){btn.disabled=false;btn.textContent='▶ Start timer';}
  const recipeId=t.recipeId;
  delete activeTimers[timerId];
  renderActiveTimersBar(recipeId);
}
function renderActiveTimersBar(recipeId){
  // Also hide the old in-steps bar (kept in DOM but unused)
  const oldBar=document.getElementById(`timers-bar-${recipeId}`);if(oldBar){oldBar.style.display='none';}
  const slot=document.getElementById(`modal-timers-slot-${recipeId}`);if(!slot)return;
  const relevant=Object.entries(activeTimers).filter(([id])=>id.startsWith(recipeId+'-'));
  if(relevant.length===0){slot.style.display='none';slot.innerHTML='';return;}
  slot.style.display='block';
  const items=relevant.map(([id,t])=>{
    const remaining=Math.max(0,Math.round((t.endTime-Date.now())/1000));
    const m=Math.floor(remaining/60),s=remaining%60;
    const timeStr=remaining>0?`${m}:${s.toString().padStart(2,'0')}`:'Done!';
    const pct=t.totalSecs>0?Math.round((remaining/t.totalSecs)*100):100;
    const barColor=pct>50?'#6aaa6a':pct>20?'#e0a040':'#c44';
    return`<div class="active-timer-item"><div class="active-timer-top"><span class="active-timer-label">⏱ ${t.label}</span><div style="display:flex;align-items:center;gap:8px"><span class="active-timer-countdown${remaining<=30&&remaining>0?' urgent':''}" id="timer-count-${id}">${timeStr}</span><button class="active-timer-stop" onclick="stopTimer('${id}')">✕</button></div></div><div class="active-timer-progress-track"><div class="active-timer-progress-fill" id="timer-bar-${id}" style="width:${pct}%;background:${barColor}"></div></div></div>`;
  }).join('');
  slot.innerHTML=`<div class="active-timers-bar"><div class="active-timers-bar-title">Active timers</div>${items}</div>`;
}

const activeAlarms={};
function playDingSequence(){
  try{
    const ctx=new AudioContext();
    [0,0.35,0.7].forEach(offset=>{
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+offset);
      g.gain.linearRampToValueAtTime(0.45,ctx.currentTime+offset+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+offset+0.28);
      o.start(ctx.currentTime+offset);o.stop(ctx.currentTime+offset+0.3);
    });
  }catch(e){}
}
function ensureAlarmStack(){
  let stack=document.getElementById('alarm-stack');
  if(!stack){stack=document.createElement('div');stack.id='alarm-stack';stack.className='alarm-stack';document.body.appendChild(stack);}
  return stack;
}
function startAlarm(timerId,label,recipeId){
  if(activeAlarms[timerId])stopAlarmById(timerId);
  const stack=ensureAlarmStack();
  const banner=document.createElement('div');
  banner.className='alarm-banner';
  banner.id=`alarm-banner-${timerId}`;
  banner.innerHTML=`<div><div class="alarm-banner-label">⏱ ${label}</div><div class="alarm-banner-sub">Timer finished — tap to dismiss</div></div><button class="alarm-banner-stop" onclick="stopAlarmById('${timerId}')">Stop</button>`;
  stack.appendChild(banner);
  // Play immediately then repeat every 2 seconds
  playDingSequence();
  const intervalId=setInterval(()=>playDingSequence(),2000);
  // Stop automatically after 60 seconds if not dismissed
  const autoStop=setTimeout(()=>stopAlarmById(timerId),60000);
  activeAlarms[timerId]={intervalId,autoStop,banner};
}
function stopAlarmById(timerId){
  const a=activeAlarms[timerId];if(!a)return;
  clearInterval(a.intervalId);clearTimeout(a.autoStop);
  a.banner?.remove();
  delete activeAlarms[timerId];
  // Clean up stack element if empty
  const stack=document.getElementById('alarm-stack');
  if(stack&&stack.children.length===0)stack.remove();
}

async function assignDinnersForPlan(planId,lunchMeals){
  await sb.from('weekly_plan_meals').delete().eq('plan_id',planId).eq('is_dinner',true);
  if(!lunchMeals||lunchMeals.length===0)return;
  const lunchRecipeIds=lunchMeals.map(m=>m.recipe_id);
  const{data:pairings}=await sb.from('dinner_pairings').select('lunch_recipe_id,dinner_recipe_id').in('lunch_recipe_id',lunchRecipeIds);
  if(!pairings||pairings.length===0)return;
  const pairingMap={};
  for(const p of pairings){if(!pairingMap[p.lunch_recipe_id])pairingMap[p.lunch_recipe_id]=[];pairingMap[p.lunch_recipe_id].push(p.dinner_recipe_id);}
  const toInsert=[];
  for(const lunchMeal of lunchMeals){
    const options=pairingMap[lunchMeal.recipe_id]||[];
    if(options.length===0)continue;
    const picked=options[Math.floor(Math.random()*options.length)];
    toInsert.push({plan_id:planId,recipe_id:picked,lunch_recipe_id:lunchMeal.recipe_id,is_dinner:true,cooked:false});
  }
  if(toInsert.length>0)await sb.from('weekly_plan_meals').insert(toInsert);
}

function buildRecipeText(recipeId){
  const r=allRecipesCache?.find(x=>x.id===recipeId);if(!r)return'';
  const ingredients=r.ingredients||[];
  let text=`🍽 ${r.name_en}`;
  if(r.name_es)text+=` (${r.name_es})`;
  text+='\n';
  const totalTime=(r.prep_time_minutes||0)+(r.cook_time_minutes||0);
  if(totalTime>0)text+=`⏱ ${totalTime} min total\n`;
  if(r.advance_prep_required&&r.advance_prep_description)text+=`⏰ Prep note: ${r.advance_prep_description}\n`;
  if(r.default_side_en)text+=`🍴 Serve with: ${r.default_side_en}\n`;
  if(ingredients.length>0){
    text+='\nIngredients:\n';
    ingredients.forEach(ing=>{const qty=ing.quantity?`${ing.quantity}${ing.unit?' '+ing.unit:''}`:'' ;text+=`• ${ing.name_en}${qty?' — '+qty:''}\n`;});
  }
  if(r.steps&&r.steps.trim()){text+='\nSteps:\n'+r.steps.trim();}
  return text.trim();
}
function copyRecipe(recipeId){
  const text=buildRecipeText(recipeId);if(!text){showToast('Recipe not loaded','error');return;}
  navigator.clipboard.writeText(text).then(()=>showToast('Recipe copied to clipboard ✓')).catch(()=>showToast('Could not copy — try again','error'));
}
function shareRecipe(recipeId){
  const r=allRecipesCache?.find(x=>x.id===recipeId);if(!r)return;
  const text=buildRecipeText(recipeId);
  if(navigator.share){navigator.share({title:r.name_en,text}).catch(()=>{});}
  else{navigator.clipboard.writeText(text).then(()=>showToast('Copied to clipboard — paste into WhatsApp ✓')).catch(()=>showToast('Share not supported on this device','error'));}
}

async function showPriceHistory(productId,productName){
  const el=document.createElement('div');el.id='modal-overlay';el.className='modal-overlay';
  el.innerHTML=`<div class="modal" style="max-width:380px"><div class="modal-header"><div class="modal-title">📈 ${productName}</div><button class="modal-close" onclick="closeModal()">✕</button></div><div style="padding:16px"><div class="empty">Loading...</div></div></div>`;
  document.body.appendChild(el);
  const{data,error}=await sb.from('price_history').select('price_mxn,recorded_at').eq('product_id',productId).order('recorded_at',{ascending:true});
  const body=el.querySelector('.modal > div:last-child');
  if(error||!data?.length){body.innerHTML=`<div style="padding:16px"><div class="empty">No price history yet — prices are recorded each time you finish shopping.</div></div>`;return;}
  // Build trend display
  const fmt=d=>new Date(d).toLocaleDateString('en-MX',{day:'numeric',month:'short'});
  const trend=data.map((r,i)=>{
    const prev=data[i-1];
    const change=prev?r.price_mxn-prev.price_mxn:null;
    const arrow=change===null?'':(change>0?`<span style="color:#c44">▲ $${change.toFixed(2)}</span>`:(change<0?`<span style="color:var(--green)">▼ $${Math.abs(change).toFixed(2)}</span>`:`<span style="color:var(--mid)">—</span>`));
    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:0.8rem;color:var(--mid)">${fmt(r.recorded_at)}</span>
      <span style="font-size:0.88rem;font-weight:600">$${r.price_mxn.toFixed(2)} MXN</span>
      <span style="font-size:0.78rem;min-width:60px;text-align:right">${arrow}</span>
    </div>`;
  }).join('');
  const first=data[0].price_mxn;const last=data[data.length-1].price_mxn;
  const overallChange=last-first;
  const overallHtml=data.length>1?`<div style="margin-top:12px;padding:10px;background:var(--light);border-radius:8px;font-size:0.82rem;color:var(--mid);text-align:center">${data.length} shops recorded · overall ${overallChange>0?`<span style="color:#c44">▲ $${overallChange.toFixed(2)}</span>`:overallChange<0?`<span style="color:var(--green)">▼ $${Math.abs(overallChange).toFixed(2)}</span>`:'<span>no change</span>'}</div>`:'';
  body.innerHTML=`<div style="padding:16px">${trend}${overallHtml}</div>`;
}

async function renderPriceTrendsView(){
  const grid=document.getElementById('products-grid');if(!grid)return;
  grid.innerHTML=`<div class="empty"><div class="spin" style="width:20px;height:20px;border-width:2px;margin:0 auto 8px"></div>Loading price data…</div>`;
  // Fetch all products with price history (at least 2 entries)
  const{data:history,error}=await sb.from('price_history')
    .select('product_id,price_mxn,recorded_at')
    .order('recorded_at',{ascending:true});
  if(error||!history?.length){grid.innerHTML=`<div class="empty"><span class="empty-icon">📈</span>No price history yet — prices build up as you shop and scan receipts.</div>`;return;}
  // Group by product
  const byProduct={};
  for(const row of history){
    if(!byProduct[row.product_id])byProduct[row.product_id]=[];
    byProduct[row.product_id].push(row);
  }
  // Only keep products with 2+ entries
  const eligible=Object.entries(byProduct).filter(([,rows])=>rows.length>=2);
  if(!eligible.length){grid.innerHTML=`<div class="empty"><span class="empty-icon">📈</span>Not enough data yet — need at least 2 shops per product to show trends.</div>`;return;}
  // Load product names
  const productIds=eligible.map(([id])=>id);
  const{data:products}=await sb.from('household_products').select('id,name_en,name_es,category').in('id',productIds);
  const prodMap={};for(const p of products||[])prodMap[p.id]=p;
  // Build trend data
  const trends=eligible.map(([id,rows])=>{
    const prices=rows.map(r=>r.price_mxn);
    const first=prices[0];
    const last=prices[prices.length-1];
    const recent=prices.slice(-6); // last 6 for sparkline
    const change=last-first;
    const pct=first>0?((change/first)*100):0;
    const prod=prodMap[id]||{name_en:id,name_es:'',category:'Other'};
    return{id,prod,prices,recent,first,last,change,pct};
  }).sort((a,b)=>Math.abs(b.pct)-Math.abs(a.pct));
  // Summary stats
  const rising=trends.filter(t=>t.change>0).length;
  const falling=trends.filter(t=>t.change<0).length;
  const stable=trends.filter(t=>t.change===0).length;
  // Filter
  let filtered=trends;
  if(trendFilter==='rising')filtered=trends.filter(t=>t.change>0);
  else if(trendFilter==='falling')filtered=trends.filter(t=>t.change<0);
  else if(trendFilter==='stable')filtered=trends.filter(t=>t.change===0);
  // Render
  const filterBtns=['all','rising','falling','stable'].map(f=>
    `<button class="filter-pill ${trendFilter===f?'active':''}" onclick="trendFilter='${f}';renderPriceTrendsView()">${f.charAt(0).toUpperCase()+f.slice(1)}${f==='rising'?' ▲':f==='falling'?' ▼':''}</button>`
  ).join('');
  const rows=filtered.map(t=>{
    const dir=t.change>0?'up':t.change<0?'down':'stable';
    const arrow=t.change>0?'▲':t.change<0?'▼':'—';
    const changeStr=t.change!==0?`${arrow} $${Math.abs(t.change).toFixed(2)} (${Math.abs(t.pct).toFixed(1)}%)`:'Stable';
    // Sparkline
    const max=Math.max(...t.recent);const min=Math.min(...t.recent);
    const range=max-min||1;
    const bars=t.recent.map(p=>{
      const h=Math.max(4,Math.round(((p-min)/range)*20));
      const col=p===max?'#c44':p===min?'#3a7a3a':'var(--clay)';
      return`<div class="spark-bar" style="height:${h}px;background:${col}"></div>`;
    }).join('');
    return`<div class="trend-row" onclick="showPriceHistory('${t.id}','${(t.prod.name_en||t.prod.name_es).replace(/'/g,"\\'")}')">
      <div style="flex:1">
        <div class="trend-name">${t.prod.name_en||t.prod.name_es}</div>
        ${t.prod.name_es&&t.prod.name_en!==t.prod.name_es?`<div class="trend-name-es">${t.prod.name_es}</div>`:''}
      </div>
      <div class="sparkline">${bars}</div>
      <div class="trend-price">$${t.last.toFixed(2)}</div>
      <div class="trend-change ${dir}">${changeStr}</div>
    </div>`;
  }).join('');
  grid.innerHTML=`
    <div class="trends-summary">
      <div class="trends-stat"><div class="trends-stat-num" style="color:#c44">${rising}</div><div class="trends-stat-label">Rising ▲</div></div>
      <div class="trends-stat"><div class="trends-stat-num" style="color:#3a7a3a">${falling}</div><div class="trends-stat-label">Falling ▼</div></div>
      <div class="trends-stat"><div class="trends-stat-num">${stable}</div><div class="trends-stat-label">Stable</div></div>
    </div>
    <div class="trend-filter-row">${filterBtns}</div>
    <div class="card" style="padding:0 16px">
      ${filtered.length?rows:`<div class="empty" style="padding:20px">No products in this filter</div>`}
    </div>
    <div style="font-size:0.74rem;color:var(--mid);margin-top:12px;text-align:center">Tap any row to see full price history · Change shown from first to last recorded price</div>`;
}

function startScanner(){
  if(typeof Html5Qrcode==='undefined'){
    document.getElementById('scanner-status').textContent='Scanner library not loaded — try refreshing.';
    return;
  }
  html5QrScanner=new Html5Qrcode('scanner-viewport');
  Html5Qrcode.getCameras().then(cameras=>{
    if(!cameras||cameras.length===0){
      document.getElementById('scanner-status').textContent='No camera found on this device.';
      return;
    }
    const cam=cameras.find(c=>c.label.toLowerCase().includes('back')||c.label.toLowerCase().includes('rear'))||cameras[cameras.length-1];
    document.getElementById('scanner-status').textContent='Scanning… point at barcode';
    html5QrScanner.start(
      cam.id,
      {fps:10,qrbox:{width:250,height:120},aspectRatio:1.5},
      (barcode)=>onBarcodeDetected(barcode),
      ()=>{}
    ).catch(err=>{
      document.getElementById('scanner-status').textContent='Camera error: '+err;
    });
  }).catch(err=>{
    document.getElementById('scanner-status').textContent='Could not access camera. Check browser permissions.';
    console.warn('Camera error:',err);
  });
}

function stopScanner(){
  if(html5QrScanner){
